<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0818" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>RubikRace</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    /*
    ══════════════════════════════════════════════════
    REGLAS FIREBASE CORRECTAS — pegar en Firebase Console
    (Realtime Database → Rules)

    {
      "rules": {
        "rubitrack": {
          "lobby":  { ".read": true, ".write": true },
          "scores": { ".read": true, ".write": true },
          "games": {
            "$code": {
              "pattern":      { ".read": true, ".write": true },
              "reset":        { ".read": true, ".write": true },
              "notifications":{ ".read": true, ".write": true },
              "meta":         { ".read": true, ".write": true },
              "presence": {
                ".read": true,
                "$uid": {
                  ".write": true,
                  ".validate": "newData.hasChildren(['name','ts']) && newData.child('name').isString() && newData.child('name').val().length <= 20 && newData.child('ts').isNumber()"
                }
              }
            }
          }
        }
      }
    }
    ══════════════════════════════════════════════════
    */
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, push, get, remove, onValue, onChildAdded, off,
             query, orderByChild, startAfter }
                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const app = initializeApp({
      apiKey:            "AIzaSyAKAk1w50OFDGXC02V0lcxMvoFcBQ1wPho",
      authDomain:        "rubikrace-online.firebaseapp.com",
      databaseURL:       "https://rubikrace-online-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "rubikrace-online",
      storageBucket:     "rubikrace-online.firebasestorage.app",
      messagingSenderId: "233953330878",
      appId:             "1:233953330878:web:6c7dd9dc53a2134d5b80ef",
    });
    const db = getDatabase(app);

    // ── Connection state ──
    onValue(ref(db, '.info/connected'), snap => window.__fbConnectionState?.(!!snap.val()));

    // ── Per-game listeners ──
    let unsubs = [];
    function detach() { unsubs.forEach(fn => fn()); unsubs = []; }

    window.__fbJoinGame = async function(code) {
      detach();
      const base = `rubitrack/games/${code}`;

      // Pattern
      const patRef = ref(db, `${base}/pattern`);
      unsubs.push(onValue(patRef, snap => {
        const d = snap.val();
        if (d && Array.isArray(d)) window.__fbPatternReceived?.(d);
      }));
      window.__fbSetPattern = p => set(patRef, p);

      // Reset
      const rstRef = ref(db, `${base}/reset`);
      unsubs.push(onValue(rstRef, snap => {
        const v = snap.val();
        if (v?.ts) window.__fbResetReceived?.(v.ts);
      }));
      window.__fbSendReset = () => set(rstRef, { ts: Date.now() });

      // Notifications (only new ones)
      const notifRef   = ref(db, `${base}/notifications`);
      const notifQuery = query(notifRef, orderByChild('ts'), startAfter(Date.now()));
      unsubs.push(onChildAdded(notifQuery, snap => {
        const item = snap.val();
        if (item) window.__fbNotifReceived?.(item);
      }));
      window.__fbSendFinish = (name, time, moves) =>
        push(notifRef, { name, time, moves, ts: Date.now() });

      // Presence
      const presRef = ref(db, `${base}/presence`);
      unsubs.push(onValue(presRef, snap => {
        const now = Date.now(), players = [];
        snap.forEach(child => {
          const v = child.val();
          if (v?.name && (now - v.ts) < 15000)
            players.push({ name:v.name, moving:v.moving&&(now-(v.lastMove||0))<4000,
                           finished:!!v.finished, time:v.finishTime||null, moves:v.finishMoves||null });
        });
        window.__fbPresenceReceived?.(players);
      }));
      window.__fbUpdatePresence = (uid, name, moving=false) => {
        const d = { name, ts: Date.now(), moving };
        if (moving) d.lastMove = Date.now();
        return set(ref(db, `${base}/presence/${uid}`), d);
      };
      window.__fbUpdateFinishPresence = (uid, name, finishTime, finishMoves) =>
        set(ref(db, `${base}/presence/${uid}`), { name, ts:Date.now(), moving:false,
                                                   finished:true, finishTime, finishMoves });

      // Meta (host info for lobby list)
      window.__fbSetMeta = (hostName) =>
        set(ref(db, `${base}/meta`), { host: hostName, ts: Date.now() });

      // Return true if game already had a pattern (existing game)
      const snap = await get(patRef);
      return snap.exists();
    };

    window.__fbLeaveGame = () => detach();

    // Check game exists (for join validation)
    window.__fbGameExists = async (code) => {
      const snap = await get(ref(db, `rubitrack/games/${code}/pattern`));
      return snap.exists();
    };

    // ── Scores (all-time) ──
    const safeKey = n => n.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,20);
    window.__fbUpdateScore = async (name, timeSec, moves) => {
      const key = safeKey(name);
      const sRef = ref(db, `rubitrack/scores/${key}`);
      const snap = await get(sRef);
      const prev = snap.val() || {};
      const update = {
        name,
        wins:      (prev.wins||0) + 1,
        bestSec:   prev.bestSec  != null ? Math.min(prev.bestSec,  timeSec) : timeSec,
        bestMoves: prev.bestMoves != null ? Math.min(prev.bestMoves, moves)  : moves,
      };
      return set(sRef, update);
    };
    let scoresUnsub = null;
    window.__fbListenScores = (cb) => {
      const sRef = ref(db, 'rubitrack/scores');
      scoresUnsub = onValue(sRef, snap => {
        const list = [];
        snap.forEach(c => { const v=c.val(); if(v?.name) list.push(v); });
        list.sort((a,b)=> b.wins-a.wins || a.bestSec-b.bestSec);
        cb(list);
      });
    };
    window.__fbUnlistenScores = () => { if(scoresUnsub){scoresUnsub();scoresUnsub=null;} };
    window.__fbRegisterLobby = (code, host) =>
      set(ref(db, `rubitrack/lobby/${code}`), { host, ts: Date.now(), lastMove: Date.now() });

    // Update lastMove timestamp on each move
    window.__fbUpdateLobbyActivity = (code) =>
      set(ref(db, `rubitrack/lobby/${code}/lastMove`), Date.now()).catch(()=>{});

    // Delete lobby entries inactive for 2+ minutes
    window.__fbCleanStaleGames = async () => {
      const now = Date.now();
      try {
        const snap = await get(ref(db, 'rubitrack/lobby'));
        snap.forEach(child => {
          const d = child.val();
          const last = d?.lastMove || d?.ts || 0;
          if (now - last > 120000)
            remove(ref(db, `rubitrack/lobby/${child.key}`)).catch(()=>{});
        });
      } catch(e) {}
    };

    const DB_REST = 'https://rubikrace-online-default-rtdb.europe-west1.firebasedatabase.app';

    // Schedule lobby entry deletion after delay (default 2 min)
    window.__fbScheduleLobbyDelete = (code, delayMs=120000) => {
      setTimeout(() => {
        set(ref(db, `rubitrack/lobby/${code}/expiresAt`), Date.now());
      }, delayMs);
    };

    // Immediate delete via keepalive fetch (works in beforeunload)
    window.__fbLobbyDeleteNow = (code) => {
      fetch(`${DB_REST}/rubitrack/lobby/${code}.json`, { method:'DELETE', keepalive:true })
        .catch(()=>{});
    };

    let gamesUnsub = null;
    window.__fbListenGames = (cb) => {
      const lobbyRef = ref(db, 'rubitrack/lobby');
      gamesUnsub = onValue(lobbyRef, snap => {
        const now = Date.now(), list = [];
        snap.forEach(child => {
          const d = child.val();
          if (!d?.host || !d?.ts) return;
          if (d.expiresAt && d.expiresAt <= now) return;
          const last = d.lastMove || d.ts;
          if (now - last > 120000) return;           // 2 min inactivity
          if (now - d.ts > 7200000) return;
          list.push({ code: child.key, host: d.host, ts: d.ts });
        });
        list.sort((a,b) => b.ts - a.ts);
        cb(list.slice(0, 8));
      });
    };
    window.__fbUnlistenGames = () => { if (gamesUnsub) { gamesUnsub(); gamesUnsub = null; } };

    window.__fbReady = true;
    window.dispatchEvent(new Event('fbReady'));
  </script>

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; background:#0a0818; }
    body { overflow-x:hidden; }
    #root { min-height:100vh; }
    :root { --tile:clamp(50px,calc((100vw - 64px)/5),62px); }

    @keyframes pulse      { 0%,100%{opacity:.2} 50%{opacity:.8} }
    @keyframes shimmer    { 0%{background-position:200% center} 100%{background-position:-200% center} }
    @keyframes slideIn    { from{transform:translateY(-30px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes fadeUp     { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes tileSlide  { from{transform:scale(0.92)} to{transform:scale(1)} }
    @keyframes widgetIn   { from{transform:translateY(-14px) scale(.95);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
    @keyframes panelIn    { from{transform:translateY(-10px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes finishPop  { 0%{transform:scale(.5) rotate(-8deg);opacity:0} 70%{transform:scale(1.1) rotate(2deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
    @keyframes frameIn    { from{opacity:0} to{opacity:1} }
    @keyframes glowPulse  { 0%,100%{filter:drop-shadow(0 0 8px rgba(255,200,80,.4))} 50%{filter:drop-shadow(0 0 20px rgba(255,200,80,.9))} }
    @keyframes syncPulse  { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }
    @keyframes movingPulse{ 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }
    @keyframes toastIn    { from{transform:translateX(110%);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes toastOut   { from{transform:translateX(0);opacity:1} to{transform:translateX(110%);opacity:0} }
    @keyframes playerIn   { from{transform:translateY(-6px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes modalIn    { from{transform:scale(.85);opacity:0} 70%{transform:scale(1.03)} to{transform:scale(1);opacity:1} }
    @keyframes codePop    { from{transform:scale(.8) translateY(10px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }

    .tile-btn  { touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
    .tile-btn:hover  { transform:scale(1.06) !important; filter:brightness(1.25) !important; }
    .tile-btn:active { transform:scale(0.95) !important; }

    /* ══ Stars bg ══ */
    .star { position:absolute; border-radius:50%; background:rgba(255,255,255,.4); }

    /* ══ Lobby ══ */
    .lobby-wrap {
      min-height:100vh;
      background:radial-gradient(ellipse at 30% 20%,#1a1035 0%,#0a0818 60%,#000508 100%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:24px; gap:0; position:relative; overflow:hidden;
      font-family:'Trebuchet MS','Segoe UI',sans-serif;
    }
    .lobby-title {
      font-size:clamp(32px,8vw,52px); font-weight:900; letter-spacing:.15em;
      text-transform:uppercase; margin-bottom:4px;
      background:linear-gradient(90deg,#7BAEF5,#E8B800,#FFA85C,#5FD98A);
      background-size:300% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:shimmer 4s linear infinite;
    }
    .lobby-sub { color:rgba(255,255,255,.3); font-size:12px; letter-spacing:.2em; margin-bottom:36px; }
    .lobby-card {
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09);
      border-radius:20px; padding:28px 28px 24px; width:100%; max-width:360px;
      backdrop-filter:blur(10px);
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      animation:fadeUp .5s cubic-bezier(.34,1.2,.64,1);
      display:flex; flex-direction:column; gap:16px;
    }
    .lobby-label { font-size:11px; color:rgba(255,255,255,.35); letter-spacing:.12em; text-transform:uppercase; margin-bottom:2px; }
    .lobby-input {
      width:100%; padding:12px 16px; border-radius:12px;
      border:1.5px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06);
      color:#fff; font-size:16px; font-weight:600; outline:none;
      font-family:'Trebuchet MS','Segoe UI',sans-serif; transition:border-color .2s;
    }
    .lobby-input:focus { border-color:rgba(156,90,255,.6); }
    .lobby-input::placeholder { color:rgba(255,255,255,.2); }
    .lobby-divider { height:1px; background:rgba(255,255,255,.08); margin:4px 0; }
    .lobby-btn {
      width:100%; padding:14px; border-radius:12px; border:none; cursor:pointer;
      font-size:15px; font-weight:700; letter-spacing:.06em;
      transition:filter .2s, transform .1s; display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .lobby-btn:active { transform:scale(0.97); }
    .lobby-btn.primary { background:linear-gradient(135deg,#7c3aed,#4f1fbf); color:#fff; }
    .lobby-btn.primary:hover { filter:brightness(1.15); }
    .lobby-btn.secondary { background:rgba(255,255,255,.07); color:rgba(255,255,255,.7); border:1.5px solid rgba(255,255,255,.12); }
    .lobby-btn.secondary:hover { background:rgba(255,255,255,.12); }
    .lobby-btn:disabled { opacity:.4; cursor:not-allowed; }
    .lobby-error { font-size:12px; color:#f87171; text-align:center; animation:fadeUp .3s ease; }

    .join-row { display:flex; gap:8px; }
    .code-input {
      flex:1; padding:12px 16px; border-radius:12px;
      border:1.5px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06);
      color:#fff; font-size:18px; font-weight:800; text-transform:uppercase;
      letter-spacing:.2em; text-align:center; outline:none;
      font-family:'Trebuchet MS','Segoe UI',sans-serif; transition:border-color .2s;
    }
    .code-input:focus { border-color:rgba(156,90,255,.6); }

    /* ══ Game code badge ══ */
    .game-code-badge {
      display:flex; align-items:center; gap:8px;
      background:rgba(255,255,255,.06); border:1px solid rgba(156,90,255,.25);
      border-radius:10px; padding:7px 14px; cursor:pointer;
      transition:background .2s; animation:codePop .4s cubic-bezier(.34,1.4,.64,1);
      align-self:flex-start;
    }
    .game-code-badge:hover { background:rgba(156,90,255,.15); }
    .game-code-badge .code-label { font-size:9px; color:rgba(255,255,255,.35); letter-spacing:.15em; text-transform:uppercase; }
    .game-code-badge .code-value { font-size:18px; font-weight:900; color:#c89fff; letter-spacing:.2em; }
    .game-code-badge .copy-icon  { font-size:13px; opacity:.5; }
    .copied-hint { font-size:10px; color:#22c55e; animation:fadeUp .2s ease; }

    /* ══ Pattern widget ══ */
    #rr-widget {
      position:fixed; top:14px; right:14px; z-index:300;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      animation:widgetIn .5s cubic-bezier(.34,1.4,.64,1);
    }
    #rr-toggle {
      display:flex; align-items:center; gap:10px;
      background:rgba(10,8,24,.9); border:1.5px solid rgba(156,90,255,.45); border-radius:14px;
      padding:8px 14px 8px 10px; cursor:pointer; color:#c89fff;
      font-size:12px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
      backdrop-filter:blur(14px); transition:background .2s,border-color .2s;
      user-select:none; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.4);
    }
    #rr-toggle:hover { background:rgba(124,58,237,.3); border-color:rgba(156,90,255,.8); }
    .rr-preview { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; width:36px; }
    .rr-preview span { display:block; width:10px; height:10px; border-radius:2px; border:1.5px solid #444; transition:background .4s,border-color .4s; }
    #rr-sync-dot { width:7px; height:7px; border-radius:50%; background:#444; flex-shrink:0; transition:background .4s; }
    #rr-sync-dot.connected    { background:#22c55e; animation:syncPulse 2s ease-in-out infinite; }
    #rr-sync-dot.disconnected { background:#ef4444; }
    #rr-sync-dot.connecting   { background:#f59e0b; animation:syncPulse .8s ease-in-out infinite; }
    #rr-panel {
      position:absolute; top:calc(100% + 8px); right:0;
      width:min(405px,92vw); background:rgba(6,4,20,.97);
      border:1.5px solid rgba(156,90,255,.35); border-radius:18px;
      padding:20px 20px 16px; backdrop-filter:blur(18px);
      box-shadow:0 24px 60px rgba(0,0,0,.7); animation:panelIn .22s ease;
    }
    #rr-panel.hidden { display:none; }
    #rr-panel-header { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:2px; }
    #rr-panel h3 { color:#fff; font-size:16px; font-weight:700; }
    .rr-tm { color:#9b59b6; font-size:9px; letter-spacing:4px; text-transform:uppercase; text-align:center; margin-bottom:10px; }
    #rr-status-text { text-align:center; font-size:10px; color:rgba(255,255,255,.3); margin-bottom:10px; min-height:14px; }
    #rr-players { margin-bottom:10px; display:flex; flex-wrap:wrap; gap:5px; justify-content:center; min-height:16px; }
    .rr-player-chip {
      display:flex; flex-direction:column; align-items:flex-start;
      background:rgba(255,255,255,.07); border:1px solid rgba(156,90,255,.25);
      border-radius:20px; padding:4px 10px; font-size:10px; color:#c89fff; font-weight:600;
      animation:playerIn .3s ease; min-width:80px;
    }
    .rr-player-chip-row { display:flex; align-items:center; gap:5px; width:100%; }
    .rr-player-chip .dot { width:5px; height:5px; border-radius:50%; background:#22c55e; flex-shrink:0; }
    .rr-player-chip .dot.moving   { background:#60a5fa; animation:movingPulse .8s ease-in-out infinite; }
    .rr-player-chip .dot.finished { background:#FFE566; }
    .rr-chip-name   { flex:1; }
    .rr-chip-status { font-size:9px; color:rgba(255,255,255,.35); padding-left:10px; }
    .rr-chip-time   { font-size:9px; color:#FFE566; font-weight:700; padding-left:10px; }
    #rr-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-bottom:13px; }
    .rrcell { height:99px; border-radius:9px; border:2px solid #333; transition:background .4s,border-color .4s; position:relative; overflow:hidden; }
    .rrcell::after { content:''; position:absolute; top:0; left:0; right:0; height:40%; background:linear-gradient(to bottom,rgba(255,255,255,.18),transparent); border-radius:9px 9px 50% 50%; pointer-events:none; }
    #rr-shuffle { width:100%; padding:10px; background:#7c3aed; color:#fff; border:none; border-radius:9px; font-size:12px; font-weight:700; cursor:pointer; transition:background .2s,opacity .2s; }
    #rr-shuffle:hover    { background:#6d28d9; }
    #rr-shuffle:disabled { opacity:.4; cursor:not-allowed; }

    /* ══ Finished overlay ══ */
    .finished-frame {
      position:absolute; inset:0; border-radius:16px;
      box-shadow:inset 0 0 0 calc(12px + var(--tile) + 5px) rgba(0,0,0,.91);
      display:flex; align-items:center; justify-content:center;
      pointer-events:none; z-index:20; animation:frameIn .3s ease;
    }
    .finished-text {
      font-family:'Pacifico',cursive; font-size:clamp(28px,7vw,44px);
      background:linear-gradient(135deg,#FFE566,#FFA85C,#F57A7A);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:finishPop .65s cubic-bezier(.34,1.56,.64,1), glowPulse 2s ease-in-out 1s infinite;
      text-align:center; line-height:1.1; padding:8px 16px;
    }

    /* ══ Toasts ══ */
    #toast-container { position:fixed; bottom:24px; right:16px; display:flex; flex-direction:column; gap:8px; z-index:500; pointer-events:none; max-width:min(320px,90vw); }
    .toast { background:rgba(6,4,20,.96); border:1.5px solid rgba(34,197,94,.4); border-radius:16px; padding:14px 18px; backdrop-filter:blur(16px); box-shadow:0 8px 32px rgba(0,0,0,.6); animation:toastIn .4s cubic-bezier(.34,1.4,.64,1); pointer-events:auto; }
    .toast.out { animation:toastOut .4s ease forwards; }
    .toast-row { display:flex; align-items:flex-start; gap:12px; }
    .toast-emoji { font-size:20px; flex-shrink:0; }
    .toast-title { font-family:'Pacifico',cursive; font-size:13px; background:linear-gradient(90deg,#FFE566,#FFA85C); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:2px; }
    .toast-msg  { font-size:11px; color:rgba(255,255,255,.5); }
    .toast-meta { font-size:10px; color:rgba(255,255,255,.3); margin-top:3px; }
    .toast-discrete { background:rgba(6,4,20,.88); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:7px 13px; font-size:11px; color:rgba(255,255,255,.5); display:flex; align-items:center; gap:7px; animation:toastIn .3s cubic-bezier(.34,1.4,.64,1); }
    .toast-discrete.out { animation:toastOut .3s ease forwards; }
    .td-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

    /* ══ Confirm modal ══ */
    .confirm-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:400; backdrop-filter:blur(6px); animation:frameIn .2s ease; }
    .confirm-box { background:linear-gradient(145deg,#12103a,#0a0818); border:1.5px solid rgba(156,90,255,.35); border-radius:20px; padding:28px 28px 22px; text-align:center; box-shadow:0 24px 60px rgba(0,0,0,.7); animation:modalIn .35s cubic-bezier(.34,1.4,.64,1); max-width:300px; width:90%; }
    .confirm-box .icon { font-size:36px; margin-bottom:10px; }
    .confirm-box h4 { color:#fff; font-size:16px; font-weight:800; margin-bottom:6px; }
    .confirm-box p  { color:rgba(255,255,255,.45); font-size:12px; line-height:1.5; margin-bottom:20px; }
    .confirm-btns   { display:flex; gap:10px; justify-content:center; }
    .confirm-btn-yes { flex:1; padding:10px; border-radius:10px; border:none; background:linear-gradient(135deg,#7c3aed,#4f1fbf); color:#fff; font-size:13px; font-weight:700; cursor:pointer; transition:filter .2s; }
    .confirm-btn-yes:hover { filter:brightness(1.2); }
    .confirm-btn-no  { flex:1; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.07); color:rgba(255,255,255,.6); font-size:13px; font-weight:600; cursor:pointer; }
    .confirm-btn-no:hover { background:rgba(255,255,255,.13); }

    /* ══ Name input ══ */
    .name-input-wrap { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.05); border-radius:12px; padding:10px 16px; border:1px solid rgba(255,255,255,.1); width:100%; max-width:340px; }
    .name-input-wrap label { font-size:11px; color:rgba(255,255,255,.4); letter-spacing:.1em; text-transform:uppercase; white-space:nowrap; }
    .name-input-wrap input { flex:1; background:transparent; border:none; outline:none; color:#fff; font-size:15px; font-weight:600; font-family:'Trebuchet MS','Segoe UI',sans-serif; }
    .name-input-wrap input::placeholder { color:rgba(255,255,255,.2); }

    /* ══ Leave button ══ */
    .leave-btn { background:none; border:1px solid rgba(255,255,255,.12); border-radius:8px; color:rgba(255,255,255,.35); font-size:11px; padding:5px 12px; cursor:pointer; transition:all .2s; letter-spacing:.08em; }
    .leave-btn:hover { border-color:rgba(239,68,68,.4); color:rgba(239,68,68,.7); }

    /* ══ Tutorial overlay ══ */
    @keyframes tutDraw   { to { stroke-dashoffset: 0; } }
    @keyframes tutFadeUp { from{opacity:0;transform:translate(-50%,10px)} to{opacity:1;transform:translate(-50%,0)} }
    @keyframes tutArrow  { from{opacity:0} to{opacity:1} }
    @keyframes countPulse { 0%{transform:scale(1.4);opacity:.5} 100%{transform:scale(1);opacity:1} }
    .help-btn {
      position:fixed; top:14px; left:14px; z-index:301;
      width:36px; height:36px; border-radius:50%;
      border:1.5px solid rgba(156,90,255,.45);
      background:rgba(10,8,24,.9); color:#c89fff;
      font-size:19px; font-weight:700; line-height:1;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      backdrop-filter:blur(14px); transition:all .2s;
      box-shadow:0 4px 20px rgba(0,0,0,.4);
    }
    .help-btn:hover { background:rgba(124,58,237,.3); border-color:rgba(156,90,255,.8); color:#fff; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="toast-container"></div>

  <!-- ══ Pattern Widget ══ -->
  <div id="rr-widget" style="display:none">
    <div id="rr-toggle" onclick="rrToggle()">
      <div class="rr-preview" id="rr-preview">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      Pattern
      <div id="rr-sync-dot" class="connecting"></div>
    </div>
    <div id="rr-panel" class="hidden">
      <div id="rr-panel-header">
        <h3>Pattern</h3>
        <div id="rr-sync-dot-panel" style="width:7px;height:7px;border-radius:50%;background:#444;transition:background .4s;"></div>
      </div>
      <p class="rr-tm">Xavimator™</p>
      <div id="rr-status-text">Conectando…</div>
      <div id="rr-players"></div>
      <div id="rr-grid"></div>
      <button id="rr-shuffle" onclick="rrShuffle()" disabled>Shuffle</button>
    </div>
  </div>

  <script>
    const RR_COLORS = [
      { bg:'#C8C8D8', border:'#8888A0', puzzleId:'white'  },
      { bg:'#1b5e20', border:'#0a3d0a', puzzleId:'green'  },
      { bg:'#ffeb3b', border:'#f9a825', puzzleId:'yellow' },
      { bg:'#0d47a1', border:'#092f6b', puzzleId:'blue'   },
      { bg:'#f44336', border:'#b71c1c', puzzleId:'red'    },
      { bg:'#ff9800', border:'#e65100', puzzleId:'orange' },
    ];
    let rrOpen = false, fbConnected = false;
    window.rrPattern = [];

    // Build grid cells
    (function(){ const g=document.getElementById('rr-grid'); for(let i=0;i<9;i++){const c=document.createElement('div');c.className='rrcell';g.appendChild(c);} })();

    function rrToggle() { rrOpen=!rrOpen; document.getElementById('rr-panel').classList.toggle('hidden',!rrOpen); }
    document.addEventListener('click', e => {
      if(rrOpen&&!document.getElementById('rr-widget').contains(e.target)){ rrOpen=false; document.getElementById('rr-panel').classList.add('hidden'); }
    });

    function rrApplyPattern(pattern) {
      window.rrPattern=pattern;
      document.querySelectorAll('.rrcell').forEach((c,i)=>{ c.style.background=RR_COLORS[pattern[i]].bg; c.style.borderColor=RR_COLORS[pattern[i]].border; });
      document.querySelectorAll('#rr-preview span').forEach((d,i)=>{ d.style.background=RR_COLORS[pattern[i]].bg; d.style.borderColor=RR_COLORS[pattern[i]].border; });
      window.dispatchEvent(new CustomEvent('rrPatternChange',{detail:pattern}));
    }
    window.__fbPatternReceived = p => { rrApplyPattern(p); setConnected(true); };

    // Presence
    let _prevNames = new Set();
    function showDiscreteToast(emoji, msg, dotColor) {
      const el=document.createElement('div'); el.className='toast-discrete';
      el.innerHTML=`<span class="td-dot" style="background:${dotColor}"></span>${emoji} ${msg}`;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),300); },3000);
    }
    window.__fbPresenceReceived = function(players) {
      const cur=new Set(players.map(p=>p.name));
      cur.forEach(n=>{ if(!_prevNames.has(n)&&_prevNames.size>0) showDiscreteToast('🟢',`${n} se ha conectado`,'#22c55e'); });
      _prevNames.forEach(n=>{ if(!cur.has(n)) showDiscreteToast('⚪',`${n} se ha desconectado`,'#6b7280'); });
      _prevNames=cur;
      const c=document.getElementById('rr-players');
      c.innerHTML=players.length ? players.map(p=>{
        const dc=p.finished?'finished':p.moving?'moving':'';
        const sl=p.finished?`<div class="rr-chip-time">🏁 ${p.time} · ${p.moves} mov</div>`:p.moving?`<div class="rr-chip-status">moviendo…</div>`:'';
        return `<div class="rr-player-chip"><div class="rr-player-chip-row"><span class="dot ${dc}"></span><span class="rr-chip-name">${p.name}</span></div>${sl}</div>`;
      }).join('') : '';
      window.dispatchEvent(new CustomEvent('rrPresenceChange',{detail:players}));
    };

    // Reset
    let lastResetTs=0;
    window.__fbResetReceived = ts => { if(ts<=lastResetTs)return; lastResetTs=ts; window.dispatchEvent(new CustomEvent('rrGlobalReset',{detail:ts})); };

    // Finish toast
    window.__fbNotifReceived = item => {
      const el=document.createElement('div'); el.className='toast';
      el.innerHTML=`<div class="toast-row"><div class="toast-emoji">🏁</div><div><div class="toast-title">${item.name} ha terminado!</div><div class="toast-msg">Ha completado el patrón</div><div class="toast-meta">⏱ ${item.time} · ${item.moves} movimientos</div></div></div>`;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),400); },5000);
    };

    // Connection state
    window.__fbConnectionState = function(ok) {
      fbConnected=ok;
      const dot=document.getElementById('rr-sync-dot');
      const dotp=document.getElementById('rr-sync-dot-panel');
      const status=document.getElementById('rr-status-text');
      dot.className=ok?'connected':'disconnected';
      dotp.style.background=ok?'#22c55e':'#ef4444';
      dotp.style.boxShadow=ok?'0 0 6px #22c55e':'none';
      status.textContent=ok?'● Sincronizado en tiempo real':'● Sin conexión';
      status.style.color=ok?'rgba(34,197,94,.8)':'rgba(239,68,68,.7)';
      document.getElementById('rr-shuffle').disabled=!ok;
    };

    function rrGenPattern() {
      const r=[],c=new Array(RR_COLORS.length).fill(0);
      for(let i=0;i<9;i++){const a=RR_COLORS.map((_,i)=>i).filter(i=>c[i]<4);const p=a[Math.floor(Math.random()*a.length)];c[p]++;r.push(p);}
      return r;
    }
    function rrShuffle() {
      const p=rrGenPattern();
      if(window.__fbSetPattern) window.__fbSetPattern(p); else rrApplyPattern(p);
    }
    window.rrShuffle=rrShuffle;
  </script>

  <!-- ══ React ══ -->
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLORS = [
      { id:"blue",   bg:"#0D3B8E", shine:"#1A5FC8", shadow:"#061E50" },
      { id:"green",  bg:"#0A6B2E", shine:"#13A346", shadow:"#053A18" },
      { id:"red",    bg:"#8B0C0C", shine:"#C41A1A", shadow:"#4A0505" },
      { id:"yellow", bg:"#B89200", shine:"#E8B800", shadow:"#6B5500" },
      { id:"orange", bg:"#B84500", shine:"#E86200", shadow:"#6B2600" },
      { id:"white",  bg:"#C8C8D8", shine:"#EEEEF8", shadow:"#8888A0" },
    ];
    const colorMap={}; COLORS.forEach(c=>{colorMap[c.id]=c;});
    const CENTER=[6,7,8,11,12,13,16,17,18];
    const RR_IDS=['white','green','yellow','blue','red','orange'];
    const SESSION_UID=Math.random().toString(36).slice(2);

    const CODE_CHARS='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    function genCode() { return Array.from({length:4},()=>CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)]).join(''); }

    function waitForFb(timeout=8000) {
      return new Promise((resolve, reject) => {
        if (window.__fbReady) { resolve(); return; }
        const timer = setTimeout(() => reject(new Error('Firebase no disponible. Comprueba tu conexión.')), timeout);
        window.addEventListener('fbReady', () => { clearTimeout(timer); resolve(); }, { once: true });
      });
    }

    function checkMatch(tiles,pat){ if(!pat||pat.length<9)return false; return CENTER.every((ti,i)=>{const t=tiles[ti];return t&&t.colorId===RR_IDS[pat[i]];}); }
    function buildSolved(){ const t=[]; COLORS.forEach(c=>{for(let i=0;i<4;i++)t.push({colorId:c.id,num:i+1});}); t.push(null); return t; }
    function canMove(ti,ei){ const tR=Math.floor(ti/5),tC=ti%5,eR=Math.floor(ei/5),eC=ei%5; return(tR===eR&&Math.abs(tC-eC)===1)||(tC===eC&&Math.abs(tR-eR)===1); }
    function shuffle(tiles,n=300){ let t=[...tiles],e=t.indexOf(null); for(let i=0;i<n;i++){const nb=[],r=Math.floor(e/5),c=e%5;if(r>0)nb.push(e-5);if(r<4)nb.push(e+5);if(c>0)nb.push(e-1);if(c<4)nb.push(e+1);const p=nb[Math.floor(Math.random()*nb.length)];[t[e],t[p]]=[t[p],t[e]];e=p;} return t; }
    function fmt(s){return`${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;}

    /* ─── Stars ─── */
    function Stars() {
      return <div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden'}}>
        {Array.from({length:40}).map((_,i)=>(
          <div key={i} className="star" style={{
            width:i%5===0?'3px':'2px',height:i%5===0?'3px':'2px',
            top:`${Math.sin(i*7.3)*50+50}%`,left:`${Math.cos(i*5.1)*50+50}%`,
            animation:`pulse ${2+(i%3)}s ease-in-out infinite`,animationDelay:`${(i*.3)%3}s`,
          }}/>
        ))}
      </div>;
    }

    /* ─── Lobby ─── */
    function Lobby({ onJoin }) {
      const [name,     setName]     = useState(()=>localStorage.getItem('rr-player-name')||'');
      const [joinCode, setJoinCode] = useState('');
      const [showJoin, setShowJoin] = useState(false);
      const [loading,  setLoading]  = useState(false);
      const [error,    setError]    = useState('');
      const [games,    setGames]    = useState([]);

      const nameOk = name.trim().length > 0;

      // Listen to active games + periodic cleanup of stale entries
      useEffect(() => {
        const start = () => {
          window.__fbListenGames?.(setGames);
          window.__fbCleanStaleGames?.();
        };
        if (window.__fbReady) start();
        else window.addEventListener('fbReady', start, { once: true });
        const cleanInterval = setInterval(() => window.__fbCleanStaleGames?.(), 30000);
        return () => { window.__fbUnlistenGames?.(); clearInterval(cleanInterval); };
      }, []);

      const handleNew = async () => {
        if (!nameOk) return;
        setLoading(true); setError('');
        try {
          await waitForFb();
          const code = genCode();
          localStorage.setItem('rr-player-name', name.trim());
          await window.__fbJoinGame(code);
          await window.__fbSetMeta?.(name.trim());
          await window.__fbRegisterLobby?.(code, name.trim());
          window.rrShuffle?.();
          onJoin(name.trim(), code);
        } catch(e) {
          console.error('handleNew error:', e);
          setError(e.message || 'Error al crear la partida. Comprueba tu conexión.');
          setLoading(false);
        }
      };

      const handleJoin = async () => {
        const code = joinCode.trim().toUpperCase();
        if (code.length !== 4) { setError('El código debe tener 4 caracteres'); return; }
        setLoading(true); setError('');
        try {
          await waitForFb();
          const exists = await window.__fbGameExists(code);
          if (!exists) { setError('Partida no encontrada. Comprueba el código.'); setLoading(false); return; }
          localStorage.setItem('rr-player-name', name.trim());
          await window.__fbJoinGame(code);
          onJoin(name.trim(), code);
        } catch(e) {
          console.error('handleJoin error:', e);
          setError(e.message || 'Error al unirse. Comprueba tu conexión.');
          setLoading(false);
        }
      };

      const handleJoinGame = async (code) => {
        if (!nameOk) { setError('Escribe tu nombre primero'); return; }
        setLoading(true); setError('');
        try {
          await waitForFb();
          localStorage.setItem('rr-player-name', name.trim());
          await window.__fbJoinGame(code);
          onJoin(name.trim(), code);
        } catch(e) {
          console.error('handleJoinGame error:', e);
          setError(e.message || 'Error al unirse.');
          setLoading(false);
        }
      };

      return (
        <div className="lobby-wrap">
          <Stars/>
          <div className="lobby-title">RubikRace</div>
          <div className="lobby-sub">5 × 5 · SLIDING PUZZLE</div>
          <div className="lobby-card">
            {/* Name */}
            <div>
              <div className="lobby-label">Tu nombre</div>
              <input className="lobby-input" maxLength={20} placeholder="Cómo te llamas…"
                value={name} onChange={e=>setName(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter'&&nameOk&&!showJoin) handleNew(); }}
              />
            </div>

            <div className="lobby-divider"/>

            {/* New game */}
            <button className="lobby-btn primary" disabled={!nameOk||loading} onClick={handleNew}>
              🎮 Nueva partida
            </button>

            {/* Join */}
            {!showJoin
              ? <button className="lobby-btn secondary" disabled={!nameOk} onClick={()=>{ setShowJoin(true); setError(''); }}>
                  🔗 Unirse con código
                </button>
              : <div>
                  <div className="lobby-label" style={{marginBottom:'8px'}}>Código de partida</div>
                  <div className="join-row">
                    <input className="code-input" maxLength={4} placeholder="XXXX"
                      value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())}
                      onKeyDown={e=>{ if(e.key==='Enter') handleJoin(); }}
                      autoFocus
                    />
                    <button className="lobby-btn primary" style={{flex:'0 0 auto',padding:'12px 18px'}}
                      disabled={loading} onClick={handleJoin}>
                      {loading ? '…' : '→'}
                    </button>
                  </div>
                  {error && <div className="lobby-error" style={{marginTop:'8px'}}>{error}</div>}
                </div>
            }
          </div>

          {/* Active games list */}
          {games.length > 0 && (
            <div style={{width:'100%',maxWidth:'360px',marginTop:'20px'}}>
              <div style={{fontSize:'10px',color:'rgba(255,255,255,.3)',letterSpacing:'.15em',
                           textTransform:'uppercase',textAlign:'center',marginBottom:'10px'}}>
                Partidas en curso
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
                {games.map(g=>(
                  <button key={g.code} onClick={()=>handleJoinGame(g.code)} disabled={loading||!nameOk}
                          style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                                  width:'100%',padding:'12px 16px',
                                  background:'rgba(255,255,255,.04)',
                                  border:'1px solid rgba(156,90,255,.2)',
                                  borderRadius:'12px',cursor:'pointer',
                                  transition:'all .2s',color:'#fff',
                                  backdropFilter:'blur(10px)',
                                  opacity: (loading||!nameOk) ? .45 : 1}}
                          onMouseEnter={e=>{e.currentTarget.style.background='rgba(156,90,255,.12)';e.currentTarget.style.borderColor='rgba(156,90,255,.45)';}}
                          onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.04)';e.currentTarget.style.borderColor='rgba(156,90,255,.2)';}}>
                    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                      <span style={{fontSize:'16px'}}>🎮</span>
                      <span style={{fontSize:'14px',fontWeight:600,color:'rgba(255,255,255,.85)'}}>{g.host}</span>
                    </div>
                    <span style={{fontFamily:'monospace',fontSize:'15px',fontWeight:900,
                                  color:'#c89fff',letterSpacing:'.2em',
                                  background:'rgba(156,90,255,.12)',
                                  padding:'3px 10px',borderRadius:'7px'}}>
                      {g.code}
                    </span>
                  </button>
                ))}
              </div>
              {error && <div className="lobby-error" style={{marginTop:'10px',textAlign:'center'}}>{error}</div>}
            </div>
          )}
        </div>
      );
    }
    /* ─── ScoresModal ─── */
    function ScoresModal({ onClose }) {
      const [scores, setScores] = useState([]);
      const fmtSec = s => { if(s==null) return '–'; const m=Math.floor(s/60); return `${m}:${String(s%60).padStart(2,'0')}`; };
      useEffect(() => {
        window.__fbListenScores?.(setScores);
        return () => window.__fbUnlistenScores?.();
      }, []);
      return (
        <div style={{position:'fixed',inset:0,zIndex:7000,display:'flex',alignItems:'center',
                     justifyContent:'center',background:'rgba(0,0,0,.75)',backdropFilter:'blur(8px)'}}
             onClick={onClose}>
          <div style={{background:'rgba(15,10,35,.97)',border:'1px solid rgba(156,90,255,.3)',
                       borderRadius:'20px',padding:'24px',width:'min(94vw,400px)',
                       boxShadow:'0 30px 80px rgba(0,0,0,.7)'}}
               onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'18px'}}>
              <div style={{color:'#fff',fontSize:'18px',fontWeight:800}}>🏆 Mejores jugadores</div>
              <button onClick={onClose} style={{background:'none',border:'none',color:'rgba(255,255,255,.4)',fontSize:'22px',cursor:'pointer',lineHeight:1}}>×</button>
            </div>
            {scores.length === 0
              ? <div style={{color:'rgba(255,255,255,.3)',textAlign:'center',padding:'24px',fontSize:'14px'}}>Aún no hay scores 🎮</div>
              : <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                  <thead>
                    <tr style={{color:'rgba(255,255,255,.35)',fontSize:'10px',letterSpacing:'.1em',textTransform:'uppercase'}}>
                      <th style={{textAlign:'left',padding:'6px 6px'}}>#</th>
                      <th style={{textAlign:'left',padding:'6px 6px'}}>Jugador</th>
                      <th style={{textAlign:'center',padding:'6px 6px'}}>🏅</th>
                      <th style={{textAlign:'center',padding:'6px 6px'}}>⏱</th>
                      <th style={{textAlign:'center',padding:'6px 6px'}}>↔</th>
                    </tr>
                  </thead>
                  <tbody>
                    {scores.map((s,i)=>(
                      <tr key={s.name} style={{borderTop:'1px solid rgba(255,255,255,.06)',background:i===0?'rgba(255,215,0,.05)':''}}>
                        <td style={{padding:'10px 6px',color:['#FFD700','#C0C0C0','#CD7F32'][i]||'rgba(255,255,255,.3)',fontWeight:700}}>
                          {['🥇','🥈','🥉'][i]||i+1}
                        </td>
                        <td style={{padding:'10px 6px',color:'#fff',fontWeight:600,maxWidth:'110px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</td>
                        <td style={{padding:'10px 6px',textAlign:'center',color:'#c89fff',fontWeight:700}}>{s.wins}</td>
                        <td style={{padding:'10px 6px',textAlign:'center',color:'rgba(255,255,255,.7)',fontFamily:'monospace'}}>{fmtSec(s.bestSec)}</td>
                        <td style={{padding:'10px 6px',textAlign:'center',color:'rgba(255,255,255,.7)',fontFamily:'monospace'}}>{s.bestMoves??'–'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
            }
          </div>
        </div>
      );
    }
    function TutorialOverlay({ step, hl, onNext, onClose }) {
      if (!step || !hl) return null;
      const { pat, ctr } = hl;
      const pad = 10;
      const vw = window.innerWidth, vh = window.innerHeight;

      const pPerim = 2*((pat.width+pad*2)+(pat.height+pad*2));
      const cPerim = ctr ? 2*((ctr.width+pad*2)+(ctr.height+pad*2)) : 0;

      // Curved arrow: from center of pattern pill → center of board 3×3
      const aFx = pat.left+pat.width/2, aFy = pat.top+pat.height/2;
      const aTx = ctr ? ctr.left+ctr.width/2 : vw/2;
      const aTy = ctr ? ctr.top+ctr.height/2 : vh/2;

      // Text: below spotlight (flip above if too close to bottom)
      const ptY = pat.bottom+pad+16+30 < vh ? pat.bottom+pad+16 : pat.top-pad-46;
      const ctY = ctr && ctr.bottom+pad+16+50 < vh ? ctr.bottom+pad+16 : ctr ? ctr.top-pad-56 : vh/2+120;
      const ctX = ctr ? ctr.left+ctr.width/2 : vw/2;

      return (
        <div style={{position:'fixed',inset:0,zIndex:8000,cursor:'pointer'}}
             onClick={step===1 ? onNext : onClose}>
          <svg width={vw} height={vh} style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'visible'}}>
            <defs>
              <mask id="tut-mask" maskUnits="userSpaceOnUse">
                <rect x={0} y={0} width={vw} height={vh} fill="white"/>
                {step===1 && <rect x={pat.left-pad} y={pat.top-pad}
                                   width={pat.width+pad*2} height={pat.height+pad*2} fill="black" rx="16"/>}
                {step===2 && ctr && <rect x={ctr.left-pad} y={ctr.top-pad}
                                          width={ctr.width+pad*2} height={ctr.height+pad*2} fill="black" rx="14"/>}
              </mask>
              <marker id="tut-ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0,10 3.5,0 7" fill="#FFD700"/>
              </marker>
            </defs>

            {/* dark veil with cutout */}
            <rect x={0} y={0} width={vw} height={vh} fill="rgba(0,0,0,.84)" mask="url(#tut-mask)"/>

            {/* animated border – step 1: pattern pill */}
            {step===1 && (
              <rect x={pat.left-pad} y={pat.top-pad}
                    width={pat.width+pad*2} height={pat.height+pad*2}
                    fill="none" stroke="#FFD700" strokeWidth="3" rx="16"
                    strokeDasharray={pPerim} strokeDashoffset={pPerim}
                    style={{animation:'tutDraw .8s ease .15s forwards'}}/>
            )}

            {/* animated border – step 2: center tiles */}
            {step===2 && ctr && (
              <rect x={ctr.left-pad} y={ctr.top-pad}
                    width={ctr.width+pad*2} height={ctr.height+pad*2}
                    fill="none" stroke="#FFD700" strokeWidth="3" rx="14"
                    strokeDasharray={cPerim} strokeDashoffset={cPerim}
                    style={{animation:'tutDraw .8s ease .15s forwards'}}/>
            )}

            {/* curved arrow – step 2 */}
            {step===2 && ctr && (
              <path d={`M${aFx},${aFy} C${aFx},${(aFy*2+aTy)/3} ${aTx},${(aFy+aTy*2)/3} ${aTx},${aTy}`}
                    fill="none" stroke="#FFD700" strokeWidth="2.5"
                    strokeDasharray="8 5" markerEnd="url(#tut-ah)"
                    style={{animation:'tutArrow .5s ease 1.1s both'}}/>
            )}
          </svg>

          {/* label – step 1 */}
          {step===1 && (
            <div style={{position:'absolute',left:pat.left+pat.width/2,top:ptY,
                         transform:'translateX(-50%)',pointerEvents:'none',
                         color:'#FFD700',fontSize:'clamp(16px,4vw,22px)',fontWeight:800,
                         textShadow:'0 0 30px rgba(255,215,0,.95),0 2px 10px rgba(0,0,0,.9)',
                         letterSpacing:'.04em',textAlign:'center',whiteSpace:'nowrap',
                         animation:'tutFadeUp .45s ease 1s both'}}>
              Crea este patrón
            </div>
          )}

          {/* label – step 2 */}
          {step===2 && (
            <div style={{position:'absolute',left:ctX,top:ctY,
                         transform:'translateX(-50%)',pointerEvents:'none',
                         color:'#FFD700',fontSize:'clamp(15px,3.5vw,20px)',fontWeight:800,
                         textShadow:'0 0 30px rgba(255,215,0,.95),0 2px 10px rgba(0,0,0,.9)',
                         letterSpacing:'.03em',textAlign:'center',
                         animation:'tutFadeUp .45s ease 1.1s both'}}>
              En estas 9 fichas centrales.<br/>¡Suerte!
            </div>
          )}

          {/* hint */}
          <div style={{position:'absolute',bottom:22,left:'50%',transform:'translateX(-50%)',
                       color:'rgba(255,255,255,.28)',fontSize:'11px',letterSpacing:'.14em',
                       pointerEvents:'none'}}>
            {step===1 ? 'TOCA PARA CONTINUAR ›' : 'TOCA PARA CERRAR ×'}
          </div>
        </div>
      );
    }

    /* ─── Game ─── */
    function Game({ playerName, gameCode, onLeave }) {
      const [tiles,       setTiles]        = useState(()=>shuffle(buildSolved()));
      const [moves,       setMoves]        = useState(0);
      const [time,        setTime]         = useState(0);
      const [finished,    setFinished]     = useState(false);
      const [lastMoved,   setLastMoved]    = useState(null);
      const [rrPat,       setRrPat]        = useState([]);
      const [activePl,    setActivePl]     = useState([]);
      const [showConfirm, setShowConfirm]  = useState(false);
      const [copied,      setCopied]       = useState(false);
      const [tutStep,     setTutStep]      = useState(0);
      const [tutHl,       setTutHl]        = useState(null);
      const [showScores,  setShowScores]   = useState(false);
      const [countdown,   setCountdown]    = useState(null);
      const timerRef    = useRef(null);
      const finishedRef = useRef(false);
      const presenceRef = useRef(null);
      const boardRef    = useRef(null);
      const activePlRef = useRef([]);

      const startCountdown = useCallback(() => {
        clearInterval(timerRef.current); timerRef.current = null;
        setTime(0); setCountdown(3);
        setTimeout(() => setCountdown(2), 1000);
        setTimeout(() => setCountdown(1), 2000);
        setTimeout(() => setCountdown(null), 3000);
      }, []);

      const openTutorial = () => {
        const toggleEl = document.getElementById('rr-toggle');
        const pat = toggleEl ? toggleEl.getBoundingClientRect() : null;
        if (!pat) return;
        const centerEls = boardRef.current?.querySelectorAll('[data-tut="center"]');
        let ctr = null;
        if (centerEls && centerEls.length > 0) {
          const rs = [...centerEls].map(el => el.getBoundingClientRect());
          const l=Math.min(...rs.map(r=>r.left)), t=Math.min(...rs.map(r=>r.top));
          const ri=Math.max(...rs.map(r=>r.right)), b=Math.max(...rs.map(r=>r.bottom));
          ctr = { left:l, top:t, right:ri, bottom:b, width:ri-l, height:b-t };
        }
        setTutHl({ pat, ctr });
        setTutStep(1);
      };

      // Delete lobby entry on browser close
      useEffect(() => {
        const onUnload = () => window.__fbLobbyDeleteNow?.(gameCode);
        window.addEventListener('beforeunload', onUnload);
        return () => window.removeEventListener('beforeunload', onUnload);
      }, [gameCode]);

      // Show widget when in game
      useEffect(() => {
        document.getElementById('rr-widget').style.display = '';
        return () => { document.getElementById('rr-widget').style.display = 'none'; };
      }, []);

      // Presence heartbeat
      const sendPresence = useCallback((moving=false) => {
        if (typeof window.__fbUpdatePresence==='function' && playerName.trim())
          window.__fbUpdatePresence(SESSION_UID, playerName.trim(), moving);
      }, [playerName]);

      useEffect(() => {
        sendPresence(false);
        presenceRef.current = setInterval(()=>sendPresence(false), 8000);
        return () => clearInterval(presenceRef.current);
      }, []);

      // Pattern sync
      useEffect(() => {
        if (window.rrPattern.length) setRrPat([...window.rrPattern]);
        const onPat = e => {
          setRrPat([...e.detail]); setFinished(false); finishedRef.current=false;
          if (activePlRef.current.length > 1) {
            startCountdown();
          } else {
            if(!timerRef.current) timerRef.current=setInterval(()=>setTime(t=>t+1),1000);
          }
        };
        window.addEventListener('rrPatternChange', onPat);
        return () => window.removeEventListener('rrPatternChange', onPat);
      }, [startCountdown]);

      // Timer — paused during countdown
      useEffect(() => {
        if (!finished && countdown === null) { timerRef.current=setInterval(()=>setTime(t=>t+1),1000); }
        else { clearInterval(timerRef.current); timerRef.current=null; }
        return () => { clearInterval(timerRef.current); timerRef.current=null; };
      }, [finished, countdown]);

      // Global reset
      useEffect(() => {
        const onReset = () => doLocalReset();
        window.addEventListener('rrGlobalReset', onReset);
        return () => window.removeEventListener('rrGlobalReset', onReset);
      }, []);

      // Presence change
      useEffect(() => {
        const onP = e => { const p=e.detail||[]; setActivePl(p); activePlRef.current=p; };
        window.addEventListener('rrPresenceChange', onP);
        return () => window.removeEventListener('rrPresenceChange', onP);
      }, []);

      const handleTile = useCallback((idx) => {
        if (finished || countdown !== null) return;
        const ei=tiles.indexOf(null);
        if (!canMove(idx,ei)) return;
        const nt=[...tiles]; [nt[ei],nt[idx]]=[nt[idx],nt[ei]];
        setTiles(nt); setMoves(m=>m+1); setLastMoved(ei);
        sendPresence(true);
        window.__fbUpdateLobbyActivity?.(gameCode);
        if (!finishedRef.current && checkMatch(nt,rrPat)) {
          finishedRef.current=true; setFinished(true);
          const ft=fmt(time+1), fm=moves+1;
          setTimeout(()=>{
            window.__fbSendFinish?.(playerName, ft, fm);
            window.__fbUpdateFinishPresence?.(SESSION_UID, playerName, ft, fm);
            window.__fbUpdateScore?.(playerName, time+1, fm);
            window.__fbScheduleLobbyDelete?.(gameCode);
          },50);
        }
      }, [tiles, finished, countdown, rrPat, time, moves, sendPresence, gameCode]);

      const doLocalReset = () => {
        setTiles(shuffle(buildSolved())); setMoves(0); setTime(0); setFinished(false);
        setLastMoved(null); finishedRef.current=false;
        window.__fbUpdatePresence?.(SESSION_UID, playerName, false);
      };

      const handleReset = () => {
        if (activePl.length > 1) { setShowConfirm(true); }
        else doReset();
      };
      const doReset = () => {
        setShowConfirm(false);
        window.rrShuffle?.();
        window.__fbSendReset?.() ?? doLocalReset();
      };

      const copyCode = () => {
        navigator.clipboard.writeText(gameCode).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
      };

      const handleLeave = () => {
        clearInterval(timerRef.current); clearInterval(presenceRef.current);
        window.__fbLeaveGame?.();
        window.__fbScheduleLobbyDelete?.(gameCode);
        window.rrPattern=[];
        onLeave();
      };

      const ei=tiles.indexOf(null);

      return (
        <div style={{
          minHeight:'100vh',
          background:'radial-gradient(ellipse at 30% 20%,#1a1035 0%,#0a0818 60%,#000508 100%)',
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
          fontFamily:"'Trebuchet MS','Segoe UI',sans-serif",padding:'20px',position:'relative',overflow:'hidden',
        }}>
          <Stars/>

          {/* Help button */}
          <button className="help-btn" onClick={openTutorial} title="Ayuda">?</button>
          {/* Scores button */}
          <button className="help-btn" onClick={()=>setShowScores(true)} title="Scores"
                  style={{left:'58px',fontSize:'17px'}}>🏆</button>

          {/* Top row: title + leave */}
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',width:'100%',maxWidth:'380px',marginBottom:'16px'}}>
            <div>
              <h1 style={{
                margin:0,fontSize:'clamp(20px,5vw,28px)',fontWeight:900,letterSpacing:'.15em',textTransform:'uppercase',
                background:'linear-gradient(90deg,#7BAEF5,#E8B800,#FFA85C,#5FD98A)',
                backgroundSize:'300% auto',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',
                animation:'shimmer 4s linear infinite',
              }}>RubikRace</h1>
              <p style={{margin:'2px 0 0',color:'rgba(255,255,255,.3)',fontSize:'11px',letterSpacing:'.15em'}}>5 × 5 · SLIDING PUZZLE</p>
            </div>
            <button className="leave-btn" onClick={handleLeave}>✕ Salir</button>
          </div>

          {/* Game code + name */}
          <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'14px',width:'100%',maxWidth:'380px',flexWrap:'wrap'}}>
            <div className="game-code-badge" onClick={copyCode} title="Copiar código">
              <div>
                <div className="code-label">Partida</div>
                <div className="code-value">{gameCode}</div>
              </div>
              <div className="copy-icon">{copied ? '✓' : '⧉'}</div>
            </div>
            {copied && <span className="copied-hint">¡Copiado!</span>}
            <div className="name-input-wrap" style={{flex:1,minWidth:'120px',margin:0}}>
              <label>👤</label>
              <span style={{color:'#fff',fontWeight:600,fontSize:'14px'}}>{playerName}</span>
            </div>
          </div>

          {/* Stats */}
          <div style={{display:'flex',gap:'28px',marginBottom:'16px',background:'rgba(255,255,255,.06)',borderRadius:'12px',padding:'10px 28px',border:'1px solid rgba(255,255,255,.1)',backdropFilter:'blur(8px)'}}>
            {[{label:'MOVIMIENTOS',value:moves},{label:'TIEMPO',value:fmt(time)}].map(s=>(
              <div key={s.label} style={{textAlign:'center'}}>
                <div style={{fontSize:'22px',fontWeight:800,color:'#fff',lineHeight:1}}>{s.value}</div>
                <div style={{fontSize:'10px',color:'rgba(255,255,255,.4)',letterSpacing:'.12em',marginTop:'2px'}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Board */}
          <div style={{position:'relative'}} ref={boardRef}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,var(--tile))',gap:'5px',padding:'12px',background:'rgba(255,255,255,.04)',borderRadius:'16px',border:'1px solid rgba(255,255,255,.08)',boxShadow:'0 20px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1)'}}>
              {tiles.map((tile,idx)=>{
                const isCenter = CENTER.includes(idx);
                if(tile===null) return <div key="empty" data-tut={isCenter?'center':undefined} style={{width:'var(--tile)',height:'var(--tile)',borderRadius:'8px',background:'rgba(0,0,0,.3)',border:'2px dashed rgba(255,255,255,.08)'}}/>;
                const c=colorMap[tile.colorId], isAdj=canMove(idx,ei);
                return (
                  <button key={`${tile.colorId}-${tile.num}`} className="tile-btn"
                          data-tut={isCenter?'center':undefined}
                          onClick={()=>handleTile(idx)} style={{
                    width:'var(--tile)',height:'var(--tile)',borderRadius:'8px',border:'none',
                    cursor:isAdj?'pointer':'default',
                    background:`linear-gradient(145deg,${c.shine} 0%,${c.bg} 50%,${c.shadow} 100%)`,
                    boxShadow:`0 4px 0 ${c.shadow},0 6px 16px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.25)`,
                    transition:'transform .1s,filter .1s',
                    transform:isAdj?'scale(1.02)':'scale(1)',
                    filter:isAdj?'brightness(1.1)':'brightness(1)',
                    animation:idx===lastMoved?'tileSlide .15s ease':'none',
                    position:'relative',overflow:'hidden',
                  }}>
                    <div style={{position:'absolute',top:0,left:0,right:0,height:'45%',borderRadius:'8px 8px 50% 50%',background:'linear-gradient(to bottom,rgba(255,255,255,.2),transparent)',pointerEvents:'none'}}/>
                  </button>
                );
              })}
            </div>
            {finished && <div className="finished-frame"><div className="finished-text">Finished!!</div></div>}
          </div>

          {/* Reset */}
          <button onClick={handleReset} style={{marginTop:'18px',padding:'11px 32px',borderRadius:'10px',border:'1px solid rgba(255,255,255,.15)',background:'rgba(255,255,255,.07)',color:'#fff',fontSize:'13px',fontWeight:700,letterSpacing:'.15em',cursor:'pointer',transition:'all .2s',textTransform:'uppercase'}}>
            ↺ Nuevo Juego
          </button>

          {/* Countdown overlay */}
          {countdown !== null && (
            <div style={{position:'fixed',inset:0,zIndex:6000,display:'flex',
                         flexDirection:'column',alignItems:'center',justifyContent:'center',
                         background:'rgba(0,0,0,.82)',backdropFilter:'blur(4px)'}}>
              <div style={{fontFamily:"'Pacifico',cursive",fontSize:'clamp(20px,5vw,30px)',
                           color:'rgba(255,255,255,.85)',
                           textShadow:'0 0 30px rgba(255,255,255,.5)',
                           marginBottom:'20px',letterSpacing:'.06em'}}>
                ¡Prepárate!
              </div>
              <div key={countdown} style={{fontFamily:"'Pacifico',cursive",
                           fontSize:'clamp(90px,22vw,130px)',lineHeight:1,
                           color:'#FFD700',
                           textShadow:'0 0 60px rgba(255,215,0,.9),0 0 120px rgba(255,215,0,.4)',
                           animation:'countPulse .55s ease'}}>
                {countdown}
              </div>
            </div>
          )}

          {/* Scores modal */}
          {showScores && <ScoresModal onClose={()=>setShowScores(false)}/>}

          {/* Tutorial */}
          <TutorialOverlay step={tutStep} hl={tutHl}
            onNext={()=>setTutStep(2)} onClose={()=>setTutStep(0)}/>

          {/* Confirm modal */}
          {showConfirm && (
            <div className="confirm-backdrop" onClick={()=>setShowConfirm(false)}>
              <div className="confirm-box" onClick={e=>e.stopPropagation()}>
                <div className="icon">🎮</div>
                <h4>¿Nuevo juego?</h4>
                <p>Hay <strong style={{color:'#c89fff'}}>{activePl.length} jugadores</strong> conectados.<br/>Esto reiniciará el tiempo y el patrón para todos.</p>
                <div className="confirm-btns">
                  <button className="confirm-btn-no"  onClick={()=>setShowConfirm(false)}>Cancelar</button>
                  <button className="confirm-btn-yes" onClick={doReset}>¡Sí, reiniciar!</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ─── App root ─── */
    function App() {
      const [phase,      setPhase]      = useState('lobby');
      const [playerName, setPlayerName] = useState('');
      const [gameCode,   setGameCode]   = useState('');

      const handleJoin = (name, code) => {
        setPlayerName(name); setGameCode(code); setPhase('game');
      };
      const handleLeave = () => {
        setPhase('lobby'); setPlayerName(''); setGameCode('');
      };

      if (phase === 'lobby') return <Lobby onJoin={handleJoin} />;
      return <Game playerName={playerName} gameCode={gameCode} onLeave={handleLeave} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
