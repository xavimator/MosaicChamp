  if ('serviceWorker' in navigator) {

      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .catch(err => console.warn('SW registro fallido:', err));

  <script>
  /* ── Sonidos — Chrome + Safari/iOS ── */
  (() => {
    let _ctx = null;
    let _masterGain = null;

    // ── Volumen / silencio global (persistido) ──
    window.__soundVolume = (() => {
      const v = parseFloat(localStorage.getItem('mc-sound-volume'));
      return isNaN(v) ? 1 : Math.min(1, Math.max(0, v));
    })();
    window.__soundMuted = localStorage.getItem('mc-sound-muted') === '1';

    const getCtx = () => {
      if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
      return _ctx;
    };

    // Nodo de ganancia maestro: todos los sonidos pasan por aquí antes del destino
    const getMasterGain = (c) => {
      if (!_masterGain) {
        _masterGain = c.createGain();
        _masterGain.gain.value = window.__soundMuted ? 0 : window.__soundVolume;
        _masterGain.connect(c.destination);
      }
      return _masterGain;
    };

    window.setSoundVolume = (v) => {
      window.__soundVolume = Math.min(1, Math.max(0, v));
      localStorage.setItem('mc-sound-volume', String(window.__soundVolume));
      if (_masterGain) _masterGain.gain.value = window.__soundMuted ? 0 : window.__soundVolume;
    };

    window.setSoundMuted = (m) => {
      window.__soundMuted = !!m;
      localStorage.setItem('mc-sound-muted', window.__soundMuted ? '1' : '0');
      if (_masterGain) _masterGain.gain.value = window.__soundMuted ? 0 : window.__soundVolume;
    };

    // Desbloqueo: buffer silencioso (necesario en Safari) + resume
    const unlock = () => {
      try {
        const c = getCtx();
        if (c.state === 'suspended') {
          // Buffer silencioso: desbloquea Safari
          const buf = c.createBuffer(1, 1, 22050);
          const src = c.createBufferSource();
          src.buffer = buf;
          src.connect(c.destination);
          src.start(0);
          c.resume();
        }
      } catch(e) {}
    };

    // Desbloquear en cualquier interacción del usuario
    ['touchstart', 'touchend', 'mousedown', 'click'].forEach(ev =>
      document.addEventListener(ev, unlock, { capture: true, passive: true })
    );

    // Reanudar cuando la pestaña vuelve a primer plano
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') unlock();
    });

    // Reproducir: directo si running (Chrome), resume().then si suspended (Safari)
    const play = (fn) => {
      try {
        const c = getCtx();
        if (c.state === 'running') {
          fn(c);
        } else {
          unlock();
          c.resume().then(() => { try { fn(c); } catch(e) { console.warn('audio:', e); } });
        }
      } catch(e) { console.warn('audio init:', e); }
    };

    window.playClack = () => play(c => {
      const t = c.currentTime;
      const sz = Math.floor(c.sampleRate * 0.014);
      const buf = c.createBuffer(1, sz, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
      const click = c.createBufferSource(); click.buffer = buf;
      const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2800;
      const cg = c.createGain();
      cg.gain.setValueAtTime(1.0, t);
      cg.gain.exponentialRampToValueAtTime(0.001, t + 0.014);
      click.connect(hp); hp.connect(cg); cg.connect(getMasterGain(c));
      click.start(t);
      const osc = c.createOscillator(), og = c.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(180, t);
      osc.frequency.exponentialRampToValueAtTime(70, t + 0.045);
      og.gain.setValueAtTime(0.55, t);
      og.gain.exponentialRampToValueAtTime(0.001, t + 0.055);
      osc.connect(og); og.connect(getMasterGain(c));
      osc.start(t); osc.stop(t + 0.06);
    });

    window.playWood = () => play(c => {
      const t = c.currentTime;
      const sz = Math.floor(c.sampleRate * 0.2);
      const buf = c.createBuffer(1, sz, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource(); src.buffer = buf;
      const bp = c.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 280; bp.Q.value = 4;
      const gn = c.createGain();
      gn.gain.setValueAtTime(0.7, t);
      gn.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      src.connect(bp); bp.connect(gn); gn.connect(getMasterGain(c));
      src.start(t);
      const osc = c.createOscillator(), go = c.createGain();
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(160, t + 0.15);
      go.gain.setValueAtTime(0.25, t);
      go.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      osc.connect(go); go.connect(getMasterGain(c));
      osc.start(t); osc.stop(t + 0.2);
    });

    window.playTickTock = () => play(c => {
      const t = c.currentTime;
      for (let i = 0; i < 4; i++) {
        const when = t + i * 0.38;
        const freq = i % 2 === 0 ? 820 : 560;
        const osc = c.createOscillator(), g = c.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(0.45, when + 0.004);
        g.gain.exponentialRampToValueAtTime(0.001, when + 0.07);
        osc.connect(g); g.connect(getMasterGain(c));
        osc.start(when); osc.stop(when + 0.08);
      }
    });

    window.playChime = () => play(c => {
      const t = c.currentTime;
      [1760, 2349, 2793].forEach((freq, i) => {
        const when = t + i * 0.045;
        const osc = c.createOscillator(), g = c.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(0.22 - i * 0.04, when + 0.008);
        g.gain.exponentialRampToValueAtTime(0.0008, when + 0.32);
        osc.connect(g); g.connect(getMasterGain(c));
        osc.start(when); osc.stop(when + 0.34);
      });
    });

    window.playWhoosh = () => play(c => {
      const t = c.currentTime;
      const osc1 = c.createOscillator(), g1 = c.createGain();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(180, t);
      osc1.frequency.exponentialRampToValueAtTime(1400, t + 0.18);
      g1.gain.setValueAtTime(0.28, t);
      g1.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc1.connect(g1); g1.connect(getMasterGain(c));
      osc1.start(t); osc1.stop(t + 0.22);
      [880, 1320, 1760].forEach((freq, i) => {
        const when = t + 0.15 + i * 0.04;
        const osc = c.createOscillator(), g = c.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(0.3 - i * 0.06, when + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, when + 0.35);
        osc.connect(g); g.connect(getMasterGain(c));
        osc.start(when); osc.stop(when + 0.38);
      });
    });

    function loadGiggleBuffer(c) {
      if (_giggleBuffer)  return Promise.resolve(_giggleBuffer);
      if (_giggleLoading) return _giggleLoading;
      const bin = atob(GIGGLE_MP3_B64);
      const bytes = Uint8Array.from(bin, ch => ch.charCodeAt(0));
      _giggleLoading = c.decodeAudioData(bytes.buffer)

        src.connect(getMasterGain(c));
        src.start(c.currentTime);

    // de una risa, y un pequeño "whoop" de tono en cada una.
    window.playGiggleSynth = () => play(c => {
      const t = c.currentTime;
      const notes = 5;
      for (let i = 0; i < notes; i++) {
        const when = t + i * 0.12;
        const dur = 0.09;
        const base = 520 + Math.random() * 120 + i * 14;
        [0, 5].forEach((detune, vi) => {
          const osc = c.createOscillator(), g = c.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(base + detune, when);
          osc.frequency.linearRampToValueAtTime(base * 1.35 + detune, when + dur * 0.5);
          osc.frequency.linearRampToValueAtTime(base * 0.92 + detune, when + dur);
          g.gain.setValueAtTime(0, when);
          g.gain.linearRampToValueAtTime(vi === 0 ? 0.16 : 0.10, when + 0.015);
          g.gain.exponentialRampToValueAtTime(0.0008, when + dur);
          osc.connect(g); g.connect(getMasterGain(c));
          osc.start(when); osc.stop(when + dur + 0.02);
        });
      }
    });

    window.playMarseillaiseHelp = () => play(c => {
      const BPM = 210;
      const q   = 60 / BPM;
      const e   = q * 0.25;   // corchea
      const ed  = q * 0.75;   // corchea con punto
      const qd  = q * 1.5;    // negra con punto
      const notes = [
        {f: 293.66, dur: e  },  // D4  "Al-"
        {f: 293.66, dur: ed },  // D4  "lons"
        {f: 293.66, dur: e  },  // D4  "en-"
        {f: 392.00, dur: q  },  // G4  "fants"
        {f: 392.00, dur: q  },  // G4  "de"
        {f: 440.00, dur: q  },  // A4  "la"
        {f: 440.00, dur: q  },  // A4  "Pa-"
        {f: 587.33, dur: qd },  // D5  "tri-"
        {f: 493.88, dur: q*0.5},// B4  "e"
        {f: 392.00, dur: ed },  // G4  "le"
      ];

      let when = c.currentTime + 0.06;
      notes.forEach(({f, dur}) => {
        const gate = dur * 0.86;
        const osc  = c.createOscillator();
        const osc2 = c.createOscillator();
        const vib  = c.createOscillator();
        const vibG = c.createGain();
        const lp   = c.createBiquadFilter();
        const g    = c.createGain();

        osc.type  = 'sawtooth';
        osc2.type = 'sawtooth';
        osc.frequency.value  = f;
        osc2.frequency.value = f * 1.003;

        vib.type = 'sine';
        vib.frequency.value = 5.5;
        vibG.gain.setValueAtTime(0, when);
        vibG.gain.linearRampToValueAtTime(f * 0.008, when + gate * 0.55);
        vib.connect(vibG);
        vibG.connect(osc.frequency);
        vibG.connect(osc2.frequency);

        lp.type = 'lowpass';
        lp.Q.value = 2.8;
        lp.frequency.setValueAtTime(f * 5.5, when);
        lp.frequency.linearRampToValueAtTime(f * 2.2, when + gate);

        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(0.32, when + 0.045);
        g.gain.linearRampToValueAtTime(0.26, when + 0.12);
        g.gain.setValueAtTime(0.26, when + gate - 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, when + gate);

        osc.connect(lp); osc2.connect(lp); lp.connect(g); g.connect(getMasterGain(c));
        osc.start(when);  osc.stop(when + gate + 0.02);
        osc2.start(when); osc2.stop(when + gate + 0.02);
        vib.start(when);  vib.stop(when + gate + 0.02);
        when += dur;
      });
    });

          winsTotal: (s.winsSolo||0)+(s.winsMulti||0),
          bestSecTotal: [s.bestSecSolo,s.bestSecMulti].filter(x=>x!=null).reduce((a,b)=>Math.min(a,b), Infinity),
        })).sort((a,b)=>b.winsTotal-a.winsTotal||(a.bestSecTotal-b.bestSecTotal));
        cb({ combined, multi: srt('winsMulti','bestSecMulti'), solo: srt('winsSolo','bestSecSolo') });
      });
    };
    window.__fbUnlistenScores = () => { if(scoresUnsub){scoresUnsub();scoresUnsub=null;} };

    // Scores por nivel específico
    let levelScoresUnsub = null;
    window.__fbListenLevelScores = (level, cb) => {
      if (levelScoresUnsub) { levelScoresUnsub(); levelScoresUnsub = null; }
      levelScoresUnsub = onValue(ref(db, `rubitrack/scoresByLevel/L${level}`), snap => {
        const raw = [];
        snap.forEach(c => { const v=c.val(); if(v?.name && v.name.toLowerCase()!=='rubiking') raw.push(v); });
        const byName = {};
        raw.forEach(s => {
          const k = s.name.toLowerCase();
          if (!byName[k]) { byName[k]={...s}; return; }
          const b = byName[k];
          ['Solo','Multi'].forEach(m => {
            const wk=`wins${m}`, sk=`bestSec${m}`, mk=`bestMoves${m}`;
            b[wk] = Math.max(b[wk]||0, s[wk]||0);
            if (s[sk]!=null && (b[sk]==null||s[sk]<b[sk])) b[sk]=s[sk];
            if (s[mk]!=null && (b[mk]==null||s[mk]<b[mk])) b[mk]=s[mk];
          });
        });
        const all = Object.values(byName);
        const srt = (w,t) => [...all].filter(s=>(s[w]||0)>0).sort((a,b)=>(b[w]||0)-(a[w]||0)||((a[t]??1e9)-(b[t]??1e9)));
        cb({ multi: srt('winsMulti','bestSecMulti'), solo: srt('winsSolo','bestSecSolo') });
      });
    };
    window.__fbUnlistenLevelScores = () => { if(levelScoresUnsub){levelScoresUnsub();levelScoresUnsub=null;} };

    window.__fbRegisterLobby = (code, host, level) =>
      set(ref(db, `rubitrack/lobby/${code}`), { host, ts: Date.now(), lastMove: Date.now(), level: level||2 });

    // Lee el nivel de una partida ya registrada (para unirse por código)
    window.__fbGetLobbyLevel = async (code) => {
      try {
        const snap = await get(ref(db, `rubitrack/lobby/${code}/level`));
        return snap.val() || 2;
      } catch(e) { return 2; }
    };

    // Update lastMove timestamp on each move
    window.__fbUpdateLobbyActivity = (code) =>
      set(ref(db, `rubitrack/lobby/${code}/lastMove`), Date.now()).catch(()=>{});

    // Delete lobby entries inactive for 2+ minutes
    window.__fbCleanStaleGames = async () => {
      const now = Date.now();
      try {
        const snap = await get(ref(db, 'rubitrack/lobby'));
        snap.forEach(child => {
          const d = child.val();
          const last = d?.lastMove || d?.ts || 0;
          if (now - last > 120000)
            remove(ref(db, `rubitrack/lobby/${child.key}`)).catch(()=>{});
        });
      } catch(e) {}
    };

    const DB_REST = 'https://mosaic-champ-db-default-rtdb.europe-west1.firebasedatabase.app';

    // Schedule lobby entry deletion after delay (default 2 min)
    window.__fbScheduleLobbyDelete = (code, delayMs=120000) => {
      setTimeout(() => {
        set(ref(db, `rubitrack/lobby/${code}/expiresAt`), Date.now());
      }, delayMs);
    };

    // ── Background Sync: cola IndexedDB para reintentar peticiones fallidas ──
    const MC_SYNC_DB = 'mc-sync-queue';
    const MC_SYNC_STORE = 'requests';
    const MC_SYNC_TAG = 'mc-lobby-cleanup';

    function mcOpenQueueDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(MC_SYNC_DB, 1);
        req.onupgradeneeded = () => {
          req.result.createObjectStore(MC_SYNC_STORE, { keyPath: 'id', autoIncrement: true });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function mcQueueSync(url, method) {
      try {
        const db = await mcOpenQueueDB();
        const tx = db.transaction(MC_SYNC_STORE, 'readwrite');
        tx.objectStore(MC_SYNC_STORE).add({ url, method });
        if ('serviceWorker' in navigator && 'SyncManager' in window) {
          const reg = await navigator.serviceWorker.ready;
          await reg.sync.register(MC_SYNC_TAG);
        }
      } catch (e) { /* sin soporte de Background Sync: el dato se pierde, igual que antes */ }
    }

    // Immediate delete via keepalive fetch (works in beforeunload)
    window.__fbLobbyDeleteNow = (code) => {
      const url = `${DB_REST}/rubitrack/lobby/${code}.json`;
      fetch(url, { method:'DELETE', keepalive:true })
        .catch(() => { mcQueueSync(url, 'DELETE'); });
    };

    // Borra todas las entradas del lobby donde host === name (para level up)
    window.__fbDeleteLobbyByHost = async (name) => {
      try {
        const snap = await get(ref(db, 'rubitrack/lobby'));
        snap.forEach(child => {
          if (child.val()?.host === name)
            remove(ref(db, `rubitrack/lobby/${child.key}`)).catch(()=>{});
        });
      } catch(e) {}
    };

    let gamesUnsub = null;
    window.__fbListenGames = (cb) => {
      const lobbyRef = ref(db, 'rubitrack/lobby');
      gamesUnsub = onValue(lobbyRef, snap => {
        const now = Date.now(), list = [];
        snap.forEach(child => {
          const d = child.val();
          if (!d?.host || !d?.ts) return;
          if (d.host.trim().toLowerCase() === 'rubiking') return; // cuenta de test
          if (d.expiresAt && d.expiresAt <= now) return;
          const last = d.lastMove || d.ts;
          if (now - last > 120000) return;           // 2 min inactivity
          if (now - d.ts > 7200000) return;
          list.push({ code: child.key, host: d.host, ts: d.ts, level: d.level || 2 });
        });
        list.sort((a,b) => b.ts - a.ts);
        cb(list.slice(0, 8));
      });
    };
    window.__fbUnlistenGames = () => { if (gamesUnsub) { gamesUnsub(); gamesUnsub = null; } };

    window.__fbReady = true;
    window.dispatchEvent(new Event('fbReady'));
  </script>

    function detectLang() {
      const nav = navigator.language || navigator.userLanguage || 'en';
      const code = nav.toLowerCase().split('-')[0];
      if (LANGS[code]) return code;
      // Regional fallbacks
      if (code === 'gl') return 'pt'; // galician → portuguese
      if (code === 'eu') return 'es'; // basque → spanish
      return 'en';
    }

    window.T = LANGS[detectLang()];
    window.RR_LANG = detectLang();
  })();

<body>
  <div id="root"></div>
  <div id="toast-container"></div>

  <!-- ══ Pattern Widget ══ -->
  <div id="rr-widget" style="display:none">
    <div id="rr-toggle" onclick="rrToggle()">
      <span id="rr-toggle-label">Pattern</span>
      <div class="rr-preview" id="rr-preview"></div>
      <div id="rr-sync-dot" class="connecting"></div>
    </div>
    <div id="finish-notif-area" style="margin-top:8px;display:none;"></div>
    <div id="rr-panel" class="hidden">
      <div id="rr-panel-header">
        <h3 id="rr-panel-title">Pattern</h3>
        <span id="rr-level-badge" style="font-size:11px;color:rgba(255,255,255,.88);font-weight:600;"></span>
        <div id="rr-sync-dot-panel" style="width:7px;height:7px;border-radius:50%;background:#444;transition:background .4s;"></div>
      </div>
      <div id="rr-offline-badge" style="display:none;margin:4px auto 6px;padding:3px 10px;border-radius:20px;
           background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);
           color:rgba(255,160,160,.9);font-size:10px;font-weight:700;letter-spacing:.1em;
           text-transform:uppercase;text-align:center;width:fit-content;">
        ⚡ Offline mode
      </div>
      <p class="rr-tm">Xavimator™</p>
      <div id="rr-status-text"></div>
      <div id="rr-players"></div>
      <div id="rr-grid"></div>
      <div id="rr-manual-hint"></div>
      <button id="rr-shuffle" onclick="rrShuffle()" disabled></button>
      <div id="rr-pattern-tools">
        <button id="rr-image-btn" class="rr-tool-btn" onclick="rrImageButtonClick()" title="Desde imagen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--rr-icon-color,#c89fff)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2.6 8.4a1.9 1.9 0 0 1 1.9-1.9h4.1l1.8 2h7a1.9 1.9 0 0 1 1.9 1.9v6.3a1.9 1.9 0 0 1-1.9 1.9H4.5a1.9 1.9 0 0 1-1.9-1.9z"/>
            <rect x="12.6" y="1.6" width="4.6" height="4.6" rx="1" transform="rotate(-14 14.9 3.9)"/>
            <rect x="16.6" y="5.2" width="3.8" height="3.8" rx="0.9" transform="rotate(11 18.5 7.1)"/>
          </svg>
        </button>
        <button id="rr-manual-btn" class="rr-tool-btn" onclick="rrToggleManualMode()" title="Manual">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <defs>
              <clipPath id="rrToolTileClip"><rect x="3" y="8.6" width="13" height="13" rx="2.3"/></clipPath>
            </defs>
            <g clip-path="url(#rrToolTileClip)">
              <polygon points="3,21.6 3,13.8 9,8.6 15.2,8.6 15.2,10.4 3,21.6" fill="#ff5c5c"/>
              <polygon points="3,21.6 15.2,10.4 15.2,16 8.6,21.6" fill="#ffd23f"/>
              <polygon points="8.6,21.6 15.2,16 15.2,21.6" fill="#4da6ff"/>
            </g>
            <rect x="3" y="8.6" width="13" height="13" rx="2.3" stroke="var(--rr-icon-color,#c89fff)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20.8 2.2L13.4 9.6" stroke="var(--rr-icon-color,#c89fff)" stroke-width="3.1" stroke-linecap="round"/>
            <path d="M10.4 6.6a3.1 3.1 0 0 1 3.4-.6" stroke="var(--rr-icon-color,#c89fff)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M9.2 4.2a6 6 0 0 1 6.6-1.1" stroke="var(--rr-icon-color,#c89fff)" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="rr-validate-btn" class="rr-tool-btn" onclick="rrValidatePattern()" title="Validar patrón (rellena el tablero con tiles suficientes)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--rr-icon-color,#c89fff)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3.2"/>
            <path d="M7.3 12.6l3.1 3.1 6.3-7.4"/>
          </svg>
        </button>
        <button id="rr-save-btn" class="rr-tool-btn" onclick="rrOpenSaveModal()" title="Guardar patrón con nombre">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--rr-icon-color,#c89fff)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4.5 3.5h12l3 3v13a1 1 0 0 1-1 1h-14a1 1 0 0 1-1-1v-15a1 1 0 0 1 1-1z"/>
            <path d="M7.5 3.5v5h7v-5"/>
            <rect x="7.5" y="13.5" width="9" height="6.5"/>
          </svg>
        </button>
        <button id="rr-gallery-btn" class="rr-tool-btn" onclick="rrOpenSavedGallery()" title="Patrones guardados">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--rr-icon-color,#c89fff)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6.5a1.5 1.5 0 0 1 1.5-1.5h4.4l1.6 2h9a1.5 1.5 0 0 1 1.5 1.5v9.5a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 17.5z"/>
          </svg>
        </button>
        <button id="rr-seasons-btn" class="rr-tool-btn" onclick="rrOpenSeasonsAdmin()" title="Temporadas del año" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--rr-icon-color,#c89fff)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3.5" y="4.5" width="17" height="16" rx="2.2"/>
            <path d="M3.5 9.2h17"/>
            <path d="M8 2.6v3.4M16 2.6v3.4"/>
            <path d="M7.5 13h2.6M7.5 16.4h2.6M13.9 13h2.6M13.9 16.4h2.6"/>
          </svg>
        </button>

      <input id="rr-image-input" type="file" accept="image/*" style="display:none" onchange="rrHandleImageFile(this.files[0])">
      <div style="margin-top:10px;text-align:center;">
        <a href="licenses.html" style="font-size:11px;color:rgba(255,255,255,.86);text-decoration:none;letter-spacing:.03em;" target="_blank">Licencias de terceros</a>
      </div>
    </div>
  </div>

  <!-- ══ Guardar patrón (modal) ══ -->
  <div id="rr-save-overlay" class="rr-modal-overlay hidden" onclick="if(event.target===this) rrCloseSaveModal()">
    <div class="rr-modal-box rr-modal-box-sm">
      <div class="rr-modal-header">
        <h3>💾 Guardar patrón</h3>
        <button class="rr-modal-close" onclick="rrCloseSaveModal()">✕</button>
      </div>
      <input id="rr-save-name-input" type="text" maxlength="24" placeholder="Nombre del patrón"
             class="rr-save-input" onkeydown="if(event.key==='Enter') rrConfirmSavePattern()">
      <button id="rr-save-confirm-btn" class="rr-save-confirm-btn" onclick="rrConfirmSavePattern()">Guardar</button>
    </div>
  </div>

  <!-- ══ Patrones guardados (galería) ══ -->
  <div id="rr-saved-overlay" class="rr-modal-overlay hidden" onclick="if(event.target===this) rrCloseSavedGallery()">
    <div class="rr-modal-box">
      <div class="rr-modal-header">
        <h3>📂 Patrones guardados</h3>
        <button class="rr-modal-close" onclick="rrCloseSavedGallery()">✕</button>
      </div>
      <div id="rr-saved-list" class="rr-saved-list"></div>
      <div id="rr-saved-empty" class="rr-saved-empty" style="display:none;">Todavía no hay patrones guardados.</div>
    </div>
  </div>

  <!-- ══ Temporadas del año (solo Rubiking) ══ -->
  <div id="rr-seasons-overlay" class="rr-modal-overlay hidden" onclick="if(event.target===this) rrCloseSeasonsAdmin()">
    <div class="rr-modal-box rr-modal-box-lg">
      <div class="rr-modal-header">
        <h3>🗓️ Temporadas</h3>
        <button class="rr-modal-close" onclick="rrCloseSeasonsAdmin()">✕</button>
      </div>
      <div class="rr-season-active-line">Activa ahora: <strong id="rr-season-active-label">—</strong></div>
      <div class="rr-season-override-row">
        <label>Forzar:</label>
        <select id="rr-season-override-select"></select>
      </div>
      <div id="rr-seasons-list" class="rr-seasons-list"></div>
      <div class="rr-seasons-actions">
        <button class="rr-seasons-reset-btn" onclick="rrSeasonsResetDefaults()">Restablecer</button>
        <button class="rr-save-confirm-btn" onclick="rrSeasonsSave()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    // Apply i18n to static HTML elements
    (function applyI18n(){
      const t = window.T;
      const el = id => document.getElementById(id);
      if(el('rr-toggle-label'))  el('rr-toggle-label').textContent  = t.patternLabel;
      if(el('rr-panel-title'))   el('rr-panel-title').textContent   = t.patternLabel;
      if(el('rr-status-text'))   el('rr-status-text').textContent   = t.connecting;
      if(el('rr-shuffle'))       el('rr-shuffle').textContent       = t.shuffleBtn;
    })();

    const RR_COLORS = [
      { bg:'#C8C8D8', border:'#8888A0', puzzleId:'white'  },
      { bg:'#0A6B2E', border:'#053A18', puzzleId:'green'  },
      { bg:'#B89200', border:'#6B5500', puzzleId:'yellow' },
      { bg:'#0D3B8E', border:'#061E50', puzzleId:'blue'   },
      { bg:'#8B0C0C', border:'#4A0505', puzzleId:'red'    },
      { bg:'#B84500', border:'#6B2600', puzzleId:'orange' },
    ];
    window.RR_COLORS = RR_COLORS;
    window._origRrColors = RR_COLORS.map(c => ({ ...c }));

    // 7 niveles de dificultad: patternSize = level+1, boardSize = level+3
    window.RR_LEVELS = [
      { level:1, patternSize:2, boardSize:4,  tileMin:56, tileMax:76 },
      { level:2, patternSize:3, boardSize:5,  tileMin:50, tileMax:62 },
      { level:3, patternSize:4, boardSize:6,  tileMin:42, tileMax:54 },
      { level:4, patternSize:5, boardSize:7,  tileMin:36, tileMax:46 },
      { level:5, patternSize:6, boardSize:8,  tileMin:31, tileMax:40 },
      { level:6, patternSize:7, boardSize:9,  tileMin:27, tileMax:34 },
      { level:7, patternSize:8, boardSize:10, tileMin:23, tileMax:30, brainMelt:true },
      { level:8, special:'cross', boardSize:11, tileMin:19, tileMax:25, hidden:true },
    ];
    window.RR_LEVEL_INFO = (lvl) => window.RR_LEVELS.find(l=>l.level===lvl) || window.RR_LEVELS[1];

    // Nivel 8 — "Mosaic Cross": 5 tableros 5×5 (uno en cada esquina + uno central)
    // dentro de una cuadrícula 11×11, con solape 2×2 en las diagonales y 12 casillas
    // huérfanas eliminadas (3 en cada lado medio: arriba/abajo/izquierda/derecha).
    function computeCrossShape() {
      const N = 11;
      const corners = [[0,4,0,4],[0,4,6,10],[6,10,0,4],[6,10,6,10]];
      const center  = [3,7,3,7];
      const inR = (v,a,b) => v>=a && v<=b;
      const valid = new Set();
      for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
        const inCorner = corners.some(([r0,r1,c0,c1]) => inR(r,r0,r1) && inR(c,c0,c1));
        const inCenter = inR(r,center[0],center[1]) && inR(c,center[2],center[3]);
        if (inCorner || inCenter) valid.add(r*N+c);
      }
      // Patrón objetivo: un parche 3×3 en el centro de cada uno de los 5 tableros
      const subCenters = [[1,3,1,3],[1,3,7,9],[7,9,1,3],[7,9,7,9],[4,6,4,6]];
      const patternIndices = [];
      for (const [r0,r1,c0,c1] of subCenters)
        for (let r=r0;r<=r1;r++) for (let c=c0;c<=c1;c++) patternIndices.push(r*N+c);
      return { N, validIndices:[...valid].sort((a,b)=>a-b), patternIndices };
    }
    window.RR_CROSS_SHAPE = computeCrossShape();

    let rrOpen = false, fbConnected = false;
    window.rrPattern = [];

    function rrToggle() { rrOpen=!rrOpen; document.getElementById('rr-panel').classList.toggle('hidden',!rrOpen); if(!rrOpen) window.rrToggleManualMode?.(false); }
    document.addEventListener('click', e => {
      if(rrOpen&&!document.getElementById('rr-widget').contains(e.target)){ rrOpen=false; document.getElementById('rr-panel').classList.add('hidden'); }
    });

    // Cierra el panel del editor y CUALQUIER modal relacionado (guardar / galería de
    // patrones guardados). Se llama al salir de una partida para que, si el jugador
    // (p.ej. Rubiking) dejó algo abierto, no quede visible ni operable para el
    // siguiente jugador que entre con otro nombre.
    function rrResetEditorUI() {
      rrOpen = false;
      document.getElementById('rr-panel')?.classList.add('hidden');
      window.rrToggleManualMode?.(false);
      window.rrCloseSaveModal?.();
      window.rrCloseSavedGallery?.();
    }
    window.__rrResetEditorUI = rrResetEditorUI;

    // Construye el icono mini del patrón completo (real, no una muestra), con celdas
    // dimensionadas para que el icono entero mida al menos ~72px de lado (el doble del original).
    function rrBuildPreview(pattern) {
      window.rrBuildPreview = rrBuildPreview;
      const preview = document.getElementById('rr-preview');
      if (!preview) return;
      const n = pattern.length;
      const isCross = n === window.RR_CROSS_SHAPE.patternIndices.length;
      const MIN = 65, GAP = 1.5;
      preview.innerHTML = '';

      if (isCross) {
        const shape = window.RR_CROSS_SHAPE;
        const cell = Math.max(4, Math.ceil((MIN - (shape.N-1)*GAP) / shape.N));
        preview.style.gridTemplateColumns = `repeat(${shape.N}, ${cell}px)`;
        preview.style.gap = GAP+'px';
        const validSet = new Set(shape.validIndices);
        const patSet = new Set(shape.patternIndices);
        const cells = [];
        for (let i=0;i<shape.N*shape.N;i++){
          const d = document.createElement('span');
          d.style.width = cell+'px'; d.style.height = cell+'px';
          if (!validSet.has(i)) { d.style.visibility='hidden'; d.style.border='none'; }
          else if (!patSet.has(i)) { d.style.background='rgba(255,255,255,.05)'; d.style.borderColor='rgba(255,255,255,.08)'; }
          preview.appendChild(d);
          cells.push(d);
        }
        // pattern[k] va SIEMPRE a la celda absoluta patternIndices[k] (mismo orden que usa
        // el juego para comprobar la victoria — no en orden fila-por-fila)
        shape.patternIndices.forEach((absIdx, k) => {
          const col = RR_COLORS[pattern[k]];
          cells[absIdx].style.background = col.bg; cells[absIdx].style.borderColor = col.border;
        });
      } else {
        const size = Math.max(1, Math.round(Math.sqrt(n)));
        const cell = Math.max(6, Math.ceil((MIN - (size-1)*GAP) / size));
        preview.style.gridTemplateColumns = `repeat(${size}, ${cell}px)`;
        preview.style.gap = GAP+'px';
        pattern.forEach(p => {
          const d = document.createElement('span');
          d.style.width = cell+'px'; d.style.height = cell+'px';
          const col = RR_COLORS[p];
          d.style.background = col.bg; d.style.borderColor = col.border;
          preview.appendChild(d);
        });
      }
    }

    function rrApplyPattern(pattern) {
      window.rrApplyPattern = rrApplyPattern;
      window.rrPattern=pattern;
      const n = pattern.length;
      const isCross = n === window.RR_CROSS_SHAPE.patternIndices.length;
      const grid = document.getElementById('rr-grid');

      if (isCross) {
        // Construye el grid 11×11 con huecos, mostrando sólo las 45 celdas del patrón
        const shape = window.RR_CROSS_SHAPE;
        const total = shape.N * shape.N;
        if (grid && (grid.dataset.mode !== 'cross')) {
          grid.innerHTML = '';
          grid.dataset.mode = 'cross';
          grid.style.gridTemplateColumns = `repeat(${shape.N}, var(--tile))`;
          const validSet = new Set(shape.validIndices);
          const patSet = new Set(shape.patternIndices);
          for (let i=0;i<total;i++){
            const c = document.createElement('div');
            if (!validSet.has(i)) { c.style.visibility='hidden'; }
            else if (!patSet.has(i)) { c.className='rrcell'; c.style.background='rgba(255,255,255,.05)'; c.style.borderColor='rgba(255,255,255,.08)'; }
            else { c.className='rrcell rrcell-pat'; }
            grid.appendChild(c);
          }
        }
        // pattern[k] va SIEMPRE a la celda absoluta patternIndices[k] (mismo orden que usa
        // el juego para comprobar la victoria — no en el orden en que aparecen en el DOM)
        shape.patternIndices.forEach((absIdx, k) => {
          const cell = grid.children[absIdx];
          if (cell) { const col = RR_COLORS[pattern[k]]; cell.style.background = col.bg; cell.style.borderColor = col.border; }
        });
      } else {
        const size = Math.max(1, Math.round(Math.sqrt(n)));
        if (grid && (grid.children.length !== n || grid.dataset.mode === 'cross')) {
          grid.innerHTML = '';
          grid.dataset.mode = 'square';
          grid.style.gridTemplateColumns = `repeat(${size}, var(--tile))`;
          for (let i=0;i<n;i++){ const c=document.createElement('div'); c.className='rrcell'; c.onclick=(()=>{const idx=i;return ()=>rrCellClick(idx);})(); grid.appendChild(c); }
        }
        document.querySelectorAll('#rr-grid .rrcell').forEach((c,i)=>{ c.style.background=RR_COLORS[pattern[i]].bg; c.style.borderColor=RR_COLORS[pattern[i]].border; });
      }

      window.rrSyncPatternTools?.();

      // Icono mini: SIEMPRE el patrón real completo (no una muestra), al menos el doble
      // de tamaño que el icono original (mínimo ~72px de lado)
      rrBuildPreview(pattern);
      // Badge de tamaño de tablero
      const badge = document.getElementById('rr-level-badge');
      const lvlInfo = isCross ? window.RR_LEVELS.find(l=>l.special==='cross')
                               : (window.RR_LEVELS||[]).find(l=>l.patternSize===Math.round(Math.sqrt(n)));
      if (badge) badge.textContent = lvlInfo ? `${lvlInfo.boardSize}×${lvlInfo.boardSize}` : '';
      window.dispatchEvent(new CustomEvent('rrPatternChange',{detail:pattern}));
    }
    window.__fbPatternReceived = p => { rrApplyPattern(p); setConnected(true); };
    // Redraw preview when pride/colorblind/seasonal mode changes — antes solo escuchaba
    // "prideModeChange", así que el patrón (incl. el nivel 8 en cruz) se quedaba con los
    // colores viejos hasta el siguiente "mezclar". Ahora se redibuja al instante siempre.
    window.addEventListener('prideModeChange',      () => { if (window.rrPattern && window.rrPattern.length) rrApplyPattern(window.rrPattern); });
    window.addEventListener('colorblindModeChange',  () => { if (window.rrPattern && window.rrPattern.length) rrApplyPattern(window.rrPattern); });
    window.addEventListener('seasonAltModeChange',   () => { if (window.rrPattern && window.rrPattern.length) rrApplyPattern(window.rrPattern); });

    // Presence
    let _prevNames = new Set();
    function showDiscreteToast(emoji, msg, dotColor) {
      const el=document.createElement('div'); el.className='toast-discrete';
      el.innerHTML=`<span class="td-dot" style="background:${dotColor}"></span>${emoji} ${msg}`;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),300); },3000);
    }
    window.showDiscreteToast = showDiscreteToast;

    function showSuddenSwapToast(fromName) {
      const el = document.createElement('div');
      el.className = 'toast sudden-swap-toast';
      el.innerHTML = `<div class="toast-row">
        <span class="toast-emoji">⚡</span>
        <div>
          <div class="toast-title">Sudden Swap!</div>
          <div class="toast-msg" style="color:#fff;font-weight:700;">by ${fromName}!!!</div>
        </div>
      </div>`;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),400); }, 3200);
    }
    window.showSuddenSwapToast = showSuddenSwapToast;
    window.__showForegroundNotification = function(title, body) {
      showDiscreteToast('🔔', [title, body].filter(Boolean).join(' — '), '#7c3aed');
    };
    window.__fbPresenceReceived = function(players) {
      const cur=new Set(players.map(p=>p.name));
      cur.forEach(n=>{ if(!_prevNames.has(n)&&_prevNames.size>0) showDiscreteToast('🟢', window.T.connected(n),'#22c55e'); });
      _prevNames.forEach(n=>{ if(!cur.has(n)) showDiscreteToast('⚪', window.T.disconnected(n),'#6b7280'); });
      _prevNames=cur;
      const c=document.getElementById('rr-players');
      c.innerHTML=players.length ? players.map(p=>{
        const dc=p.finished?'finished':p.moving?'moving':'';
        const sl=p.finished?`<div class="rr-chip-time">🏁 ${p.time} · ${p.moves} mov</div>`:p.moving?`<div class="rr-chip-status">${window.T.moving}</div>`:'';
        return `<div class="rr-player-chip"><div class="rr-player-chip-row"><span class="dot ${dc}"></span><span class="rr-chip-name">${p.name}</span></div>${sl}</div>`;
      }).join('') : '';
      window.dispatchEvent(new CustomEvent('rrPresenceChange',{detail:players}));
    };

    window.__fbProgressReceived = function(list) {
      window.dispatchEvent(new CustomEvent('rrProgressChange', { detail: list }));
    };
    window.__fbSabotageReceived = function(item) {
      window.dispatchEvent(new CustomEvent('rrSabotageReceived', { detail: item }));
    };
    window.__fbResetRequestReceived = function(item) {
      window.dispatchEvent(new CustomEvent('rrResetRequest', { detail: item }));
    };
    window.__fbResetResponseReceived = function(item) {
      window.dispatchEvent(new CustomEvent('rrResetResponse', { detail: item }));
    };

    // Reset
    let lastResetTs=0;
    window.__fbResetReceived = ts => { if(ts<=lastResetTs)return; lastResetTs=ts; window.dispatchEvent(new CustomEvent('rrGlobalReset',{detail:ts})); };

    // Confetti — o, en modo Vacaciones, gotas de agua y espuma — salen disparadas del
    // panel de patrón (#rr-widget). Se dispara para TODOS los participantes (se llama
    // desde __fbNotifReceived, que ya recibe el evento de "finish" vía Firebase para
    // cada cliente conectado a la partida).
    window.playConfetti = function(count) {
      const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) return;
      const origin = document.getElementById('rr-widget');
      if (!origin) return;
      const rect = origin.getBoundingClientRect();
      const ox = rect.left + rect.width / 2;
      const oy = rect.top + rect.height / 2;

      const theme = (window.__RR_SEASON_THEMES || {})[window.__rrActiveSeason] || null;
      const useWater    = !!(window.__seasonAltMode && theme && theme.particleStyle === 'water');
      const useShavings = !!(window.__seasonAltMode && theme && theme.particleStyle === 'shavings');

      const N = count || 54;

      const layer = document.createElement('div');
      layer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9600;overflow:visible;';
      document.body.appendChild(layer);

      const pieces = [];

      function addPiece(el, opts) {
        layer.appendChild(el);
        pieces.push(Object.assign({ el, x:0, y:0, rot:0, vr:0, gMul:1, life:0 }, opts));
      }

      if (useWater) {
        // Gotas de agua — el doble que las piezas de confeti habituales
        const DROP_COLORS = ['#4FA8E8', '#6EC3F4', '#A8DFFB', '#2E86C9', '#7FD4F0'];
        const dropCount = N * 2;
        for (let i = 0; i < dropCount; i++) {
          const w = 4 + Math.random() * 4, h = w * 1.4;
          const el = document.createElement('div');
          el.style.cssText = `position:absolute;left:${ox}px;top:${oy}px;width:${w}px;height:${h}px;` +
            `margin:${-h/2}px 0 0 ${-w/2}px;background:${DROP_COLORS[i % DROP_COLORS.length]};` +
            `border-radius:50% 50% 50% 0;opacity:.9;` +
            `box-shadow:inset -1px -1px 2px rgba(0,0,0,.18), inset 1px 1px 1px rgba(255,255,255,.55);` +
            `will-change:transform,opacity;`;
          const ang = Math.random() * Math.PI * 2;
          const speed = 2.5 + Math.random() * 6;
          addPiece(el, {
            vx: Math.cos(ang) * speed,
            vy: Math.sin(ang) * speed - 4,
            rot: 40 + Math.random() * 40 - 20,
            vr: (Math.random() - 0.5) * 5,
            gMul: 1,
            maxLife: 62 + Math.random() * 38,
          });
        }
        // Espuma — burbujas blancas, más ligeras y flotantes
        const foamCount = Math.round(N * 0.6);
        for (let i = 0; i < foamCount; i++) {
          const size = 4 + Math.random() * 6;
          const el = document.createElement('div');
          el.style.cssText = `position:absolute;left:${ox}px;top:${oy}px;width:${size}px;height:${size}px;` +
            `margin:${-size/2}px 0 0 ${-size/2}px;background:rgba(255,255,255,.88);border-radius:50%;` +
            `box-shadow:0 0 3px rgba(255,255,255,.7), inset -1px -1px 1px rgba(0,0,0,.08);` +
            `will-change:transform,opacity;`;
          const ang = Math.random() * Math.PI * 2;
          const speed = 1.2 + Math.random() * 3;
          addPiece(el, {
            vx: Math.cos(ang) * speed,
            vy: Math.sin(ang) * speed - 2.5,
            gMul: 0.16, // la espuma flota más antes de caer
            maxLife: 50 + Math.random() * 34,
          });
        }
      } else if (useShavings) {
        // Virutas de lápiz de color — líneas cortas, unas rectas y otras onduladas
        const SHAVING_COLORS = ['#F5E642','#E91E8C','#17C3D6','#4A4A4E','#C7C7CC','#B98A5A'];
        const svgNS = 'http://www.w3.org/2000/svg';
        for (let i = 0; i < N; i++) {
          const color = SHAVING_COLORS[i % SHAVING_COLORS.length];
          const len = 10 + Math.random() * 11;
          const wavy = Math.random() < 0.6;
          const w = len + 6;
          const svg = document.createElementNS(svgNS, 'svg');
          svg.setAttribute('width', w);
          svg.setAttribute('height', 10);
          svg.setAttribute('viewBox', `0 0 ${w} 10`);
          svg.style.cssText = `position:absolute;left:${ox}px;top:${oy}px;` +
            `margin:-5px 0 0 ${-w/2}px;overflow:visible;will-change:transform,opacity;`;
          const path = document.createElementNS(svgNS, 'path');
          const mid = (Math.random() < 0.5 ? 1 : 9);
          const d = wavy
            ? `M2,5 Q${(len*0.5).toFixed(1)},${mid} ${len}, 5`
            : `M2,5 L${len},5`;
          path.setAttribute('d', d);
          path.setAttribute('stroke', color);
          path.setAttribute('stroke-width', (1.6 + Math.random()*1.3).toFixed(1));
          path.setAttribute('stroke-linecap', 'round');
          path.setAttribute('fill', 'none');
          svg.appendChild(path);
          const ang = Math.random() * Math.PI * 2;
          const speed = 3 + Math.random() * 6;
          addPiece(svg, {
            vx: Math.cos(ang) * speed,
            vy: Math.sin(ang) * speed - 4,
            rot: Math.random() * 360,
            vr: (Math.random() - 0.5) * 16,
            gMul: 1,
            maxLife: 66 + Math.random() * 40,
          });
        }
      } else {
        // Confeti clásico — cuadrados de colores
        const COLORS = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9F45','#00D2D3','#FF6FA5','#B8FF66'];
        for (let i = 0; i < N; i++) {
          const size = 5 + Math.random() * 5;
          const el = document.createElement('div');
          el.style.cssText = `position:absolute;left:${ox}px;top:${oy}px;width:${size}px;height:${size}px;` +
            `margin:${-size/2}px 0 0 ${-size/2}px;background:${COLORS[i % COLORS.length]};` +
            `border-radius:1px;will-change:transform,opacity;`;
          const ang = Math.random() * Math.PI * 2;
          const speed = 3 + Math.random() * 6.5;
          addPiece(el, {
            vx: Math.cos(ang) * speed,
            vy: Math.sin(ang) * speed - 4.5, // ligero impulso hacia arriba al salir
            rot: Math.random() * 360,
            vr: (Math.random() - 0.5) * 20,
            gMul: 1,
            maxLife: 68 + Math.random() * 42,
          });
        }
      }

      const gravity = 0.28, drag = 0.985;
      function tick() {
        let alive = false;
        pieces.forEach(p => {
          if (p.life > p.maxLife) return;
          alive = true;
          p.vy += gravity * p.gMul;
          p.vx *= drag;
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vr;
          p.life++;
          const fadeStart = p.maxLife - 20;
          const opacity = p.life > fadeStart ? Math.max(0, (p.maxLife - p.life) / 20) : 1;
          p.el.style.transform = `translate(${p.x}px,${p.y}px) rotate(${p.rot}deg)`;
          p.el.style.opacity = opacity;
        });
        if (alive) requestAnimationFrame(tick);
        else layer.remove();
      }
      requestAnimationFrame(tick);
    };

    // Finish notif — aparece debajo del patrón de muestra (rr-widget)
    let finishNotifTimer = null;
    window.__fbNotifReceived = item => {
      const theme = (window.__RR_SEASON_THEMES || {})[window.__rrActiveSeason] || null;
      if (window.__seasonAltMode && theme && theme.finishSound === 'giggle') {
        window.playGiggle?.();
      } else {
        window.playWhoosh?.();
      }
      window.playConfetti?.();
      const area = document.getElementById('finish-notif-area');
      if (!area) return;
      if (finishNotifTimer) clearTimeout(finishNotifTimer);
      area.innerHTML = `<div class="finish-notif"><span style="font-size:18px">🏁</span><div><div style="font-size:12px;font-weight:800;color:#FFD27A;margin-bottom:2px;">${window.T.finishToast(item.name)}</div><div style="font-size:10px;color:rgba(255,255,255,.89)">${window.T.finishToastSub}</div><div style="font-size:10px;color:rgba(255,255,255,.87);margin-top:2px">⏱ ${item.time} · ${item.moves} mov</div></div></div>`;
      area.style.display = '';
      finishNotifTimer = setTimeout(() => { area.style.display = 'none'; area.innerHTML = ''; }, 5000);
    };

    // Connection state
    window.__fbConnectionState = function(ok) {
      fbConnected=ok; window.__fbConnected=ok;
      const dot=document.getElementById('rr-sync-dot');
      const dotp=document.getElementById('rr-sync-dot-panel');
      const status=document.getElementById('rr-status-text');
      dot.className=ok?'connected':'disconnected';
      dotp.style.background=ok?'#22c55e':'#ef4444';
      dotp.style.boxShadow=ok?'0 0 6px #22c55e':'none';
      status.textContent=ok?window.T.synced:window.T.noConn;
      status.style.color=ok?'rgba(34,197,94,.8)':'rgba(239,68,68,.7)';
      document.getElementById('rr-shuffle').disabled=!ok;
      const badge=document.getElementById('rr-offline-badge');
      if(badge) badge.style.display=ok?'none':'block';
    };
    // También detectar navigator.onLine
    window.addEventListener('offline',()=>{
      const badge=document.getElementById('rr-offline-badge');
      if(badge) badge.style.display='block';
    });

    function rrGenPattern(n) {
      const cap = Math.ceil(n / RR_COLORS.length);
      const r=[],c=new Array(RR_COLORS.length).fill(0);
      for(let i=0;i<n;i++){const a=RR_COLORS.map((_,i)=>i).filter(i=>c[i]<cap);const p=a[Math.floor(Math.random()*a.length)];c[p]++;r.push(p);}
      return r;
    }
    function rrShuffle() {
      const info = window.RR_LEVEL_INFO(window.__rrLevel || 2);
      const n = info.special==='cross' ? window.RR_CROSS_SHAPE.patternIndices.length : info.patternSize*info.patternSize;
      const p = rrGenPattern(n);
      if(window.__fbSetPattern) window.__fbSetPattern(p); else rrApplyPattern(p);
    }
    window.rrShuffle=rrShuffle;

    // ── Mosaico desde imagen ──
    // Paleta fija en el mismo orden que RR_IDS (white,green,yellow,blue,red,orange),
    // usada siempre para la cuantización, sin importar el modo Pride activo.
    const RR_PALETTE_RGB = ['#C8C8D8','#1b5e20','#ffeb3b','#0d47a1','#f44336','#ff9800']
      .map(hex => { const n = parseInt(hex.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; });

    function rrNearestColorIndex(r,g,b) {
      let best=0, bestD=Infinity;
      for (let i=0;i<RR_PALETTE_RGB.length;i++){
        const [pr,pg,pb]=RR_PALETTE_RGB[i];
        const d=(r-pr)**2+(g-pg)**2+(b-pb)**2;
        if(d<bestD){bestD=d;best=i;}
      }
      return best;
    }

    // Convierte una imagen (HTMLImageElement ya cargada) en un patrón size×size,
    // recortando al centro (crop cuadrado) y promediando color por celda.
    function rrImageToPattern(img, size) {
      const w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
      const side = Math.min(w,h);
      const sx = (w-side)/2, sy=(h-side)/2;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
      const { data } = ctx.getImageData(0,0,size,size);
      const pattern = [];
      for (let i=0;i<size*size;i++){
        const o=i*4;
        pattern.push(rrNearestColorIndex(data[o],data[o+1],data[o+2]));
      }
      return pattern;
    }
    window.rrImageToPattern = rrImageToPattern;

    // ── Herramientas del panel: editar patrón manualmente o desde imagen ──
    let rrManualMode = false;

    function rrPatternSize() {
      const info = window.RR_LEVEL_INFO(window.__rrLevel || 2);
      return info.special === 'cross' ? null : info.patternSize;
    }

    // ── Editor de patrón: desbloqueo por victorias multijugador ──
    // Rubiking siempre tiene acceso. Cualquier otro jugador debe ganar 3 partidas
    // multijugador (en cualquier nivel) para desbloquear el editor por esa sesión.
    // Al desconectarse de la partida, el desbloqueo se "consume": hace falta ganar
    // 3 partidas más para volver a verlo y usarlo.
    const RR_EDITOR_WIN_KEY      = 'rr-editor-win-count';
    const RR_EDITOR_CONSUMED_KEY = 'rr-editor-consumed-count';
    let rrEditorUnlocked = false; // válido solo durante la partida/sesión actual

    function rrEditorCurrentName() {
      return (window.__rrCurrentPlayerName || localStorage.getItem('rr-player-name') || '').trim().toLowerCase();
    }
    function rrEditorIsRubiking() { return rrEditorCurrentName() === 'rubiking'; }
    function rrEditorWinCount()  { return parseInt(localStorage.getItem(RR_EDITOR_WIN_KEY)     || '0', 10) || 0; }
    function rrEditorConsumed()  { return parseInt(localStorage.getItem(RR_EDITOR_CONSUMED_KEY) || '0', 10) || 0; }

    function rrEditorHasAccess() { return rrEditorIsRubiking() || rrEditorUnlocked; }
    window.__rrEditorHasAccess = rrEditorHasAccess;

    // Se llama cuando el jugador actual gana una partida multijugador (ver handleTile)
    function rrRegisterMultiWin(name) {
      if ((name || '').trim().toLowerCase() === 'rubiking') return; // ya tiene acceso total
      const wins = rrEditorWinCount() + 1;
      localStorage.setItem(RR_EDITOR_WIN_KEY, String(wins));
      if (!rrEditorUnlocked && (wins - rrEditorConsumed()) >= 3) {
        rrEditorUnlocked = true;
        rrSyncPatternTools();
        rrShowEditorUnlockNotif();
      }
    }
    window.__rrRegisterMultiWin = rrRegisterMultiWin;

    // Se llama al desconectarse de la partida (salir al lobby, level-up, etc.)
    function rrConsumeEditorUnlock() {
      if (rrEditorUnlocked) {
        localStorage.setItem(RR_EDITOR_CONSUMED_KEY, String(rrEditorWinCount()));
        rrEditorUnlocked = false;
      }
      rrSyncPatternTools();
    }
    window.__rrConsumeEditorUnlock = rrConsumeEditorUnlock;

    // Notificación: entra desde la derecha, se queda para leerse, y sale por la
    // izquierda dibujando una flecha hacia el bloque de patrón (#rr-widget).
    function rrShowEditorUnlockNotif() {
      try {
        document.getElementById('rr-editor-unlock-notif')?.remove();
        document.getElementById('rr-editor-unlock-svg')?.remove();

        const widget = document.getElementById('rr-widget');
        const logo   = document.getElementById('mc-title-compact-wrap');
        const vw = window.innerWidth, vh = window.innerHeight;
        const wr = (widget && widget.offsetParent !== null) ? widget.getBoundingClientRect() : null;
        const lr = (logo   && logo.offsetParent   !== null) ? logo.getBoundingClientRect()   : null;
        // Flecha apunta siempre al bloque de patrón (rr-widget)
        const tx = wr ? wr.left + wr.width / 2 : vw - 50;
        const ty = wr ? wr.top  + wr.height / 2 : 60;
        // La tarjeta flota libremente centrada sobre el logo/título, sin anclarse
        // a ningún panel ni empujar el layout (position:fixed + pointer-events:none)
        const cx = lr ? lr.left + lr.width / 2 : vw / 2;
        const cy = lr ? Math.max(64, lr.top - 8) : 90;

        const wrap = document.createElement('div');
        wrap.id = 'rr-editor-unlock-notif';
        wrap.style.cssText = `position:fixed;top:${cy}px;left:${cx}px;transform:translate(-50%,-100%);z-index:9500;pointer-events:none;`;
        wrap.innerHTML = `
          <div id="rr-editor-unlock-card" style="
            display:flex;align-items:center;gap:10px;background:rgba(6,4,20,.96);
            border:1.5px solid rgba(255,215,0,.55);border-radius:16px;padding:12px 16px;
            backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 24px rgba(255,215,0,.25);
            max-width:min(280px,80vw);animation:rrEditorSlideIn .5s cubic-bezier(.34,1.4,.64,1) forwards;">
            <div style="font-size:22px;flex-shrink:0;">✏️</div>
            <div style="font-size:12.5px;font-weight:700;color:#FFE566;line-height:1.35;">
              ¡Ahora puedes editar tu patrón!
            </div>
          </div>`;
        document.body.appendChild(wrap);

        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.id = 'rr-editor-unlock-svg';
        svg.setAttribute('width', vw); svg.setAttribute('height', vh);
        svg.style.cssText = 'position:fixed;inset:0;z-index:9499;pointer-events:none;overflow:visible;opacity:0;transition:opacity .25s ease;';
        svg.innerHTML = '<defs><marker id="rr-eu-ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#FFD700"/></marker></defs>';
        document.body.appendChild(svg);

        setTimeout(() => {
          const card = document.getElementById('rr-editor-unlock-card');
          const cr = card ? card.getBoundingClientRect() : { left: cx - 60, top: cy - 50, width: 120, height: 50 };
          const fx = cr.left, fy = cr.top + cr.height / 2;
          const dPath = `M${fx},${fy} C${(fx + tx) / 2},${fy} ${(fx + tx) / 2},${ty} ${tx},${ty}`;
          const path = document.createElementNS(svgNS, 'path');
          path.setAttribute('d', dPath);
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke', '#FFD700');
          path.setAttribute('stroke-width', '2.5');
          path.setAttribute('stroke-dasharray', '9 6');
          path.setAttribute('marker-end', 'url(#rr-eu-ah)');
          svg.appendChild(path);
          svg.style.opacity = '1';
          if (card) card.style.animation = 'rrEditorSlideOut .6s ease forwards';
        }, 2400);

        setTimeout(() => { wrap.remove(); svg.remove(); }, 3200);
      } catch (e) { console.warn('rrShowEditorUnlockNotif:', e); }
    }
    window.rrShowEditorUnlockNotif = rrShowEditorUnlockNotif;

    // ═══════════════════════════════════════════════════════════════════
    // ── Temporadas del año ──
    // Cada temporada tiene un id fijo (se usa en el código para activar
    // efectos/skins más adelante), un nombre en ES/EN, y un rango de fechas
    // por defecto (mes,día). Si dos temporadas comparten el mismo día límite
    // (p.ej. 15 de mayo), gana la que aparece PRIMERO en esta lista: por eso
    // el orden importa y no hay que reordenarlo sin querer.
    // ═══════════════════════════════════════════════════════════════════
    const RR_SEASONS_DEFAULT = [
      { id:'new_year',       es:'Año Nuevo',                       en:'New Year',                 start:[1,1],   end:[1,31]  },
      { id:'carnavalentin',  es:'Carnavalentín',                   en:'Carnivalentine',           start:[2,1],   end:[3,1]   },
      { id:'mujer',          es:'Día de la Mujer',                 en:"Women's Day",              start:[3,2],   end:[3,25]  },
      { id:'libro_rosa',     es:'Día del Libro y la Rosa',         en:'Book & Rose Day',          start:[4,25],  end:[5,1]   },
      { id:'madre',          es:'Día de la Madre',                 en:"Mother's Day",             start:[5,2],   end:[5,15]  },
      { id:'museos',         es:'Día de los Museos',               en:'Museums Day',              start:[5,15],  end:[6,1]   },
      { id:'conservacion',   es:'Conservación del Planeta',        en:'Planet Conservation',      start:[6,2],   end:[6,27]  },
      { id:'pride',          es:'Pride',                           en:'Pride',                    start:[6,28],  end:[7,6]   },
      { id:'san_fermin',     es:'San Fermín',                      en:'San Fermín',               start:[7,7],   end:[7,14]  },
      { id:'verano',         es:'Verano y Vacaciones',             en:'Summer & Vacation',        start:[7,15],  end:[8,25]  },
      { id:'vuelta_colegio', es:'Vuelta al Colegio',               en:'Back to School',           start:[8,26],  end:[10,1]  },
      { id:'otono',          es:'Otoño',                           en:'Autumn',                   start:[10,1],  end:[10,25] },
      { id:'dia_muertos',    es:'Día de los Muertos / Halloween',  en:'Day of the Dead / Halloween', start:[10,26], end:[11,25] },
      { id:'loud_secrets',   es:'Loud Secrets',                    en:'Loud Secrets',             start:[11,25], end:[12,20] },
      { id:'festividades',   es:'Festividades Familiares',         en:'Family Festivities',       start:[12,20], end:[12,31] },
    ];
    window.RR_SEASONS_DEFAULT = RR_SEASONS_DEFAULT;

    // Estado en memoria: { dates:{id:[[sm,sd],[em,ed]]}, manualOverride:id|null, updatedBy }
    window.__rrSeasonsConfig = null;
    // id de la temporada activa ahora mismo (o null si estamos en un hueco sin temporada)
    window.__rrActiveSeason = null;

    function rrSeasonsEffectiveList() {
      const overrides = (window.__rrSeasonsConfig && window.__rrSeasonsConfig.dates) || {};
      return RR_SEASONS_DEFAULT.map(s => {
        const o = overrides[s.id];
        return (o && Array.isArray(o[0]) && Array.isArray(o[1])) ? { ...s, start:o[0], end:o[1] } : s;
      });
    }
    window.__rrSeasonsEffectiveList = rrSeasonsEffectiveList;

    function rrDateInSeason(season, m, d) {
      const [sm,sd] = season.start, [em,ed] = season.end;
      const sv = sm*100+sd, ev = em*100+ed, cv = m*100+d;
      return sv <= ev ? (cv >= sv && cv <= ev) : (cv >= sv || cv <= ev); // soporta cruzar fin de año
    }

    function rrComputeAutoSeason(date) {
      date = date || new Date();
      const m = date.getMonth()+1, d = date.getDate();
      const list = rrSeasonsEffectiveList();
      for (let i=0;i<list.length;i++) if (rrDateInSeason(list[i], m, d)) return list[i].id;
      return null;
    }
    window.__rrComputeAutoSeason = rrComputeAutoSeason;

    // Refleja el "modo alternativo" (fondo/iconos de la temporada) en <body> como clase CSS.
    // OJO: esto NO se activa solo porque la temporada esté vigente por fecha — solo cuando
    // el jugador lo enciende con el gesto de mantener pulsado el título (o si ya lo tenía
    // activado la última vez que jugó). Por defecto siempre arranca en modo clásico.
    function rrApplySeasonBodyClass(seasonId) {
      Array.from(document.body.classList).forEach(c => {
        if (c.indexOf('rr-season-') === 0) document.body.classList.remove(c);
      });
      if (seasonId) document.body.classList.add('rr-season-' + seasonId);
    }

    function rrRecomputeActiveSeason() {
      const manual = window.__rrSeasonsConfig && window.__rrSeasonsConfig.manualOverride;
      const next = manual || rrComputeAutoSeason();
      if (next !== window.__rrActiveSeason) {
        window.__rrActiveSeason = next;
        // Al cambiar de temporada, resincroniza el fondo/iconos según la preferencia
        // personal ya guardada para la nueva temporada (si no hay ninguna, se queda clásico).
        window.__rrSyncSeasonBodyClass?.();
        // Otros módulos (efectos visuales de cada temporada) se enganchan a este evento.
        window.dispatchEvent(new CustomEvent('rrSeasonChange', { detail: next }));
      }
      window.rrRenderSeasonsAdmin?.();
    }
    window.__rrRecomputeActiveSeason = rrRecomputeActiveSeason;

    function rrApplySeasonsConfig(config) {
      window.__rrSeasonsConfig = config || { dates:{}, manualOverride:null };
      try { localStorage.setItem('rr-seasons-config', JSON.stringify(window.__rrSeasonsConfig)); } catch(e) {}
      rrRecomputeActiveSeason();
    }
    window.__rrApplySeasonsConfig = rrApplySeasonsConfig;

    // Carga inicial desde caché local (instantáneo) mientras llega la config de Firebase
    (function rrInitSeasonsFromCache() {
      let cached = null;
      try { cached = JSON.parse(localStorage.getItem('rr-seasons-config') || 'null'); } catch(e) {}
      window.__rrSeasonsConfig = cached || { dates:{}, manualOverride:null };
      rrRecomputeActiveSeason();
    })();

    // Por si la pestaña queda abierta de un día para otro (o durante una temporada larga),
    // revisamos periódicamente si toca cambiar de temporada automática.
    setInterval(rrRecomputeActiveSeason, 30*60*1000);

    // ── Panel de administración de temporadas (solo Rubiking) ──
    const RR_MONTH_NAMES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    function rrMonthOptions(selected) {
      return RR_MONTH_NAMES.map((name,i) =>
        `<option value="${i+1}" ${i+1===selected?'selected':''}>${name}</option>`).join('');
    }

    function rrRenderSeasonsAdmin() {
      const list = document.getElementById('rr-seasons-list');
      if (!list || document.getElementById('rr-seasons-overlay')?.classList.contains('hidden')) return;

      const sel = document.getElementById('rr-season-override-select');
      const manual = (window.__rrSeasonsConfig && window.__rrSeasonsConfig.manualOverride) || '';
      if (sel) {
        sel.innerHTML = `<option value="">Automático (según fecha)</option>` +
          RR_SEASONS_DEFAULT.map(s => `<option value="${s.id}">${s.es}</option>`).join('');
        sel.value = manual;
      }

      const activeInfo = RR_SEASONS_DEFAULT.find(s => s.id === window.__rrActiveSeason);
      const activeLabel = document.getElementById('rr-season-active-label');
      if (activeLabel) activeLabel.textContent = activeInfo ? activeInfo.es : 'Ninguna (fuera de temporada)';

      const effective = rrSeasonsEffectiveList();
      list.innerHTML = effective.map(s => `
        <div class="rr-season-row" data-season-id="${s.id}">
          <div class="rr-season-row-name">${s.es}${window.__rrActiveSeason===s.id ? ' <span class="rr-season-active-tag">● activa</span>' : ''}</div>
          <div class="rr-season-row-dates">
            <span>Del</span>
            <select data-field="sm">${rrMonthOptions(s.start[0])}</select>
            <input type="number" min="1" max="31" value="${s.start[1]}" data-field="sd">
            <span>al</span>
            <select data-field="em">${rrMonthOptions(s.end[0])}</select>
            <input type="number" min="1" max="31" value="${s.end[1]}" data-field="ed">
          </div>
        </div>
      `).join('');
    }
    window.rrRenderSeasonsAdmin = rrRenderSeasonsAdmin;

    function rrOpenSeasonsAdmin() {
      if (!rrEditorIsRubiking()) return;
      document.getElementById('rr-seasons-overlay')?.classList.remove('hidden');
      rrRenderSeasonsAdmin();
    }
    window.rrOpenSeasonsAdmin = rrOpenSeasonsAdmin;

    function rrCloseSeasonsAdmin() {
      document.getElementById('rr-seasons-overlay')?.classList.add('hidden');
    }
    window.rrCloseSeasonsAdmin = rrCloseSeasonsAdmin;

    function rrSeasonsSave() {
      if (!rrEditorIsRubiking()) return;
      const rows = document.querySelectorAll('#rr-seasons-list .rr-season-row');
      const dates = {};
      let hasError = false;
      rows.forEach(row => {
        const id = row.getAttribute('data-season-id');
        const sm = parseInt(row.querySelector('[data-field="sm"]').value, 10);
        const sd = parseInt(row.querySelector('[data-field="sd"]').value, 10);
        const em = parseInt(row.querySelector('[data-field="em"]').value, 10);
        const ed = parseInt(row.querySelector('[data-field="ed"]').value, 10);
        if (!sm || !sd || !em || !ed || sd<1 || sd>31 || ed<1 || ed>31) { hasError = true; return; }
        dates[id] = [[sm,sd],[em,ed]];
      });
      if (hasError) { window.showDiscreteToast?.('⚠️', 'Revisa las fechas: hay algún campo vacío o inválido', '#ef4444'); return; }
      const manualOverride = document.getElementById('rr-season-override-select')?.value || null;
      const config = { dates, manualOverride, updatedBy: rrEditorCurrentName() };
      rrApplySeasonsConfig(config);       // aplicar ya mismo en este dispositivo
      window.__fbSaveSeasons?.(config);   // propagar a todos los jugadores
      window.showDiscreteToast?.('🗓️', 'Temporadas actualizadas para todos', '#9c5aff');
      rrRenderSeasonsAdmin();
    }
    window.rrSeasonsSave = rrSeasonsSave;

    function rrSeasonsResetDefaults() {
      if (!rrEditorIsRubiking()) return;
      const config = { dates:{}, manualOverride:null, updatedBy: rrEditorCurrentName() };
      rrApplySeasonsConfig(config);
      window.__fbSaveSeasons?.(config);
      window.showDiscreteToast?.('↩️', 'Temporadas restablecidas a las fechas por defecto', '#9c5aff');
      rrRenderSeasonsAdmin();
    }
    window.rrSeasonsResetDefaults = rrSeasonsResetDefaults;

    function rrSyncPatternTools() {
      const size = rrPatternSize();
      const imgBtn = document.getElementById('rr-image-btn');
      const manBtn = document.getElementById('rr-manual-btn');
      const valBtn = document.getElementById('rr-validate-btn');
      const saveBtn = document.getElementById('rr-save-btn');
      const galBtn  = document.getElementById('rr-gallery-btn');
      const seasonsBtn = document.getElementById('rr-seasons-btn');
      const hasAccess = rrEditorHasAccess();
      if (imgBtn) { imgBtn.style.display = hasAccess ? '' : 'none'; imgBtn.disabled = !size; }
      if (manBtn) { manBtn.style.display = hasAccess ? '' : 'none'; manBtn.disabled = !size; }
      if (valBtn) valBtn.disabled = !(window.rrPattern && window.rrPattern.length);
      // Guardar patrones con nombre y temporadas: solo Rubiking. Ver la galería: cualquiera con acceso al editor.
      if (saveBtn) saveBtn.style.display = rrEditorIsRubiking() ? '' : 'none';
      if (galBtn)  galBtn.style.display  = hasAccess ? '' : 'none';
      if (seasonsBtn) seasonsBtn.style.display = rrEditorIsRubiking() ? '' : 'none';
      if (!rrEditorIsRubiking()) { window.rrCloseSaveModal?.(); window.rrCloseSeasonsAdmin?.(); }
      if (!hasAccess) window.rrCloseSavedGallery?.();
      if (!size && rrManualMode) rrToggleManualMode(false);
      if (!hasAccess && rrManualMode) rrToggleManualMode(false);
    }
    window.rrSyncPatternTools = rrSyncPatternTools;

    // Valida el patrón actual (creado a mano o desde imagen) y avisa al tablero de
    // juego para que se regenere garantizando tiles suficientes de cada color que
    // el patrón necesita, de forma que siempre sea posible completarlo.
    function rrValidatePattern() {
      if (!window.rrPattern || !window.rrPattern.length) return;
      window.dispatchEvent(new CustomEvent('rrValidatePattern', { detail: [...window.rrPattern] }));
      const hint = document.getElementById('rr-validate-hint');
      if (hint) {
        hint.style.display = 'block';
        clearTimeout(window.__rrValidateHintTimer);
        window.__rrValidateHintTimer = setTimeout(() => { hint.style.display = 'none'; }, 3000);
      }
      window.showDiscreteToast?.('✅', 'Tablero actualizado con colores suficientes', '#22c55e');
      // Cerramos el panel para dejar el tablero listo y poder invitar a jugar el mismo patrón.
      rrOpen = false;
      document.getElementById('rr-panel')?.classList.add('hidden');
      window.rrToggleManualMode?.(false);
    }
    window.rrValidatePattern = rrValidatePattern;

    function rrToggleManualMode(force) {
      if (!rrEditorHasAccess()) return;
      const size = rrPatternSize();
      if (typeof force !== 'boolean' && !size) return;
      rrManualMode = typeof force === 'boolean' ? force : !rrManualMode;
      const btn = document.getElementById('rr-manual-btn');
      const grid = document.getElementById('rr-grid');
      const hint = document.getElementById('rr-manual-hint');
      if (btn) btn.classList.toggle('active', rrManualMode);
      if (grid) grid.classList.toggle('rr-manual-active', rrManualMode);
      if (hint) { hint.textContent = rrManualMode ? 'Tocá cada celda para cambiar su color' : ''; hint.style.display = rrManualMode ? 'block' : 'none'; }
    }
    window.rrToggleManualMode = rrToggleManualMode;

    function rrCellClick(idx) {
      if (!rrManualMode || !rrEditorHasAccess()) return;
      const size = rrPatternSize();
      if (!size) return;
      const n = size * size;
      const cur = (window.rrPattern && window.rrPattern.length === n) ? [...window.rrPattern] : new Array(n).fill(0);
      cur[idx] = (cur[idx] + 1) % RR_COLORS.length;
      if (window.__fbSetPattern) window.__fbSetPattern(cur); else rrApplyPattern(cur);
    }
    window.rrCellClick = rrCellClick;

    function rrImageButtonClick() {
      if (!rrEditorHasAccess() || !rrPatternSize()) return;
      document.getElementById('rr-image-input')?.click();
    }
    window.rrImageButtonClick = rrImageButtonClick;

    function rrHandleImageFile(file) {
      if (!file) return;
      const size = rrPatternSize();
      if (!size) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const pattern = rrImageToPattern(img, size);
          if (window.__fbSetPattern) window.__fbSetPattern(pattern); else rrApplyPattern(pattern);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
      document.getElementById('rr-image-input').value = '';
    }
    window.rrHandleImageFile = rrHandleImageFile;

    // ── Patrones guardados: galería + guardado con nombre (solo Rubiking) ──
    let rrSavedPatternsCache = [];
    let rrSavedPatternsSubscribed = false;

    function rrRequiredPatternLength() {
      const info = window.RR_LEVEL_INFO(window.__rrLevel || 2);
      return info.special === 'cross'
        ? window.RR_CROSS_SHAPE.patternIndices.length
        : info.patternSize * info.patternSize;
    }

    // Genera una previsualización en miniatura de un patrón guardado, respetando
    // la forma especial de cruz cuando corresponda.
    function rrMiniPreviewHTML(pattern) {
      const n = pattern.length;
      const isCross = n === window.RR_CROSS_SHAPE.patternIndices.length;
      let side, cells;
      if (isCross) {
        side = window.RR_CROSS_SHAPE.N;
        cells = new Array(side * side).fill(null);
        window.RR_CROSS_SHAPE.patternIndices.forEach((absIdx, k) => { cells[absIdx] = pattern[k]; });
      } else {
        side = Math.round(Math.sqrt(n));
        cells = pattern;
      }
      let html = `<div class="rr-mini-grid" style="grid-template-columns:repeat(${side},1fr)">`;
      cells.forEach(v => {
        if (v === null || v === undefined) html += `<span class="rr-mini-cell rr-mini-empty"></span>`;
        else {
          const col = RR_COLORS[v] || RR_COLORS[0];
          html += `<span class="rr-mini-cell" style="background:${col.bg};border-color:${col.border}"></span>`;
        }
      });
      html += `</div>`;
      return html;
    }

    // Solo puede gestionar (borrar) un patrón guardado quien lo creó, o Rubiking.
    function rrCanManagePattern(sp) {
      if (rrEditorIsRubiking()) return true;
      const creator = (sp?.createdBy || '').trim().toLowerCase();
      return !!creator && creator === rrEditorCurrentName();
    }

    function rrRenderSavedList() {
      const list = document.getElementById('rr-saved-list');
      const empty = document.getElementById('rr-saved-empty');
      if (!list) return;
      if (!rrSavedPatternsCache.length) {
        list.innerHTML = '';
        if (empty) empty.style.display = 'block';
        return;
      }
      if (empty) empty.style.display = 'none';
      list.innerHTML = rrSavedPatternsCache.map(sp => `
        <div class="rr-saved-item">
          ${rrMiniPreviewHTML(sp.pattern)}
          <div class="rr-saved-info">
            <div class="rr-saved-name">${String(sp.name || 'Sin nombre').replace(/</g, '&lt;')}</div>
            <div class="rr-saved-size">${sp.size}×${sp.size}</div>
          </div>
          <div class="rr-saved-actions">
            <button class="rr-saved-use-btn" onclick="rrApplySavedPattern('${sp.id}')">Usar</button>
            ${rrCanManagePattern(sp) ? `<button class="rr-saved-del-btn" onclick="rrDeleteSavedPatternClick('${sp.id}')" title="Eliminar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 7h16"/>
                <path d="M9 7V4.6a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1V7"/>
                <path d="M6 7l1 13a2 2 0 0 0 2 1.9h6a2 2 0 0 0 2-1.9L18 7"/>
                <path d="M10 11v6M14 11v6"/>
              </svg>
            </button>` : ''}
          </div>
        </div>
      `).join('');
    }

    function rrEnsureSavedSubscription() {
      if (rrSavedPatternsSubscribed || !window.__fbListenSavedPatterns) return;
      rrSavedPatternsSubscribed = true;
      window.__fbListenSavedPatterns(list => {
        rrSavedPatternsCache = list;
        rrRenderSavedList();
      });
    }

    function rrOpenSavedGallery() {
      if (!rrEditorHasAccess()) return;
      rrEnsureSavedSubscription();
      rrRenderSavedList();
      document.getElementById('rr-saved-overlay')?.classList.remove('hidden');
    }
    window.rrOpenSavedGallery = rrOpenSavedGallery;

    function rrCloseSavedGallery() {
      document.getElementById('rr-saved-overlay')?.classList.add('hidden');
    }
    window.rrCloseSavedGallery = rrCloseSavedGallery;

    function rrApplySavedPattern(id) {
      if (!rrEditorHasAccess()) return;
      const sp = rrSavedPatternsCache.find(s => s.id === id);
      if (!sp) return;
      const need = rrRequiredPatternLength();
      if (sp.pattern.length !== need) {
        window.showDiscreteToast?.('⚠️', 'Este patrón es de otro tamaño de nivel — cambiá de nivel para usarlo', '#f59e0b');
        return;
      }
      if (window.__fbSetPattern) window.__fbSetPattern(sp.pattern); else rrApplyPattern(sp.pattern);
      window.showDiscreteToast?.('🧩', `Patrón "${sp.name}" cargado`, '#7c3aed');
      rrCloseSavedGallery();
      rrOpen = false;
      document.getElementById('rr-panel')?.classList.add('hidden');
    }
    window.rrApplySavedPattern = rrApplySavedPattern;

    function rrDeleteSavedPatternClick(id) {
      const sp = rrSavedPatternsCache.find(s => s.id === id);
      if (!sp) return;
      if (!rrCanManagePattern(sp)) {
        window.showDiscreteToast?.('🔒', 'Solo quien creó este patrón (o Rubiking) puede eliminarlo', '#f59e0b');
        return;
      }
      if (!confirm(`¿Eliminar el patrón "${sp.name}"?`)) return;
      window.__fbDeleteSavedPattern?.(id);
    }
    window.rrDeleteSavedPatternClick = rrDeleteSavedPatternClick;

    function rrOpenSaveModal() {
      if (!rrEditorIsRubiking()) return;
      if (!window.rrPattern || !window.rrPattern.length) {
        window.showDiscreteToast?.('⚠️', 'Primero creá un patrón para guardar', '#f59e0b');
        return;
      }
      const input = document.getElementById('rr-save-name-input');
      if (input) input.value = '';
      document.getElementById('rr-save-overlay')?.classList.remove('hidden');
      setTimeout(() => input?.focus(), 50);
    }
    window.rrOpenSaveModal = rrOpenSaveModal;

    function rrCloseSaveModal() {
      document.getElementById('rr-save-overlay')?.classList.add('hidden');
    }
    window.rrCloseSaveModal = rrCloseSaveModal;

    function rrConfirmSavePattern() {
      if (!rrEditorIsRubiking()) return;
      const input = document.getElementById('rr-save-name-input');
      const name = (input?.value || '').trim().slice(0, 24);
      if (!name) {
        window.showDiscreteToast?.('⚠️', 'Poné un nombre para el patrón', '#f59e0b');
        return;
      }
      if (!window.rrPattern || !window.rrPattern.length) return;
      // Se registra quién lo crea (el nombre actual) para que, una vez guardado, solo
      // ese jugador o Rubiking puedan eliminarlo/gestionarlo más adelante.
      window.__fbSavePattern?.(name, [...window.rrPattern], rrEditorCurrentName());
      window.showDiscreteToast?.('💾', `Patrón "${name}" guardado`, '#22c55e');
      rrCloseSaveModal();
    }
    window.rrConfirmSavePattern = rrConfirmSavePattern;
  </script>

    function refreshRRColors() {
      const theme = (window.__RR_SEASON_THEMES || {})[window.__rrActiveSeason] || null;
      let src;
      if (window.__seasonAltMode && theme) src = theme.rrColors;
      else if (window.__prideMode) src = PRIDE_RR_COLORS;
      else src = window._origRrColors || window.RR_COLORS;

    window.__RR_SEASON_THEMES.vuelta_colegio = {
      colorMap: schoolColorMap,
