        function TutorialOverlay({ step, hl, onNext, onClose }) {
      if (!step || !hl) return null;
      const { pat, ctr, voice, invite } = hl;
      const pad = 10;
      const vw = window.innerWidth, vh = window.innerHeight;

      const pPerim = 2*((pat.width+pad*2)+(pat.height+pad*2));
      const cPerim = ctr ? 2*((ctr.width+pad*2)+(ctr.height+pad*2)) : 0;
      const vPerim = voice ? 2*Math.PI*((voice.width+pad*2)/2) : 0;
      const iPerim = invite ? 2*((invite.width+pad*2)+(invite.height+pad*2)) : 0;

      // Curved arrow: from center of pattern pill → center of board 3×3
      const aFx = pat.left+pat.width/2, aFy = pat.top+pat.height/2;
      const aTx = ctr ? ctr.left+ctr.width/2 : vw/2;
      const aTy = ctr ? ctr.top+ctr.height/2 : vh/2;

      // Text: below spotlight (flip above if too close to bottom)
      const ptY = pat.bottom+pad+16+30 < vh ? pat.bottom+pad+16 : pat.top-pad-46;
      const ctY = ctr && ctr.bottom+pad+16+50 < vh ? ctr.bottom+pad+16 : ctr ? ctr.top-pad-56 : vh/2+120;
      const ctX = ctr ? ctr.left+ctr.width/2 : vw/2;
      const vtY = voice ? (voice.top-pad-46 > 0 ? voice.top-pad-46 : voice.bottom+pad+16) : 0;
      const vtX = voice ? voice.left+voice.width/2 : vw/2;
      const itY = invite ? (invite.bottom+pad+16+40 < vh ? invite.bottom+pad+16 : invite.top-pad-50) : 0;
      const itX = invite ? invite.left+invite.width/2 : vw/2;

      const handleClick = () => {
        if (step === 1) onNext(2);
        else if (step === 2) { if (voice) onNext(3); else onNext(4); }
        else if (step === 3) onNext(4);
        else if (step === 4) { if (invite) onNext(5); else onClose(); }
        else onClose();
      };

      return (
        <div style={{position:'fixed',inset:0,zIndex:8000,cursor:'pointer'}}
             onClick={handleClick}>
          <svg width={vw} height={vh} style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'visible'}}>
            <defs>
              <mask id="tut-mask" maskUnits="userSpaceOnUse">
                <rect x={0} y={0} width={vw} height={vh} fill="white"/>
                {step===1 && <rect x={pat.left-pad} y={pat.top-pad}
                                   width={pat.width+pad*2} height={pat.height+pad*2} fill="black" rx="16"/>}
                {step===2 && ctr && <rect x={ctr.left-pad} y={ctr.top-pad}
                                          width={ctr.width+pad*2} height={ctr.height+pad*2} fill="black" rx="14"/>}
                {step===3 && voice && <circle cx={voice.left+voice.width/2} cy={voice.top+voice.height/2}
                                              r={(voice.width+pad*2)/2} fill="black"/>}
                {step===5 && invite && <rect x={invite.left-pad} y={invite.top-pad}
                                             width={invite.width+pad*2} height={invite.height+pad*2} fill="black" rx="14"/>}
              </mask>
              <marker id="tut-ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0,10 3.5,0 7" fill="#FFD700"/>
              </marker>
            </defs>

            {/* dark veil with cutout */}
            <rect x={0} y={0} width={vw} height={vh} fill="rgba(0,0,0,.84)" mask="url(#tut-mask)"/>

            {/* animated border – step 1: pattern pill */}
            {step===1 && (
              <rect x={pat.left-pad} y={pat.top-pad}
                    width={pat.width+pad*2} height={pat.height+pad*2}
                    fill="none" stroke="#FFD700" strokeWidth="3" rx="16"
                    strokeDasharray={pPerim} strokeDashoffset={pPerim}
                    style={{animation:'tutDraw .8s ease .15s forwards'}}/>
            )}

            {/* animated border – step 2: center tiles */}
            {step===2 && ctr && (
              <rect x={ctr.left-pad} y={ctr.top-pad}
                    width={ctr.width+pad*2} height={ctr.height+pad*2}
                    fill="none" stroke="#FFD700" strokeWidth="3" rx="14"
                    strokeDasharray={cPerim} strokeDashoffset={cPerim}
                    style={{animation:'tutDraw .8s ease .15s forwards'}}/>
            )}

            {/* curved arrow – step 2 */}
            {step===2 && ctr && (
              <path d={`M${aFx},${aFy} C${aFx},${(aFy*2+aTy)/3} ${aTx},${(aFy+aTy*2)/3} ${aTx},${aTy}`}
                    fill="none" stroke="#FFD700" strokeWidth="2.5"
                    strokeDasharray="8 5" markerEnd="url(#tut-ah)"
                    style={{animation:'tutArrow .5s ease 1.1s both'}}/>
            )}

            {/* animated border – step 3: voice button */}
            {step===3 && voice && (
              <circle cx={voice.left+voice.width/2} cy={voice.top+voice.height/2}
                      r={(voice.width+pad*2)/2}
                      fill="none" stroke="#FFD700" strokeWidth="3"
                      strokeDasharray={vPerim} strokeDashoffset={vPerim}
                      style={{animation:'tutDraw .8s ease .15s forwards'}}/>
            )}

            {/* animated border – step 5: invite button */}
            {step===5 && invite && (
              <rect x={invite.left-pad} y={invite.top-pad}
                    width={invite.width+pad*2} height={invite.height+pad*2}
                    fill="none" stroke="#FFD700" strokeWidth="3" rx="14"
                    strokeDasharray={iPerim} strokeDashoffset={iPerim}
                    style={{animation:'tutDraw .8s ease .15s forwards'}}/>
            )}
          </svg>

          {/* label – step 1 */}
          {step===1 && (
            <div style={{position:'absolute',left:pat.left+pat.width/2,top:ptY,
                         transform:'translateX(-50%)',pointerEvents:'none',
                         color:'#FFD700',fontSize:'clamp(16px,4vw,22px)',fontWeight:800,
                         textShadow:'0 0 30px rgba(255,215,0,.95),0 2px 10px rgba(0,0,0,.9)',
                         letterSpacing:'.04em',textAlign:'center',whiteSpace:'nowrap',
                         animation:'tutFadeUp .45s ease 1s both'}}>
              {window.T.tutStep1}
            </div>
          )}

          {/* label – step 2 */}
          {step===2 && (
            <div style={{position:'absolute',left:ctX,top:ctY,
                         transform:'translateX(-50%)',pointerEvents:'none',
                         color:'#FFD700',fontSize:'clamp(15px,3.5vw,20px)',fontWeight:800,
                         textShadow:'0 0 30px rgba(255,215,0,.95),0 2px 10px rgba(0,0,0,.9)',
                         letterSpacing:'.03em',textAlign:'center',
                         animation:'tutFadeUp .45s ease 1.1s both'}}>
              <span dangerouslySetInnerHTML={{__html: window.T.tutStep2(hl.centerCount||9)}}/>
            </div>
          )}

          {/* label – step 3: voice control */}
          {step===3 && voice && (
            <div style={{position:'absolute',left:Math.min(Math.max(vtX,140),vw-140),top:vtY,
                         transform:'translateX(-50%)',pointerEvents:'none',
                         color:'#FFD700',fontSize:'clamp(14px,3.4vw,19px)',fontWeight:800,
                         textShadow:'0 0 30px rgba(255,215,0,.95),0 2px 10px rgba(0,0,0,.9)',
                         letterSpacing:'.03em',textAlign:'center',maxWidth:'260px',
                         animation:'tutFadeUp .45s ease 1.1s both'}}>
              <span dangerouslySetInnerHTML={{__html: window.T.tutStep3}}/>
            </div>
          )}

          {/* label – step 4: hint tip */}
          {step===4 && (
            <div style={{position:'absolute',left:'50%',top:'50%',
                         transform:'translate(-50%,-50%)',pointerEvents:'none',
                         color:'#FFD700',fontSize:'clamp(15px,3.5vw,20px)',fontWeight:800,
                         textShadow:'0 0 30px rgba(255,215,0,.95),0 2px 10px rgba(0,0,0,.9)',
                         letterSpacing:'.03em',textAlign:'center',maxWidth:'280px',
                         animation:'tutFadeUp .45s ease .3s both'}}>
              <span dangerouslySetInnerHTML={{__html: window.T.tutStep4}}/>
            </div>
          )}

          {/* label – step 5: invite */}
          {step===5 && invite && (
            <div style={{position:'absolute',left:Math.min(Math.max(itX,140),vw-140),top:itY,
                         transform:'translateX(-50%)',pointerEvents:'none',
                         color:'#FFD700',fontSize:'clamp(15px,3.5vw,20px)',fontWeight:800,
                         textShadow:'0 0 30px rgba(255,215,0,.95),0 2px 10px rgba(0,0,0,.9)',
                         letterSpacing:'.03em',textAlign:'center',maxWidth:'260px',
                         animation:'tutFadeUp .45s ease .6s both'}}>
              {window.T.tutStep5}
            </div>
          )}

          {/* hint */}
          <div style={{position:'absolute',bottom:22,left:'50%',transform:'translateX(-50%)',
                       color:'rgba(255,255,255,.86)',fontSize:'11px',letterSpacing:'.14em',
                       pointerEvents:'none'}}>
            {(step===1 || (step===2 && voice) || step===3 || (step===4 && invite)) ? window.T.tutContinue : window.T.tutClose}
          </div>
        </div>
      );
    }

    /* ─── Game ─── */
    function Game({ playerName, gameCode, level, onLeave, onLevelUp, fromInvite }) {
      const LV = window.RR_LEVEL_INFO(level);
      const isCross = LV.special === 'cross';
      const boardSize = LV.boardSize, patternSize = LV.patternSize;
      const mask = isCross ? new Set(window.RR_CROSS_SHAPE.validIndices) : null;
      const CENTER = isCross ? window.RR_CROSS_SHAPE.patternIndices : computeCenter(boardSize, patternSize);

      const [tiles,       setTiles]        = useState(()=>shuffle(buildSolved(boardSize, mask), boardSize, 300, mask));
      const [moves,       setMoves]        = useState(0);
      const [time,        setTime]         = useState(0);
      const [finished,    setFinished]     = useState(false);
      const [lastMoved,   setLastMoved]    = useState(null);
      const [rrPat,       setRrPat]        = useState([]);
      const [activePl,    setActivePl]     = useState([]);
      const [showScores,    setShowScores]    = useState(false);
      const [showInvite,    setShowInvite]    = useState(false);
      const [showConfirm, setShowConfirm]  = useState(false);
      const [confirmAction, setConfirmAction] = useState('new'); // 'new' = nuevo patrón, 'restart' = mismo patrón
      const [finishNotif,  setFinishNotif]  = useState(null); // {name, time, moves}
      const [copied,      setCopied]       = useState(false);
      const [tutStep,     setTutStep]      = useState(0);
      const [tutHl,       setTutHl]        = useState(null);
      const [sabotageFlashIdx, setSabotageFlashIdx] = useState(null); // ficha recién saboteada → flash morado
      const [showTutHint, setShowTutHint]  = useState(true);
      const [countdown,   setCountdown]    = useState(null);
      const [showLifesaver, setShowLifesaver] = useState(false);
      const [hintMove,      setHintMove]      = useState(null);
      const [usedHints,     setUsedHints]     = useState(false);
      const pride = usePrideMode();
      const colorblind = useColorblindMode();
      const seasonAlt = useSeasonAltMode();
      const activeSeason = useActiveSeason();
      const seasonTheme = window.__RR_SEASON_THEMES[activeSeason] || null;
      const darkText = seasonAlt && seasonTheme?.darkText;
      const [pridePreview, setPridePreview] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [finishOverlayColor, setFinishOverlayColor] = useState(null);

      // Al terminar, si la temporada activa pide una máscara "pastelizada" aleatoria
      // (Vuelta al Colegio), elige un color de la paleta de esa temporada y lo aclara.
      useEffect(() => {
        if (!finished) { setFinishOverlayColor(null); return; }
        if (seasonAlt && seasonTheme && seasonTheme.pastelOverlay && seasonTheme.colorMap) {
          const options = Object.values(seasonTheme.colorMap);
          const pick = options[Math.floor(Math.random() * options.length)];
          setFinishOverlayColor(pick ? rrPastelize(pick.bg) : null);
        } else {
          setFinishOverlayColor(null);
        }
      }, [finished, seasonAlt, seasonTheme]);

      // Toggle persistente de fichas Pride durante la partida
      useEffect(() => {
        window.__prideTiles = false; // reset al montar
        const handler = (e) => setPridePreview(e.detail);
        window.addEventListener('prideTileToggle', handler);
        return () => {
          window.removeEventListener('prideTileToggle', handler);
          window.__prideTiles = false;
        };
      }, []);

      // El colorMap efectivo: Pride real O preview temporal durante long press
      const effectivePride = pride || pridePreview;

      const hintIdleRef     = useRef(null);
      const lastMoveTimeRef = useRef(Date.now());
      const timerRef    = useRef(null);
      const finishedRef = useRef(false);
      const presenceRef = useRef(null);
      const boardRef    = useRef(null);
      const rrSlotRef   = useRef(null);
      const activePlRef = useRef([]);
      const nearWinSentRef = useRef(false);
      const rrPatRef = useRef([]);
      useEffect(() => { rrPatRef.current = rrPat; }, [rrPat]);

      // ── Power-up de remontada (sabotaje) ──
      const matchIndexRef     = useRef(0);  // nº de partida en esta sesión/dispositivo
      const prevCorrectRef    = useRef(0);  // fichas centrales correctas antes del último movimiento
      const otherProgressRef  = useRef([]); // progreso de los demás jugadores: [{name, correct}]

      // Prompt de "¿Mandar Sudden Swap?" — el jugador elige si lo usa o no
      const [sabotagePrompt, setSabotagePrompt]   = useState(null); // {target, secondsLeft}
      const sabotagePromptActiveRef = useRef(false);
      const sabotagePromptTickRef   = useRef(null);

      const triggerSabotagePrompt = useCallback((targetName) => {
        sabotagePromptActiveRef.current = true;
        setSabotagePrompt({ target: targetName, secondsLeft: 5 });
        clearInterval(sabotagePromptTickRef.current);
        sabotagePromptTickRef.current = setInterval(() => {
          setSabotagePrompt(p => {
            if (!p) return p;
            const next = p.secondsLeft - 1;
            if (next <= 0) {
              clearInterval(sabotagePromptTickRef.current);
              sabotagePromptActiveRef.current = false;
              return null;
            }
            return { ...p, secondsLeft: next };
          });
        }, 1000);
      }, []);

      const confirmSabotage = useCallback(() => {
        setSabotagePrompt(p => {
          if (p) window.__fbSendSabotage?.(p.target, playerName);
          return null;
        });
        clearInterval(sabotagePromptTickRef.current);
        sabotagePromptActiveRef.current = false;
      }, [playerName]);

      useEffect(() => () => clearInterval(sabotagePromptTickRef.current), []);

      // ── Consenso de "nuevo juego" / "reiniciar" ──
      const [resetVotePrompt, setResetVotePrompt] = useState(null); // {requestId, from, action, secondsLeft} (para mí, si me llega un pedido)
      const resetVoteTickRef = useRef(null);
      const pendingResetRef  = useRef(null); // cuando YO soy quien pidió el reset

      const finalizeResetVote = useCallback((accepted, rejectedBy) => {
        const pend = pendingResetRef.current;
        if (!pend || pend.done) return;
        pend.done = true;
        clearTimeout(pend.timeoutId);
        pendingResetRef.current = null;
        if (accepted) {
          pend.proceed();
        } else {
          window.showDiscreteToast?.('❌', `${rejectedBy} rechazó el nuevo juego`, '#ef4444');
        }
      }, []);

      const requestResetConsensus = useCallback((action, proceed) => {
        const requestId = Math.random().toString(36).slice(2);
        const others = new Set(activePlRef.current.filter(p => p.name !== playerName).map(p => p.name));
        pendingResetRef.current = { requestId, accepted: new Set(), othersRequired: others, proceed, done: false, timeoutId: null };
        window.__fbSendResetRequest?.(playerName, action, requestId);
        if (others.size === 0) { finalizeResetVote(true); return; }
        window.showDiscreteToast?.('⏳', 'Esperando confirmación de los demás jugadores…', '#c89fff');
        pendingResetRef.current.timeoutId = setTimeout(() => finalizeResetVote(true), 5000);
      }, [playerName, finalizeResetVote]);

      // Recibo un pedido de reset de otro jugador → le muestro un prompt para aceptar/rechazar
      useEffect(() => {
        const handler = (e) => {
          const item = e.detail;
          if (!item || item.from === playerName) return;
          setResetVotePrompt({ requestId: item.requestId, from: item.from, action: item.action, secondsLeft: 5 });
          clearInterval(resetVoteTickRef.current);
          resetVoteTickRef.current = setInterval(() => {
            setResetVotePrompt(p => {
              if (!p) return p;
              const next = p.secondsLeft - 1;
              if (next <= 0) { clearInterval(resetVoteTickRef.current); return null; }
              return { ...p, secondsLeft: next };
            });
          }, 1000);
        };
        window.addEventListener('rrResetRequest', handler);
        return () => window.removeEventListener('rrResetRequest', handler);
      }, [playerName]);

      // Recibo respuestas a MI pedido de reset
      useEffect(() => {
        const handler = (e) => {
          const item = e.detail;
          const pend = pendingResetRef.current;
          if (!item || !pend || item.requestId !== pend.requestId) return;
          if (item.accept === false) {
            finalizeResetVote(false, item.from);
          } else {
            pend.accepted.add(item.from);
            const stillWaiting = [...pend.othersRequired].some(n => !pend.accepted.has(n));
            if (!stillWaiting) finalizeResetVote(true);
          }
        };
        window.addEventListener('rrResetResponse', handler);
        return () => window.removeEventListener('rrResetResponse', handler);
      }, [finalizeResetVote]);

      const respondReset = useCallback((accept) => {
        setResetVotePrompt(p => {
          if (p) window.__fbSendResetResponse?.(p.requestId, playerName, accept);
          return null;
        });
        clearInterval(resetVoteTickRef.current);
      }, [playerName]);

      useEffect(() => () => {
        clearInterval(resetVoteTickRef.current);
        if (pendingResetRef.current) clearTimeout(pendingResetRef.current.timeoutId);
      }, []);

      // Cuenta esta partida como "partida nº N" del dispositivo — el power-up solo
      // se activa a partir de la 2ª partida en adelante.
      useEffect(() => {
        try {
          const n = (parseInt(localStorage.getItem('rr-match-count') || '0', 10) || 0) + 1;
          localStorage.setItem('rr-match-count', String(n));
          matchIndexRef.current = n;
        } catch (e) { matchIndexRef.current = 1; }
      }, []);

      const [myCorrectCount, setMyCorrectCount] = useState(0);
      const [otherProgressState, setOtherProgressState] = useState([]);

      // Escucha el progreso (fichas correctas) de los demás jugadores de la partida
      useEffect(() => {
        const handler = (e) => {
          const list = (e.detail || []).filter(p => p.name !== playerName);
          otherProgressRef.current = list;
          setOtherProgressState(list);
        };
        window.addEventListener('rrProgressChange', handler);
        return () => window.removeEventListener('rrProgressChange', handler);
      }, [playerName]);

      // Recibe un sabotaje: descoloca aleatoriamente una de mis fichas bien colocadas
      useEffect(() => {
        const handler = (e) => {
          const item = e.detail;
          if (!item || item.target !== playerName || finishedRef.current) return;
          setTiles(curTiles => {
            const correctPositions = CENTER.filter((pos, i) => {
              const t = curTiles[pos];
              return t && rrPatRef.current.length > i && t.colorId === RR_IDS[rrPatRef.current[i]];
            });
            if (!correctPositions.length) return curTiles;
            const pos = correctPositions[Math.floor(Math.random() * correctPositions.length)];
            const options = RR_IDS.filter(c => c !== curTiles[pos].colorId);
            const wrongColor = options[Math.floor(Math.random() * options.length)];
            const nt = [...curTiles];
            nt[pos] = { ...nt[pos], colorId: wrongColor };
            setSabotageFlashIdx(pos);
            setTimeout(() => setSabotageFlashIdx(p => p === pos ? null : p), 700);
            return nt;
          });
          window.showSuddenSwapToast?.(item.from);
          navigator.vibrate?.([40, 30, 40, 30, 90]);
        };
        window.addEventListener('rrSabotageReceived', handler);
        return () => window.removeEventListener('rrSabotageReceived', handler);
      }, [playerName]);

      // Fija el nivel activo (para que rrShuffle/reset regeneren un patrón del tamaño correcto)
      // y ajusta el tamaño de ficha (--tile) global a este tablero.
      useEffect(() => {
        window.__rrLevel = level;
        const boardExtra = 24 + 5 * (boardSize - 1); // padding del tablero + gaps entre fichas
        const chromeReserved = 300 + boardExtra;      // cabecera + etiquetas + pie + margenes
        document.documentElement.style.setProperty('--tile',
          `clamp(${LV.tileMin}px, min(calc((100vw - 64px)/${boardSize}), calc((100dvh - ${chromeReserved}px)/${boardSize})), ${LV.tileMax}px)`);
        return () => { document.documentElement.style.setProperty('--tile', 'clamp(50px,calc((100vw - 64px)/5),62px)'); };
      }, [level]);

      // ── BFS solver: devuelve lista de índices de tile que hay que mover (en orden) ──
      const bfsSolve = useCallback((currentTiles) => {
        if (!rrPat.length || !CENTER.length) return [];
        const size = boardSize;
        // Objetivo: qué colorId debe ir en cada posición central
        const targetColor = {};
        CENTER.forEach((pos, i) => { if (rrPat[i] !== undefined) targetColor[pos] = RR_IDS[rrPat[i]]; });

        const emptyIdx = currentTiles.indexOf(null);
        if (emptyIdx === -1) return [];

        // Vecinos válidos del hueco
        const r = Math.floor(emptyIdx / size), col = emptyIdx % size;
        const nbrs = [];
        if (r > 0) nbrs.push(emptyIdx - size);
        if (r < size - 1) nbrs.push(emptyIdx + size);
        if (col > 0) nbrs.push(emptyIdx - 1);
        if (col < size - 1) nbrs.push(emptyIdx + 1);
        const valid = mask ? nbrs.filter(p => mask.has(p)) : nbrs;
        if (!valid.length) return [];

        // Contar fichas centrales en posición correcta ANTES
        const scoreBefore = CENTER.reduce((acc, pos) => {
          return acc + (currentTiles[pos] && currentTiles[pos].colorId === targetColor[pos] ? 1 : 0);
        }, 0);

        // Evaluar cada movimiento posible: elegir el que más mejora (o menos empeora)
        let best = null, bestScore = -Infinity;
        for (const nb of valid) {
          const nt = [...currentTiles]; [nt[emptyIdx], nt[nb]] = [nt[nb], nt[emptyIdx]];
          const score = CENTER.reduce((acc, pos) => {
            return acc + (nt[pos] && nt[pos].colorId === targetColor[pos] ? 1 : 0);
          }, 0);
          // Bonus si la ficha movida va a una posición central correcta
          const bonus = (CENTER.includes(emptyIdx) && nt[emptyIdx] && nt[emptyIdx].colorId === targetColor[emptyIdx]) ? 2 : 0;
          const total = score + bonus;
          if (total > bestScore) { bestScore = total; best = nb; }
        }
        // Si ningún movimiento mejora, elegir el que menos empeora
        // pero evitar el que acaba de hacerse (lastMoved) si hay alternativa
        return best !== null ? [best] : [valid[0]];
      }, [rrPat, CENTER, boardSize, mask]);

      // ── Idle timer: 5s sin mover → mostrar salvavidas + pre-cargar primera pista ──
      const showLifesaverRef = useRef(false);
      useEffect(() => { showLifesaverRef.current = showLifesaver; }, [showLifesaver]);

      useEffect(() => {
        if (finished || countdown !== null) { setShowLifesaver(false); return; }
        const tick = () => {
          if (Date.now() - lastMoveTimeRef.current >= 5000 && !showLifesaverRef.current) {
            setShowLifesaver(true);
            // NO pre-cargamos hintMove aquí — solo aparece el icono salvavidas
            // hintMove se calcula al pulsar el botón
          }
        };
        hintIdleRef.current = setInterval(tick, 500);
        return () => clearInterval(hintIdleRef.current);
      }, [finished, countdown]);

      const startCountdown = useCallback(() => {
        clearInterval(timerRef.current); timerRef.current = null;
        setTime(0); setCountdown(3);
        setTimeout(() => setCountdown(2), 1000);
        setTimeout(() => setCountdown(1), 2000);
        setTimeout(() => setCountdown(null), 3000);
      }, []);

      const openTutorial = () => {
        const toggleEl = document.getElementById('rr-toggle');
        const pat = toggleEl ? toggleEl.getBoundingClientRect() : null;
        if (!pat) return;
        const centerEls = boardRef.current?.querySelectorAll('[data-tut="center"]');
        let ctr = null;
        if (centerEls && centerEls.length > 0) {
          const rs = [...centerEls].map(el => el.getBoundingClientRect());
          const l=Math.min(...rs.map(r=>r.left)), t=Math.min(...rs.map(r=>r.top));
          const ri=Math.max(...rs.map(r=>r.right)), b=Math.max(...rs.map(r=>r.bottom));
          ctr = { left:l, top:t, right:ri, bottom:b, width:ri-l, height:b-t };
        }
        const voiceEl = document.getElementById('rr-voice-btn');
        const voice = voiceEl ? voiceEl.getBoundingClientRect() : null;
        const inviteEl = document.getElementById('tut-invite-btn');
        const invite = inviteEl ? inviteEl.getBoundingClientRect() : null;
        setTutHl({ pat, ctr, voice, invite, centerCount: patternSize*patternSize });
        setTutStep(1);
      };

      // Show tutorial hint if player has never played
      useEffect(() => {
        window.__fbHasPlayed?.(playerName).then(has => {
          if (!has) {
            setShowTutHint(true);
            setTimeout(() => setShowTutHint(false), 2000);
          }
        });
      }, []);

      // Delete lobby entry on browser close
      useEffect(() => {
        const onUnload = () => window.__fbLobbyDeleteNow?.(gameCode);
        window.addEventListener('beforeunload', onUnload);
        return () => window.removeEventListener('beforeunload', onUnload);
      }, [gameCode]);

      // Near-win listener: tick-tock para todos excepto el que tiene 1 ficha
      useEffect(() => {
        const handler = (e) => {
          const v = e.detail;
          if (v?.player && v.player !== playerName) window.playTickTock?.();
        };
        window.addEventListener('rrNearWin', handler);
        return () => window.removeEventListener('rrNearWin', handler);
      }, [playerName]);

      // Show widget when in game — se inserta en el flujo normal (junto a los botones), sin flotar
      useEffect(() => {
        const widget = document.getElementById('rr-widget');
        const slot = rrSlotRef.current;
        window.__rrCurrentPlayerName = playerName;
        window.rrSyncPatternTools?.();
        if (widget && slot) {
          slot.appendChild(widget);
          widget.style.display = '';
        }
        return () => {
          // Cerrar panel, modo manual y cualquier modal (guardar / galería) que haya
          // quedado abierto: si no, seguirían visibles y operables para el próximo
          // jugador que entre con otro nombre (p.ej. tras salir de "Rubiking").
          window.__rrResetEditorUI?.();
          if (widget) {
            widget.style.display = 'none';
            // Importante: devolver el widget a un contenedor estable (body) ANTES de que
            // React desmonte el slot; si no, el nodo se va con el slot y getElementById
            // deja de encontrarlo en la próxima partida, y el bloque de patrón no vuelve a salir.
            document.body.appendChild(widget);
          }
          // Al salir de esta partida (desconexión) se consume el desbloqueo del
          // editor de patrón: hará falta ganar 3 partidas más para recuperarlo.
          window.__rrConsumeEditorUnlock?.();
        };
      }, []);

      // Presence heartbeat
      const sendPresence = useCallback((moving=false) => {
        if (typeof window.__fbUpdatePresence==='function' && playerName.trim())
          window.__fbUpdatePresence(SESSION_UID, playerName.trim(), moving);
      }, [playerName]);

      useEffect(() => {
        sendPresence(false);
        presenceRef.current = setInterval(()=>sendPresence(false), 8000);
        return () => clearInterval(presenceRef.current);
      }, []);

      // Pattern sync
      useEffect(() => {
        if (window.rrPattern.length) setRrPat([...window.rrPattern]);
        const onPat = e => {
          setRrPat([...e.detail]); setFinished(false); finishedRef.current=false;
          if (activePlRef.current.length > 1) {
            startCountdown();
          } else {
            if(!timerRef.current) timerRef.current=setInterval(()=>setTime(t=>t+1),1000);
          }
        };
        window.addEventListener('rrPatternChange', onPat);
        return () => window.removeEventListener('rrPatternChange', onPat);
      }, [startCountdown]);

      // Timer — paused during countdown
      useEffect(() => {
        if (!finished && countdown === null) { timerRef.current=setInterval(()=>setTime(t=>t+1),1000); }
        else { clearInterval(timerRef.current); timerRef.current=null; }
        return () => { clearInterval(timerRef.current); timerRef.current=null; };
      }, [finished, countdown]);

      // Global reset
      useEffect(() => {
        const onReset = () => doLocalReset();
        window.addEventListener('rrGlobalReset', onReset);
        return () => window.removeEventListener('rrGlobalReset', onReset);
      }, []);

      // Validar patrón: regenera el tablero garantizando tiles suficientes de cada
      // color que necesita el patrón recién creado (manual o desde imagen).
      useEffect(() => {
        const onValidate = (e) => {
          const pattern = e.detail || [];
          const counts = rrRequiredCounts(pattern);
          setTiles(shuffle(buildSolvedForPattern(boardSize, mask, counts), boardSize, 300, mask));
          setMoves(0); setFinished(false);
          setLastMoved(null); finishedRef.current=false; nearWinSentRef.current=false;
          setUsedHints(false); setHintMove(null); setShowLifesaver(false);
          lastMoveTimeRef.current = Date.now();
          window.__fbUpdatePresence?.(SESSION_UID, playerName, false);
          startCountdown();
        };
        window.addEventListener('rrValidatePattern', onValidate);
        return () => window.removeEventListener('rrValidatePattern', onValidate);
      }, [boardSize, mask, playerName, startCountdown]);

      // Presence change
      useEffect(() => {
        const onP = e => { const p=e.detail||[]; setActivePl(p); activePlRef.current=p; };
        window.addEventListener('rrPresenceChange', onP);
        return () => window.removeEventListener('rrPresenceChange', onP);
      }, []);


      const [voiceOn,    setVoiceOn]    = useState(false);
      const voiceRef = useRef(null);

      const handleTileRef = useRef(null);

      const startVoice = useCallback(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        const r = new SR();
        r.lang = 'en-US';
        r.continuous = true;
        r.interimResults = false;
        r.maxAlternatives = 5;

        const lastLetter = String.fromCharCode(64+boardSize); // A..J

        const LETTER_WORDS = {
          A:'A', AY:'A', HEY:'A', HEI:'A', EH:'A',
          B:'B', BE:'B', BEE:'B',
          C:'C', SEE:'C', SEA:'C',
          D:'D', DEE:'D', THE:'D',
          E:'E', EE:'E',
          F:'F', EFF:'F',
          G:'G', GEE:'G',
          H:'H', AITCH:'H',
          I:'I', EYE:'I',
          J:'J', JAY:'J',
        };
        const NUM_WORDS = {
          ONE:'1', WON:'1', TO:'2', TWO:'2', TOO:'2',
          THREE:'3', TREE:'3', FOR:'4', FOUR:'4', FORE:'4',
          FIVE:'5', FIE:'5',
          SIX:'6', SEVEN:'7', EIGHT:'8', ATE:'8', NINE:'9', TEN:'10',
        };

        const parseCoord = (raw) => {
          let txt = raw.trim().toUpperCase();
          // Try direct pattern first: "A3", "A 3", "A-3"
          let m = txt.replace(/[^A-Z0-9]/g,'').match(new RegExp(`^([A-${lastLetter}])(10|[1-9])$`));
          if (m) return [m[1], m[2]];
          // Try word-by-word: split on spaces/punct, map words to letter+digit
          const words = txt.split(/[^A-Z0-9]+/).filter(Boolean);
          let letter=null, num=null;
          for (const w of words) {
            if (!letter) {
              if (new RegExp(`^[A-${lastLetter}]$`).test(w)) letter=w;
              else if (LETTER_WORDS[w]) letter=LETTER_WORDS[w];
            }
            if (!num) {
              if (/^(10|[1-9])$/.test(w)) num=w;
              else if (NUM_WORDS[w]) num=NUM_WORDS[w];
            }
          }
          if (letter && num) return [letter, num];
          return null;
        };

        r.onresult = e => {
          const res = e.results[e.results.length-1];
          for (let i=0; i<res.length; i++) {
            const parsed = parseCoord(res[i].transcript);
            if (parsed) {
              const col = parsed[0].charCodeAt(0)-65;
              const row = parseInt(parsed[1])-1;
              const idx = row*boardSize+col;
              if (col < boardSize && row < boardSize && (!mask || mask.has(idx))) handleTileRef.current?.(idx);
              break;
            }
          }
        };
        r.onerror = () => { setVoiceOn(false); };
        r.onend   = () => { if (voiceRef.current) r.start(); }; // keep alive
        voiceRef.current = r;
        r.start();
        setVoiceOn(true);
      }, [boardSize]);


      const stopVoice = useCallback(() => {
        if (voiceRef.current) { voiceRef.current.onend=null; voiceRef.current.stop(); voiceRef.current=null; }
        setVoiceOn(false);
      }, []);



      useEffect(() => () => { if(voiceRef.current){voiceRef.current.onend=null;voiceRef.current.stop();} }, []);

      const handleTile = useCallback((idx) => {
        if (finished || countdown !== null) return;
        const ei=tiles.indexOf(null);
        if (!canMove(idx,ei,boardSize,mask)) return;
        const movedTile = tiles[idx];
        const nt=[...tiles]; [nt[ei],nt[idx]]=[nt[idx],nt[ei]];
        setTiles(nt); setMoves(m=>m+1); setLastMoved(ei);
        lastMoveTimeRef.current = Date.now();
        // Siempre apagar salvavidas al mover; el idle timer lo reactiva a los 5s
        setShowLifesaver(false);
        setHintMove(null);
        sendPresence(true);
        window.__fbUpdateLobbyActivity?.(gameCode);

        // Sonido y háptico
        const centerIdx = CENTER.indexOf(ei);
        const correctPos = centerIdx !== -1 && rrPat.length === CENTER.length && movedTile &&
          movedTile.colorId === RR_IDS[rrPat[centerIdx]];
        if (correctPos) {
          if (voiceOn) window.playChime?.(); else window.playWood?.();
          navigator.vibrate?.([60, 25, 60, 25, 60]);
        }
        else            { window.playClack?.(); navigator.vibrate?.(18); }

        // Near-win: a una ficha de completar el patrón central
        const centerCorrectCount = CENTER.filter((pos,i) => {
          const t = nt[pos]; return t && rrPat.length > i && t.colorId === RR_IDS[rrPat[i]];
        }).length;
        if (!nearWinSentRef.current && !finishedRef.current) {
          if (centerCorrectCount === CENTER.length - 1) { nearWinSentRef.current = true; window.__fbSendNearWin?.(playerName); }
        }

        // Difundo mi progreso a los demás jugadores de la partida
        setMyCorrectCount(centerCorrectCount);
        if (activePl.length > 1) window.__fbUpdateProgress?.(SESSION_UID, playerName, centerCorrectCount);

        // Power-up de remontada: si voy 1-1 en fichas y coloco mi 2ª ficha correcta
        // mientras alguien va ganando con más de 4, se me ofrece la opción de mandar
        // un Sudden Swap (el jugador decide, no es automático).
        if (window.__RR_DEBUG__) {
          console.debug('[SuddenSwap]', {
            matchIndex: matchIndexRef.current, activePl: activePl.length,
            prevCorrect: prevCorrectRef.current, centerCorrectCount,
            promptActive: sabotagePromptActiveRef.current,
            otherProgress: otherProgressRef.current
          });
        }
        if (matchIndexRef.current >= 2 && activePl.length > 1 &&
            prevCorrectRef.current === 1 && centerCorrectCount === 2 &&
            !sabotagePromptActiveRef.current) {
          const targets = otherProgressRef.current.filter(p => p.correct > 4);
          if (targets.length) {
            const victim = targets[Math.floor(Math.random() * targets.length)];
            triggerSabotagePrompt(victim.name);
          }
        }
        prevCorrectRef.current = centerCorrectCount;

        if (!finishedRef.current && checkMatch(nt,rrPat,CENTER)) {
          finishedRef.current=true; setFinished(true);
          const ft=fmt(time+1), fm=moves+1;
          if (usedHints) {
            window.playMarseillaiseHelp?.();
          } else {
            if (level >= 1 && level <= 8) window.__fbMarkLevelDone?.(playerName, level);
            setTimeout(()=>{
              window.__fbSendFinish?.(playerName, ft, fm);
              window.__fbUpdateFinishPresence?.(SESSION_UID, playerName, ft, fm);
              window.__fbUpdateScore?.(playerName, time+1, fm, activePl.length > 1, level);
              if (activePl.length > 1) window.__rrRegisterMultiWin?.(playerName);
              window.__fbScheduleLobbyDelete?.(gameCode);
            },50);
          }
        }
      }, [tiles, finished, countdown, rrPat, time, moves, sendPresence, gameCode, voiceOn, usedHints, activePl, playerName, triggerSabotagePrompt]);

      useEffect(() => { handleTileRef.current = handleTile; }, [handleTile]);

      const doLocalReset = () => {
        const pat = rrPatRef.current;
        const solved = (pat && pat.length) ? buildSolvedForPattern(boardSize, mask, rrRequiredCounts(pat)) : buildSolved(boardSize, mask);
        setTiles(shuffle(solved, boardSize, 300, mask)); setMoves(0); setFinished(false);
        setLastMoved(null); finishedRef.current=false; nearWinSentRef.current=false;
        setUsedHints(false); setHintMove(null); setShowLifesaver(false);
        lastMoveTimeRef.current = Date.now();
        window.__fbUpdatePresence?.(SESSION_UID, playerName, false);
        startCountdown();
      };

      // Resuelve el tablero paso a paso (Rubiking only).
      // Construye el tablero objetivo (fichas centrales con los colores del patrón),
      // luego lo aplica de golpe con una animación breve.
      const handleAutoSolve = useCallback(() => {
        if (!rrPat.length || finished) return;
        setTiles(prev => {
          // Construir el estado "resuelto" moviendo solo las fichas del centro
          const next = [...prev];
          // Para cada posición central, buscar una ficha del color requerido fuera de su sitio
          CENTER.forEach((pos, i) => {
            const needed = RR_IDS[rrPat[i]];
            if (next[pos] && next[pos].colorId === needed) return; // ya OK
            // Buscar en el tablero una ficha del color correcto
            const srcIdx = next.findIndex((t, idx) => t && t.colorId === needed && !CENTER.slice(0, i).includes(idx));
            if (srcIdx === -1) return;
            // Intercambiar directamente (teleport mágico para Rubiking 🔮)
            [next[pos], next[srcIdx]] = [next[srcIdx], next[pos]];
          });
          // Mover el hueco a una posición válida si quedó en un hueco de forma
          const emptyIdx = next.indexOf(null);
          if (mask && !mask.has(emptyIdx)) {
            const validEmpty = [...mask].find(idx => !next[idx]);
            if (validEmpty !== undefined) [next[emptyIdx], next[validEmpty]] = [next[validEmpty], next[emptyIdx]];
          }
          return next;
        });
        setTimeout(() => {
          setTiles(prev => {
            if (checkMatch(prev, rrPat, CENTER)) {
              finishedRef.current = true; setFinished(true);
              const ft = fmt(time), fm = moves;
              if (level >= 1 && level <= 8) window.__fbMarkLevelDone?.(playerName, level);
              window.__fbSendFinish?.(playerName, ft, fm);
              window.__fbUpdateFinishPresence?.(SESSION_UID, playerName, ft, fm);
            }
            return prev;
          });
        }, 50);
      }, [rrPat, tiles, finished, CENTER, mask, time, moves, playerName]);

      const handleReset = () => {
        if (activePl.length > 1) { setConfirmAction('new'); setShowConfirm(true); }
        else doReset();
      };
      const doReset = () => {
        setShowConfirm(false);
        const proceed = () => { window.rrShuffle?.(); window.__fbSendReset?.() ?? doLocalReset(); };
        if (activePl.length > 1) requestResetConsensus('new', proceed);
        else proceed();
      };

      // Reiniciar: vuelve a intentar el mismo patrón (no genera uno nuevo).
      const handleRestart = () => {
        if (activePl.length > 1) { setConfirmAction('restart'); setShowConfirm(true); }
        else doRestart();
      };
      const doRestart = () => {
        setShowConfirm(false);
        const proceed = () => { window.__fbSendReset?.() ?? doLocalReset(); };
        if (activePl.length > 1) requestResetConsensus('restart', proceed);
        else proceed();
      };

      const copyCode = () => {
        navigator.clipboard.writeText(gameCode).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
      };

      const handleLeave = () => {
        clearInterval(timerRef.current); clearInterval(presenceRef.current);
        window.__fbLeaveGame?.();
        window.__fbScheduleLobbyDelete?.(gameCode);
        window.rrPattern=[];
        onLeave(finishedRef.current ? level : null);
      };

      const ei=tiles.indexOf(null);
      const voiceSupported = !!(window.SpeechRecognition||window.webkitSpeechRecognition);

      return (
        <div
          style={{
          height:'100vh', height:'100dvh',
          background: (seasonAlt && seasonTheme && seasonTheme.bgGradient) || 'radial-gradient(ellipse at 30% 20%,#1a1035 0%,#0a0818 60%,#000508 100%)',
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start',
          fontFamily:"'Trebuchet MS','Segoe UI',sans-serif",paddingTop:'6px',paddingBottom:'8px',paddingLeft:'14px',paddingRight:'14px',position:'relative',overflow:'hidden',
        }}>
          {!(seasonAlt && seasonTheme?.hideStars) && <Stars/>}

          {/* Fila 2: Voz/Trofeo/Invite/Ayuda/Salir (izq., círculos iguales) — Pattern widget (der.) — arriba de todo, alineados por arriba */}
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'8px',
                       width:'100%',maxWidth:'380px',marginBottom:'2px',minHeight:'70px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'6px',minWidth:0}}>
              {voiceSupported && (
                <button id="rr-voice-btn" className="help-btn" onClick={voiceOn?stopVoice:startVoice}
                        title={voiceOn?window.T.voiceOn:window.T.voiceOff}
                        style={{border:`1.5px solid ${voiceOn?'rgba(239,68,68,.6)':'rgba(156,90,255,.45)'}`,
                                background:voiceOn?'rgba(239,68,68,.15)':'rgba(10,8,24,.9)',
                                animation:voiceOn?'voicePulse 1.2s ease-in-out infinite':'none'}}>
                  <svg width="18" height="18" viewBox="0 0 475.753212 491.285714">
                    <g transform="translate(0,491.285714) scale(0.1,-0.1)" fill={voiceOn?'#f87171':'#c89fff'} stroke="none">
                      <path d="M1250 5035 c0 -12 106 -174 150 -230 76 -95 237 -244 336 -312 120 -82 154 -121 154 -176 0 -32 -7 -50 -27 -73 -68 -73 -220 -152 -367 -189 -50 -12 -103 -27 -117 -33 -39 -15 -87 -68 -100 -110 -6 -20 -16 -154 -21 -297 -5 -143 -13 -270 -18 -282 -7 -18 -20 -22 -87 -29 -43 -5 -170 -6 -283 -4 -415 8 -452 7 -490 -14 -90 -48 -161 -127 -192 -216 -27 -74 -30 -121 -14 -200 68 -322 312 -577 689 -716 42 -16 77 -34 77 -40 0 -6 -9 -37 -19 -70 -43 -129 -54 -205 -52 -334 6 -295 7 -273 -27 -342 -36 -74 -99 -141 -162 -173 -88 -44 -139 -50 -417 -50 l-263 0 0 -188 0 -189 298 5 c320 5 369 12 508 69 162 67 308 211 386 378 56 120 79 281 59 416 -15 103 -4 182 49 343 44 137 49 188 24 271 -37 126 -121 199 -279 244 -33 10 -106 40 -163 67 -133 64 -245 168 -292 272 -45 99 -44 99 47 93 212 -15 282 -16 449 -6 222 12 379 39 438 74 85 50 101 112 111 436 8 270 7 267 58 281 137 39 380 186 460 280 90 104 136 255 118 384 -25 180 -92 274 -302 422 -67 48 -149 117 -192 163 l-75 80 -226 0 c-124 0 -226 -2 -226 -5z"/>
                      <path d="M4336 3635 c-55 -19 -86 -45 -108 -87 -36 -69 -34 -95 20 -265 50 -159 77 -267 109 -443 25 -138 25 -613 0 -755 -51 -287 -119 -511 -222 -731 -156 -333 -352 -592 -661 -874 -58 -53 -73 -73 -82 -110 -30 -124 59 -243 182 -243 64 0 99 21 211 125 349 323 616 715 775 1138 25 69 54 152 64 185 10 33 22 71 27 84 6 14 14 45 19 70 5 25 16 78 25 116 21 96 44 248 56 380 12 124 6 520 -10 605 -6 30 -17 98 -26 150 -30 181 -115 483 -161 571 -17 34 -67 72 -113 88 -43 14 -57 13 -105 -4z"/>
                      <path d="M3335 3313 c-46 -24 -76 -54 -96 -98 -26 -57 -24 -86 20 -210 70 -198 85 -290 85 -530 0 -180 -3 -226 -23 -323 -68 -338 -250 -659 -497 -878 -120 -105 -138 -133 -137 -209 0 -60 20 -101 68 -143 44 -39 71 -46 141 -38 67 8 85 19 198 120 237 215 422 496 530 805 127 366 144 786 45 1157 -27 105 -86 265 -107 294 -47 63 -159 89 -227 53z"/>
                      <path d="M2367 3005 c-116 -41 -151 -158 -89 -295 42 -93 56 -163 54 -260 -3 -185 -91 -345 -256 -468 -91 -68 -119 -157 -77 -247 33 -72 86 -105 167 -105 57 0 100 18 173 74 124 95 213 207 281 351 126 267 128 549 5 810 -47 100 -66 120 -122 141 -48 17 -88 17 -136 -1z"/>
                    </g>
                  </svg>
                </button>
              )}
              <button className="help-btn" onClick={()=>setShowScores(true)} style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="18" height="18" viewBox="0 0 800 800" fill="none" stroke="#FFC64D" strokeWidth="42" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M220 115 H580"/>
                  <path d="M220 135 C145 135 105 170 105 235 C105 355 200 445 300 470"/>
                  <path d="M580 135 C655 135 695 170 695 235 C695 355 600 445 500 470"/>
                  <path d="M280 135 L280 390 C280 490 335 555 400 555 C465 555 520 490 520 390 L520 135"/>
                  <path d="M355 555 H445"/>
                  <path d="M365 590 H435"/>
                  <path d="M365 590 C355 655 325 710 270 745"/>
                  <path d="M435 590 C445 655 475 710 530 745"/>
                  <path d="M400 590 L400 745"/>
                  <path d="M235 745 H565"/>
                </svg>
              </button>
              <button id="tut-invite-btn" className="help-btn" title={window.T.inviteTitle} onClick={()=>{
                   try {
                     navigator.registerProtocolHandler?.('web+mosaicchamp', `${location.origin}${location.pathname}?code=%s`);
                   } catch (e) { /* no soportado o ya registrado: ignorar */ }
                   if (!window.__mcPushAttempted) {
                     window.__mcPushAttempted = true;
                     window.__fbEnablePush?.(getDeviceId());
                   }
                   setShowInvite(true);
                 }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--rr-icon-color,#c89fff)"
                     strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                  <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
              </button>
              <button className="help-btn" onClick={()=>setShowSettings(true)} title="Configuración">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--rr-icon-color,#c89fff)"
                     strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82A1.65 1.65 0 0 0 3 13.09H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
              </button>
              <div style={{position:'relative'}}>
                <button className="help-btn" onClick={openTutorial} title={window.T.helpTitle}>?</button>
                {showTutHint && (
                  <div style={{
                    position:'absolute', top:'38px', left:0, zIndex:900,
                    fontFamily:"'Pacifico', cursive", fontSize:'15px',
                    color:'#c89fff', textShadow:'0 0 18px rgba(156,90,255,.9), 0 2px 8px rgba(0,0,0,.8)',
                    pointerEvents:'none', whiteSpace:'nowrap',
                    animation:'tutHintIn 0.3s ease, tutHintOut 0.6s ease 1.6s forwards',
                  }}>Tutorial ✨</div>
                )}
              </div>
              <button className="help-btn green-exit" onClick={handleLeave} title={window.T.exitBtn}>
                <svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
                  <line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/>
                </svg>
              </button>
            </div>
            <div ref={rrSlotRef} style={{position:'relative',flexShrink:0}}/>
          </div>

          {/* Logo — justo debajo de la fila de iconos/pattern, pegado a la izquierda de la pantalla */}
          <div id="mc-title-compact-wrap" style={{width:'100%',maxWidth:'240px',alignSelf:'flex-start',marginLeft:0,marginRight:'auto',marginTop:'2px'}}>
            <MosaicTitle style={{width:'100%',fontSize:'clamp(16px,5.2vw,20px)'}}/>
          </div>

          {/* Fila 3: nombre del jugador — centrada */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'6px',marginBottom:'8px',
                       width:'100%',maxWidth:'380px',marginTop:'10px',position:'relative'}}>

            {sabotagePrompt && (
              <div onClick={confirmSabotage} style={{
                position:'absolute', bottom:'calc(100% + 8px)', left:'50%',
                background:'linear-gradient(135deg, rgba(168,85,247,.95), rgba(126,34,206,.95))',
                border:'1.5px solid rgba(216,180,254,.7)', borderRadius:'14px',
                padding:'10px 14px 10px 16px', display:'flex', alignItems:'center', gap:'10px',
                boxShadow:'0 8px 24px rgba(0,0,0,.5), 0 0 20px rgba(168,85,247,.45)',
                cursor:'pointer', zIndex:50, whiteSpace:'nowrap',
                animation:'rrPromptGrow .35s cubic-bezier(.34,1.56,.64,1) forwards'
              }}>
                <span style={{fontSize:'12.5px', fontWeight:700, color:'#fff'}}>¿Mandar Sudden Swap?</span>
                <span style={{
                  width:'20px', height:'20px', borderRadius:'50%', background:'rgba(255,255,255,.28)',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:'11px', fontWeight:800, color:'#fff', flexShrink:0
                }}>{sabotagePrompt.secondsLeft}</span>
              </div>
            )}

            {resetVotePrompt && (
              <div style={{
                position:'absolute', bottom:'calc(100% + 8px)', left:'50%',
                background:'linear-gradient(135deg, rgba(96,165,250,.95), rgba(37,99,235,.95))',
                border:'1.5px solid rgba(191,219,254,.7)', borderRadius:'14px',
                padding:'10px 14px', display:'flex', flexDirection:'column', alignItems:'center', gap:'8px',
                boxShadow:'0 8px 24px rgba(0,0,0,.5), 0 0 20px rgba(59,130,246,.45)',
                zIndex:51, whiteSpace:'nowrap',
                animation:'rrPromptGrow .35s cubic-bezier(.34,1.56,.64,1) forwards'
              }}>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <span style={{fontSize:'12.5px', fontWeight:700, color:'#fff'}}>
                    {resetVotePrompt.from} quiere {resetVotePrompt.action==='restart' ? 'reiniciar' : 'un nuevo juego'}
                  </span>
                  <span style={{
                    width:'20px', height:'20px', borderRadius:'50%', background:'rgba(255,255,255,.28)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:'11px', fontWeight:800, color:'#fff', flexShrink:0
                  }}>{resetVotePrompt.secondsLeft}</span>
                </div>
                <div style={{display:'flex',gap:'8px'}}>
                  <button onClick={()=>respondReset(true)} style={{background:'rgba(34,197,94,.92)',border:'none',
                    borderRadius:'8px',padding:'5px 12px',color:'#fff',fontWeight:700,fontSize:'11px',cursor:'pointer',
                    display:'flex',alignItems:'center',gap:'5px'}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <rect x="3" y="3" width="18" height="18" rx="3.2"/>
                      <path d="M7.3 12.6l3.1 3.1 6.3-7.4"/>
                    </svg>
                    Aceptar
                  </button>
                  <button onClick={()=>respondReset(false)} style={{background:'rgba(239,68,68,.92)',border:'none',
                    borderRadius:'8px',padding:'5px 12px',color:'#fff',fontWeight:700,fontSize:'11px',cursor:'pointer',
                    display:'flex',alignItems:'center',gap:'5px'}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <rect x="3" y="3" width="18" height="18" rx="3.2"/>
                      <path d="M8.4 8.4l7.2 7.2M15.6 8.4l-7.2 7.2"/>
                    </svg>
                    Rechazar
                  </button>
                </div>
              </div>
            )}

            <div style={{display:'flex',alignItems:'center',gap:'5px',
                         background:'rgba(255,255,255,.05)',borderRadius:'9px',
                         padding:'6px 9px',border:'1px solid rgba(255,255,255,.1)',
                         flexShrink:1,minWidth:0}}>
              <span style={{fontSize:'12px',flexShrink:0}}>👤</span>
              <span style={{color:darkText?'#141416':'#fff',fontWeight:600,fontSize:'12px',
                            whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                            maxWidth:'90px'}}>
                {playerName}
              </span>
            </div>

          </div>

          {/* Board */}
          <div style={{position:'relative'}} ref={boardRef}>
            {/* Column labels A-... */}
            <div style={{display:'grid',gridTemplateColumns:`16px repeat(${boardSize},var(--tile))`,gap:'5px',
                         paddingLeft:'12px',paddingRight:'12px',marginBottom:'2px'}}>
              <div/>
              {Array.from({length:boardSize},(_,i)=>String.fromCharCode(65+i)).map(l=>(
                <div key={l} style={{textAlign:'center',fontSize:'10px',fontWeight:700,
                                     color:darkText?'rgba(20,20,22,.94)':'rgba(255,255,255,.87)',letterSpacing:'.05em'}}>{l}</div>
              ))}
            </div>
            <div style={{display:'flex',gap:'5px'}}>
              {/* Row labels 1-... */}
              <div style={{display:'flex',flexDirection:'column',justifyContent:'space-around',
                           paddingTop:'12px',paddingBottom:'12px',gap:'5px'}}>
                {Array.from({length:boardSize},(_,i)=>i+1).map(n=>(
                  <div key={n} style={{width:'16px',height:'var(--tile)',display:'flex',alignItems:'center',
                                       justifyContent:'center',fontSize:'10px',fontWeight:700,
                                       color:darkText?'rgba(20,20,22,.94)':'rgba(255,255,255,.87)'}}>{n}</div>
                ))}
              </div>
              <div style={{position:'relative',display:'grid',gridTemplateColumns:`repeat(${boardSize},var(--tile))`,gap:'5px',padding:'12px',background:'rgba(255,255,255,.04)',borderRadius:'16px',border:'1px solid rgba(255,255,255,.08)',boxShadow:'0 20px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1)',WebkitTransform:'translateZ(0)',transform:'translateZ(0)',isolation:'isolate'}}>
              {/* Marco de pulso sobre el grupo central */}
              {(() => {
                if (!patternSize) return null; // nivel cross: forma irregular, sin marco
                const gap = 5;
                const pad = 12;
                const offset = Math.floor((boardSize - patternSize) / 2);
                const ps = patternSize;
                return (
                  <div style={{
                    position:'absolute',
                    pointerEvents:'none',
                    top:  `calc(${pad}px + ${offset} * (var(--tile) + ${gap}px))`,
                    left: `calc(${pad}px + ${offset} * (var(--tile) + ${gap}px))`,
                    width:  `calc(${ps} * (var(--tile) + ${gap}px) - ${gap}px)`,
                    height: `calc(${ps} * (var(--tile) + ${gap}px) - ${gap}px)`,
                    borderRadius:'9px',
                    zIndex:10,
                    animation:'centerPulse 2.8s ease-in-out infinite',
                  }}/>
                );
              })()}
              {tiles.map((tile,idx)=>{
                if (tile===undefined) return <div key={`void-${idx}`} style={{width:'var(--tile)',height:'var(--tile)'}}/>;
                const isCenter = CENTER.includes(idx);
                if(tile===null) {
                  const isHintTile = false; // el hueco no se pista, sino el tile a mover
                  // Pre-check if a hint is available (greedy 1-step BFS)
                  const hintAvailable = showLifesaver && !finished && (() => { try { return bfsSolve(tiles).length > 0; } catch(e) { return false; } })();
                  return <div key="empty" data-tut={isCenter?'center':undefined} style={{position:'relative',width:'var(--tile)',height:'var(--tile)',borderRadius:'8px',background:'rgba(0,0,0,.3)',border:'2px dashed rgba(255,255,255,.08)'}}>
                    {showLifesaver && !finished && (
                      <button
                        onClick={(e)=>{
                          if (!hintAvailable) return;
                          e.stopPropagation();
                          setUsedHints(true);
                          setTiles(prev => {
                            const sol = bfsSolve(prev);
                            if (sol.length > 0) setHintMove(sol[0]);
                            return prev;
                          });
                        }}
                        style={{
                          position:'absolute',inset:0,width:'100%',height:'100%',
                          background: hintAvailable ? 'rgba(0,180,255,.13)' : 'rgba(200,0,0,.13)',
                          border: hintAvailable ? '2px solid rgba(0,200,255,.5)' : '2px solid rgba(255,60,60,.6)',
                          borderRadius:'8px',cursor: hintAvailable ? 'pointer' : 'not-allowed',
                          display:'flex', alignItems:'center',justifyContent:'center',
                          animation: hintAvailable ? 'hintPulse 1.1s ease-in-out infinite' : 'none',
                          zIndex:20,
                        }}>
                        <svg width="60%" height="60%" viewBox="0 0 24 24" fill="none"
                             stroke={hintAvailable ? 'rgba(0,220,255,.9)' : 'rgba(255,80,80,.9)'}
                             strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                          <circle cx="12" cy="12" r="10"/>
                          <path d="M12 8v4"/>
                          <circle cx="12" cy="16" r="1" fill={hintAvailable ? 'rgba(0,220,255,.9)' : 'rgba(255,80,80,.9)'} stroke="none"/>
                        </svg>
                      </button>
                    )}
                  </div>;
                }
                const c=getColorMap(effectivePride, colorblind, seasonAlt)[tile.colorId], isAdj=canMove(idx,ei,boardSize,mask);
                const col = idx % boardSize;
                const row = Math.floor(idx / boardSize);
                const coord = String.fromCharCode(65+col) + (row+1);
                // "Dibujado a mano": textura de trazos cruzados tipo crayón (Vuelta al Colegio).
                // El ángulo varía un poco por ficha para que no se vea como un patrón repetido.
                const crayonMode = seasonAlt && seasonTheme?.tileTexture === 'crayon';
                const scribbleMode = seasonAlt && seasonTheme?.tileShape === 'scribble';
                return (
                  <button key={`${tile.colorId}-${tile.num}`} className="tile-btn"
                          data-tut={isCenter?'center':undefined}
                          onClick={()=>handleTile(idx)}
                          onContextMenu={e=>e.preventDefault()}
                          draggable={false}
                          style={{
                    width:'var(--tile)',height:'var(--tile)',borderRadius:'8px',border:'none',
                    cursor:isAdj?'pointer':'default',
                    background: scribbleMode ? 'transparent' : (crayonMode
                      ? `url(${SCHOOL_CHARCOAL_URL}),`+
                        `linear-gradient(145deg,${c.shine} 0%,${c.bg} 50%,${c.shadow} 100%)`
                      : `linear-gradient(145deg,${c.shine} 0%,${c.bg} 50%,${c.shadow} 100%)`),
                    backgroundSize: crayonMode ? '100% 100%, 100% 100%' : undefined,
                    backgroundBlendMode: scribbleMode ? undefined : (crayonMode ? 'multiply, normal' : undefined),
                    boxShadow:idx===sabotageFlashIdx
                      ? `0 0 0 4px rgba(168,85,247,1),0 0 34px 10px rgba(168,85,247,.9)`
                      : idx===hintMove
                      ? `0 4px 0 ${c.shadow},0 0 0 3px rgba(0,220,255,.9),0 0 18px rgba(0,220,255,.7),inset 0 1px 0 rgba(255,255,255,.25)`
                      : scribbleMode ? 'none'
                      : `0 4px 0 ${c.shadow},0 6px 16px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.25)`,
                    transition:'transform .1s,filter .1s,box-shadow .2s',
                    transform:isAdj?'scale(1.02) translateZ(0)':'translateZ(0)',
                    filter:isAdj?'brightness(1.1)':'brightness(1)',
                    animation:idx===sabotageFlashIdx?'rrSabotageFlash .7s ease-out':idx===lastMoved?'tileSlide .15s ease':idx===hintMove?'hintTilePulse 0.9s ease-in-out infinite':'none',
                    position:'relative',overflow:'hidden',
                  }}>
                    {scribbleMode ? (
                      <div style={{
                        position:'absolute',inset:0,
                        WebkitMaskImage:`url(${SCRIBBLE_MASK_URL})`, maskImage:`url(${SCRIBBLE_MASK_URL})`,
                        WebkitMaskSize:'100% 100%', maskSize:'100% 100%',
                        WebkitMaskRepeat:'no-repeat', maskRepeat:'no-repeat',
                        WebkitMaskPosition:'center', maskPosition:'center',
                        background: crayonMode
                          ? `linear-gradient(145deg,${c.shine} 0%,${c.bg} 50%,${c.shadow} 100%)`
                          : `${c.bg} url(${SCRIBBLE_EMBOSS_URL})`,
                        backgroundSize: crayonMode ? undefined : '100% 100%',
                        backgroundBlendMode: crayonMode ? undefined : 'overlay',
                        filter:`drop-shadow(2px 4px 0 ${c.shadow}) drop-shadow(0 4px 8px rgba(0,0,0,.35))`,
                        pointerEvents:'none',
                      }}>
                        {crayonMode && (
                          // Grano de carboncillo aplicado como MASCARA (no imagen con color propio):
                          // el color lo pone la propia ficha (c.shadow, su tono mas oscuro), y fuera
                          // de los trazos queda transparente -- se ve el color plano de abajo.
                          // Tamano del patron ampliado un 30% (130%) respecto a la ficha.
                          <div style={{
                            position:'absolute', inset:0,
                            WebkitMaskImage:`url(${SCHOOL_CHARCOAL_URL})`, maskImage:`url(${SCHOOL_CHARCOAL_URL})`,
                            WebkitMaskSize:'130% 130%', maskSize:'130% 130%',
                            WebkitMaskRepeat:'no-repeat', maskRepeat:'no-repeat',
                            WebkitMaskPosition:'center', maskPosition:'center',
                            background: c.shadow,
                            opacity:.62,
                            pointerEvents:'none',
                          }}/>
                        )}
                      </div>
                    ) : (
                    <div style={{position:'absolute',top:0,left:0,right:0,height:'45%',borderRadius:'8px 8px 50% 50%',background:'linear-gradient(to bottom,rgba(255,255,255,.2),transparent)',pointerEvents:'none'}}/>
                    )}
                    {idx===sabotageFlashIdx && (
                      <div style={{
                        position:'absolute', inset:'-45%', pointerEvents:'none',
                        background:'repeating-linear-gradient(135deg, rgba(125,211,252,.95) 0%, rgba(125,211,252,.95) 7%, transparent 7%, transparent 16.6667%)',
                        animation:'rrScanSweep .5s linear'
                      }}/>
                    )}
                    {voiceOn && isAdj && (
                      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',
                                   justifyContent:'center',pointerEvents:'none',
                                   background:'rgba(0,0,0,.22)',borderRadius:'8px'}}>
                        <span style={{fontWeight:900,letterSpacing:'.1em',textTransform:'uppercase',
                                      fontSize:'clamp(13px,3.8vw,18px)',
                                      background:'linear-gradient(90deg,#7BAEF5,#E8B800,#FFA85C,#5FD98A)',
                                      backgroundSize:'300% auto',
                                      WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',
                                      animation:'shimmer 4s linear infinite',
                                      filter:'drop-shadow(0 1px 4px rgba(0,0,0,.9))'}}>
                          {coord}
                        </span>
                      </div>
                    )}
                  </button>
                );
              })}
              {finished && <div className="finished-frame" style={finishOverlayColor ? {'--rr-finished-overlay':finishOverlayColor} : undefined}><div className="finished-text">{window.T.finished}</div>{usedHints && <div className="finished-text" style={{fontSize:'clamp(16px,4vw,26px)',animationDelay:'.2s'}}>…with a little help</div>}</div>}
            </div>{/* end grid */}
            </div>{/* end flex row (row labels + grid) */}
          </div>{/* end board wrapper */}

          {/* Botones de acción + título */}
          <div style={{marginTop:'10px',display:'flex',flexDirection:'column',alignItems:'center',gap:'6px',width:'100%',maxWidth:'380px'}}>

            {/* Stats + Nuevo reto — misma fila, mismo alto */}
            <div style={{display:'flex',alignItems:'stretch',gap:'8px',width:'100%'}}>
              <div style={{display:'flex',gap:'14px',background:darkText?'rgba(0,0,0,.06)':'rgba(255,255,255,.06)',borderRadius:'10px',
                           padding:'8px 14px',border:`1px solid ${darkText?'rgba(41,41,44,.25)':'rgba(255,255,255,.1)'}`,backdropFilter:'blur(8px)',
                           flexShrink:0}}>
                {[{label:window.T.moves,value:moves},{label:window.T.time,value:fmt(time)}].map(s=>(
                  <div key={s.label} style={{textAlign:'center'}}>
                    <div style={{fontSize:'18px',fontWeight:800,color:darkText?'#141416':'#fff',lineHeight:1}}>{s.value}</div>
                    <div style={{fontSize:'8px',color:darkText?'rgba(20,20,22,.94)':'rgba(255,255,255,.88)',letterSpacing:'.1em',marginTop:'2px'}}>{s.label}</div>
                  </div>
                ))}
              </div>
              <button onClick={handleRestart} title={window.T.restartBtn}
                style={{flexShrink:0,padding:'8px 12px',borderRadius:'10px',border:`1px solid ${darkText?'rgba(41,41,44,.25)':'rgba(255,255,255,.15)'}`,
                        background:darkText?'rgba(0,0,0,.06)':'rgba(255,255,255,.07)',color:darkText?'#141416':'#fff',fontSize:'16px',fontWeight:700,
                        cursor:'pointer',transition:'all .2s',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--rr-icon-color,#c89fff)" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3.5 12a8.5 8.5 0 1 0 2.8-6.3"/>
                  <path d="M3 3.5v5h5"/>
                </svg>
              </button>
              <button onClick={handleReset}
                style={{flex:1,padding:'8px 14px',borderRadius:'10px',border:`1px solid ${darkText?'rgba(41,41,44,.25)':'rgba(255,255,255,.15)'}`,
                        background:darkText?'rgba(0,0,0,.06)':'rgba(255,255,255,.07)',color:darkText?'#141416':'#fff',fontSize:'12px',fontWeight:700,
                        letterSpacing:'.10em',cursor:'pointer',transition:'all .2s',textTransform:'uppercase'}}>
                {window.T.newGameBtn}
              </button>
            </div>
            <div style={{display:'flex',gap:'10px',alignItems:'center',flexWrap:'wrap',justifyContent:'center'}}>
              {finished && (fromInvite || level <= 7) && !window.RR_LEVEL_INFO(level).special && (
                <button onClick={()=>{ if(typeof onLevelUp==='function') onLevelUp(level+1, level); }}
                  style={{padding:'11px 20px',borderRadius:'10px',cursor:'pointer',fontSize:'13px',
                          fontWeight:800,letterSpacing:'.08em',textTransform:'uppercase',
                          border:'1px solid rgba(255,215,0,.6)',
                          background:'linear-gradient(135deg,rgba(255,215,0,.2),rgba(255,150,0,.15))',
                          color:'#FFD700',boxShadow:'0 0 18px rgba(255,215,0,.35)',
                          animation:'levelUpPulse 1.4s ease-in-out infinite'}}>
                  ⬆ Level Up
                </button>
              )}
              {['rubiking','yy'].includes(playerName.toLowerCase()) && !finished && (
                <button onClick={handleAutoSolve}
                  title="Auto-resolve (Rubiking only)"
                  style={{padding:'11px 18px',borderRadius:'10px',cursor:'pointer',fontSize:'13px',
                          fontWeight:800,letterSpacing:'.08em',textTransform:'uppercase',
                          border:'1px solid rgba(239,68,68,.5)',
                          background:'rgba(239,68,68,.12)',color:'#f87171',
                          boxShadow:'0 0 12px rgba(239,68,68,.25)'}}>
                  🔮 Resolver
                </button>
              )}
            </div>


          </div>

          {/* Countdown overlay */}
          {countdown !== null && (
            <div style={{position:'fixed',inset:0,zIndex:6000,display:'flex',
                         flexDirection:'column',alignItems:'center',justifyContent:'center',
                         background:'rgba(0,0,0,.82)',backdropFilter:'blur(4px)'}}>
              <div style={{fontFamily:"'Pacifico',cursive",fontSize:'clamp(20px,5vw,30px)',
                           color:'rgba(255,255,255,.85)',
                           textShadow:'0 0 30px rgba(255,255,255,.5)',
                           marginBottom:'20px',letterSpacing:'.06em'}}>
                {window.T.getReady}
              </div>
              <div key={countdown} style={{fontFamily:"'Pacifico',cursive",
                           fontSize:'clamp(90px,22vw,130px)',lineHeight:1,
                           color:'#FFD700',
                           textShadow:'0 0 60px rgba(255,215,0,.9),0 0 120px rgba(255,215,0,.4)',
                           animation:'countPulse .55s ease'}}>
                {countdown}
              </div>
            </div>
          )}


          {/* Tutorial */}
          <TutorialOverlay step={tutStep} hl={tutHl}
            onNext={(s)=>setTutStep(s)} onClose={()=>setTutStep(0)}/>

          {/* Confirm modal */}
          {showScores && <ScoresModal onClose={()=>setShowScores(false)} playerName={playerName} currentLevel={level}/>}
          {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} playerName={playerName}/>}
          {showInvite && <InviteModal onClose={()=>setShowInvite(false)} gameCode={gameCode}/>}
          {showConfirm && (
            <div className="confirm-backdrop" onClick={()=>setShowConfirm(false)}>
              <div className="confirm-box" onClick={e=>e.stopPropagation()}>
                <div className="icon">🎮</div>
                <h4>{confirmAction === 'restart' ? window.T.confirmTitleRestart : window.T.confirmTitle}</h4>
                <p dangerouslySetInnerHTML={{__html: (confirmAction === 'restart' ? window.T.confirmBodyRestart : window.T.confirmBody)(activePl.length)}}/>
                <div className="confirm-btns">
                  <button className="confirm-btn-no"  onClick={()=>setShowConfirm(false)}>{window.T.confirmCancel}</button>
                  <button className="confirm-btn-yes" onClick={confirmAction === 'restart' ? doRestart : doReset}>{window.T.confirmYes}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ─── App root ─── */
    function App() {
      const [phase,           setPhase]          = useState('lobby');
      const [playerName,      setPlayerName]      = useState('');
      const [gameCode,        setGameCode]        = useState('');
      const [level,           setLevel]           = useState(2);
      const [ephemeral,       setEphemeral]       = useState(false);
      const [fromInvite,      setFromInvite]      = useState(false);
      const [savedDoneLevels, setSavedDoneLevels] = useState([]);
      const [savedName,       setSavedName]       = useState('');


      // Precarga el progreso desde Firebase al arrancar si hay nombre guardado en localStorage.
      // Si el alias está protegido por contraseña, NO se precarga aquí: Lobby solo revelará
      // el progreso guardado cuando se verifique la contraseña correcta (o de inmediato si
      // el alias es libre/sin proteger).
      useEffect(() => {
        const storedName = localStorage.getItem('rr-player-name');
        if (!storedName) return;
        const load = async () => {
          try {
            if (!window.__fbReady) await new Promise(r => window.addEventListener('fbReady', r, { once: true }));
            const isRubiking = storedName.trim().toLowerCase() === 'rubiking';
            const claimed = isRubiking ? false : (await window.__fbCheckAlias?.(storedName) ?? false);
            if (claimed) return; // protegido: esperar verificación de contraseña en Lobby
            const done = await window.__fbGetSoloLevelsDone?.(storedName);
            if (done && done.length > 0) setSavedDoneLevels(done);
          } catch(e) {}
        };
        load();
      }, []);

      const handleJoin = (name, code, lvl, isEphemeral, isInvite, done) => {
        setPlayerName(name); setGameCode(code); setLevel(lvl||2);
        setEphemeral(!!isEphemeral); setFromInvite(!!isInvite);
        setSavedDoneLevels(done||[]); setSavedName(name);
        setPhase('game');
      };
      const handleLeave = async (completedLevel) => {
        if (ephemeral && playerName) {
          window.__fbDeleteEphemeralData?.(playerName);
          setSavedDoneLevels([]);
        } else if (playerName) {
          // Aplicar localmente el nivel completado de inmediato (sin esperar Firebase)
          if (completedLevel && completedLevel >= 1 && completedLevel <= 8) {
            setSavedDoneLevels(prev => [...new Set([...prev, completedLevel])]);
          }
          // Siempre sincronizar con Firebase en background para capturar
          // cualquier nivel guardado por autoSolve o timing race
          const nameSnap = playerName;
          setTimeout(async () => {
            try {
              const fresh = await window.__fbGetSoloLevelsDone?.(nameSnap);
              if (fresh && fresh.length > 0) {
                setSavedDoneLevels(prev => [...new Set([...prev, ...fresh])]);
              }
            } catch(e) {}
          }, 800);
        }
        setPhase('lobby'); setPlayerName(''); setGameCode(''); setEphemeral(false); setFromInvite(false);
      };
      const handleLevelUp = async (nextLevel, completedLevel) => {
        try {
          await window.__fbLeaveGame?.();
          // Borrar todas las partidas anteriores del lobby para este jugador
          await window.__fbDeleteLobbyByHost?.(playerName);
          // Actualizar progreso localmente con el nivel recién completado
          if (completedLevel && completedLevel >= 1 && completedLevel <= 8) {
            setSavedDoneLevels(prev => [...new Set([...prev, completedLevel])]);
          }
          const code = genCode();
          window.__rrLevel = nextLevel;
          await window.__fbJoinGame?.(code);
          await window.__fbRegisterLobby?.(code, playerName, nextLevel);
          window.rrShuffle?.();
          setLevel(nextLevel); setGameCode(code); setFromInvite(false); setPhase('game');
        } catch(e) { console.error('levelUp error:', e); handleLeave(); }
      };

      if (phase === 'lobby') return <Lobby onJoin={handleJoin} initialDoneLevels={savedDoneLevels} initialName={savedName} />;
      return <Game key={gameCode} playerName={playerName} gameCode={gameCode} level={level}
                   fromInvite={fromInvite} onLeave={handleLeave} onLevelUp={handleLevelUp} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
