            <path d="M3 6.5a1.5 1.5 0 0 1 1.5-1.5h4.4l1.6 2h9a1.5 1.5 0 0 1 1.5 1.5v9.5a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 17.5z"/>
          </svg>
        </button>
      </div>
      <div id="rr-validate-hint" style="text-align:center;font-size:10px;color:rgba(34,197,94,.6);margin-top:4px;display:none;">Tablero actualizado con colores suficientes</div>
      <input id="rr-image-input" type="file" accept="image/*" style="display:none" onchange="rrHandleImageFile(this.files[0])">
      <div style="margin-top:10px;text-align:center;">
        <a href="licenses.html" style="font-size:11px;color:rgba(255,255,255,.25);text-decoration:none;letter-spacing:.03em;" target="_blank">Licencias de terceros</a>
      </div>
    </div>
  </div>

  <!-- ══ Guardar patrón (modal) ══ -->
  <div id="rr-save-overlay" class="rr-modal-overlay hidden" onclick="if(event.target===this) rrCloseSaveModal()">
    <div class="rr-modal-box rr-modal-box-sm">
      <div class="rr-modal-header">
        <h3>💾 Guardar patrón</h3>
        <button class="rr-modal-close" onclick="rrCloseSaveModal()">✕</button>
      </div>
      <input id="rr-save-name-input" type="text" maxlength="24" placeholder="Nombre del patrón"
             class="rr-save-input" onkeydown="if(event.key==='Enter') rrConfirmSavePattern()">
      <button id="rr-save-confirm-btn" class="rr-save-confirm-btn" onclick="rrConfirmSavePattern()">Guardar</button>
    </div>
  </div>

  <!-- ══ Patrones guardados (galería) ══ -->
  <div id="rr-saved-overlay" class="rr-modal-overlay hidden" onclick="if(event.target===this) rrCloseSavedGallery()">
    <div class="rr-modal-box">
      <div class="rr-modal-header">
        <h3>📂 Patrones guardados</h3>
        <button class="rr-modal-close" onclick="rrCloseSavedGallery()">✕</button>
      </div>
      <div id="rr-saved-list" class="rr-saved-list"></div>
      <div id="rr-saved-empty" class="rr-saved-empty" style="display:none;">Todavía no hay patrones guardados.</div>
    </div>
  </div>

  <script>
    // Apply i18n to static HTML elements
    (function applyI18n(){
      const t = window.T;
      const el = id => document.getElementById(id);
      if(el('rr-toggle-label'))  el('rr-toggle-label').textContent  = t.patternLabel;
      if(el('rr-panel-title'))   el('rr-panel-title').textContent   = t.patternLabel;
      if(el('rr-status-text'))   el('rr-status-text').textContent   = t.connecting;
      if(el('rr-shuffle'))       el('rr-shuffle').textContent       = t.shuffleBtn;
    })();

    const RR_COLORS = [
      { bg:'#C8C8D8', border:'#8888A0', puzzleId:'white'  },
      { bg:'#1b5e20', border:'#0a3d0a', puzzleId:'green'  },
      { bg:'#ffeb3b', border:'#f9a825', puzzleId:'yellow' },
      { bg:'#0d47a1', border:'#092f6b', puzzleId:'blue'   },
      { bg:'#f44336', border:'#b71c1c', puzzleId:'red'    },
      { bg:'#ff9800', border:'#e65100', puzzleId:'orange' },
    ];
    window.RR_COLORS = RR_COLORS;
    window._origRrColors = RR_COLORS.map(c => ({ ...c }));

    // 7 niveles de dificultad: patternSize = level+1, boardSize = level+3
    window.RR_LEVELS = [
      { level:1, patternSize:2, boardSize:4,  tileMin:56, tileMax:76 },
      { level:2, patternSize:3, boardSize:5,  tileMin:50, tileMax:62 },
      { level:3, patternSize:4, boardSize:6,  tileMin:42, tileMax:54 },
      { level:4, patternSize:5, boardSize:7,  tileMin:36, tileMax:46 },
      { level:5, patternSize:6, boardSize:8,  tileMin:31, tileMax:40 },
      { level:6, patternSize:7, boardSize:9,  tileMin:27, tileMax:34 },
      { level:7, patternSize:8, boardSize:10, tileMin:23, tileMax:30, brainMelt:true },
      { level:8, special:'cross', boardSize:11, tileMin:19, tileMax:25, hidden:true },
    ];
    window.RR_LEVEL_INFO = (lvl) => window.RR_LEVELS.find(l=>l.level===lvl) || window.RR_LEVELS[1];

    // Nivel 8 — "Mosaic Cross": 5 tableros 5×5 (uno en cada esquina + uno central)
    // dentro de una cuadrícula 11×11, con solape 2×2 en las diagonales y 12 casillas
    // huérfanas eliminadas (3 en cada lado medio: arriba/abajo/izquierda/derecha).
    function computeCrossShape() {
      const N = 11;
      const corners = [[0,4,0,4],[0,4,6,10],[6,10,0,4],[6,10,6,10]];
      const center  = [3,7,3,7];
      const inR = (v,a,b) => v>=a && v<=b;
      const valid = new Set();
      for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
        const inCorner = corners.some(([r0,r1,c0,c1]) => inR(r,r0,r1) && inR(c,c0,c1));
        const inCenter = inR(r,center[0],center[1]) && inR(c,center[2],center[3]);
        if (inCorner || inCenter) valid.add(r*N+c);
      }
      // Patrón objetivo: un parche 3×3 en el centro de cada uno de los 5 tableros
      const subCenters = [[1,3,1,3],[1,3,7,9],[7,9,1,3],[7,9,7,9],[4,6,4,6]];
      const patternIndices = [];
      for (const [r0,r1,c0,c1] of subCenters)
        for (let r=r0;r<=r1;r++) for (let c=c0;c<=c1;c++) patternIndices.push(r*N+c);
      return { N, validIndices:[...valid].sort((a,b)=>a-b), patternIndices };
    }
    window.RR_CROSS_SHAPE = computeCrossShape();

    let rrOpen = false, fbConnected = false;
    window.rrPattern = [];

    function rrToggle() { rrOpen=!rrOpen; document.getElementById('rr-panel').classList.toggle('hidden',!rrOpen); if(!rrOpen) window.rrToggleManualMode?.(false); }
    document.addEventListener('click', e => {
      if(rrOpen&&!document.getElementById('rr-widget').contains(e.target)){ rrOpen=false; document.getElementById('rr-panel').classList.add('hidden'); }
    });

    // Cierra el panel del editor y CUALQUIER modal relacionado (guardar / galería de
    // patrones guardados). Se llama al salir de una partida para que, si el jugador
    // (p.ej. Rubiking) dejó algo abierto, no quede visible ni operable para el
    // siguiente jugador que entre con otro nombre.
    function rrResetEditorUI() {
      rrOpen = false;
      document.getElementById('rr-panel')?.classList.add('hidden');
      window.rrToggleManualMode?.(false);
      window.rrCloseSaveModal?.();
      window.rrCloseSavedGallery?.();
    }
    window.__rrResetEditorUI = rrResetEditorUI;

    // Construye el icono mini del patrón completo (real, no una muestra), con celdas
    // dimensionadas para que el icono entero mida al menos ~72px de lado (el doble del original).
    function rrBuildPreview(pattern) {
      window.rrBuildPreview = rrBuildPreview;
      const preview = document.getElementById('rr-preview');
      if (!preview) return;
      const n = pattern.length;
      const isCross = n === window.RR_CROSS_SHAPE.patternIndices.length;
      const MIN = 65, GAP = 1.5;
      preview.innerHTML = '';

      if (isCross) {
        const shape = window.RR_CROSS_SHAPE;
        const cell = Math.max(4, Math.ceil((MIN - (shape.N-1)*GAP) / shape.N));
        preview.style.gridTemplateColumns = `repeat(${shape.N}, ${cell}px)`;
        preview.style.gap = GAP+'px';
        const validSet = new Set(shape.validIndices);
        const patSet = new Set(shape.patternIndices);
        const cells = [];
        for (let i=0;i<shape.N*shape.N;i++){
          const d = document.createElement('span');
          d.style.width = cell+'px'; d.style.height = cell+'px';
          if (!validSet.has(i)) { d.style.visibility='hidden'; d.style.border='none'; }
          else if (!patSet.has(i)) { d.style.background='rgba(255,255,255,.05)'; d.style.borderColor='rgba(255,255,255,.08)'; }
          preview.appendChild(d);
          cells.push(d);
        }
        // pattern[k] va SIEMPRE a la celda absoluta patternIndices[k] (mismo orden que usa
        // el juego para comprobar la victoria — no en orden fila-por-fila)
        shape.patternIndices.forEach((absIdx, k) => {
          const col = RR_COLORS[pattern[k]];
          cells[absIdx].style.background = col.bg; cells[absIdx].style.borderColor = col.border;
        });
      } else {
        const size = Math.max(1, Math.round(Math.sqrt(n)));
        const cell = Math.max(6, Math.ceil((MIN - (size-1)*GAP) / size));
        preview.style.gridTemplateColumns = `repeat(${size}, ${cell}px)`;
        preview.style.gap = GAP+'px';
        pattern.forEach(p => {
          const d = document.createElement('span');
          d.style.width = cell+'px'; d.style.height = cell+'px';
          const col = RR_COLORS[p];
          d.style.background = col.bg; d.style.borderColor = col.border;
          preview.appendChild(d);
        });
      }
    }

    function rrApplyPattern(pattern) {
      window.rrApplyPattern = rrApplyPattern;
      window.rrPattern=pattern;
      const n = pattern.length;
      const isCross = n === window.RR_CROSS_SHAPE.patternIndices.length;
      const grid = document.getElementById('rr-grid');

      if (isCross) {
        // Construye el grid 11×11 con huecos, mostrando sólo las 45 celdas del patrón
        const shape = window.RR_CROSS_SHAPE;
        const total = shape.N * shape.N;
        if (grid && (grid.dataset.mode !== 'cross')) {
          grid.innerHTML = '';
          grid.dataset.mode = 'cross';
          grid.style.gridTemplateColumns = `repeat(${shape.N}, var(--tile))`;
          const validSet = new Set(shape.validIndices);
          const patSet = new Set(shape.patternIndices);
          for (let i=0;i<total;i++){
            const c = document.createElement('div');
            if (!validSet.has(i)) { c.style.visibility='hidden'; }
            else if (!patSet.has(i)) { c.className='rrcell'; c.style.background='rgba(255,255,255,.05)'; c.style.borderColor='rgba(255,255,255,.08)'; }
            else { c.className='rrcell rrcell-pat'; }
            grid.appendChild(c);
          }
        }
        // pattern[k] va SIEMPRE a la celda absoluta patternIndices[k] (mismo orden que usa
        // el juego para comprobar la victoria — no en el orden en que aparecen en el DOM)
        shape.patternIndices.forEach((absIdx, k) => {
          const cell = grid.children[absIdx];
          if (cell) { const col = RR_COLORS[pattern[k]]; cell.style.background = col.bg; cell.style.borderColor = col.border; }
        });
      } else {
        const size = Math.max(1, Math.round(Math.sqrt(n)));
        if (grid && (grid.children.length !== n || grid.dataset.mode === 'cross')) {
          grid.innerHTML = '';
          grid.dataset.mode = 'square';
          grid.style.gridTemplateColumns = `repeat(${size}, var(--tile))`;
          for (let i=0;i<n;i++){ const c=document.createElement('div'); c.className='rrcell'; c.onclick=(()=>{const idx=i;return ()=>rrCellClick(idx);})(); grid.appendChild(c); }
        }
        document.querySelectorAll('#rr-grid .rrcell').forEach((c,i)=>{ c.style.background=RR_COLORS[pattern[i]].bg; c.style.borderColor=RR_COLORS[pattern[i]].border; });
      }

      window.rrSyncPatternTools?.();

      // Icono mini: SIEMPRE el patrón real completo (no una muestra), al menos el doble
      // de tamaño que el icono original (mínimo ~72px de lado)
      rrBuildPreview(pattern);
      // Badge de tamaño de tablero
      const badge = document.getElementById('rr-level-badge');
      const lvlInfo = isCross ? window.RR_LEVELS.find(l=>l.special==='cross')
                               : (window.RR_LEVELS||[]).find(l=>l.patternSize===Math.round(Math.sqrt(n)));
      if (badge) badge.textContent = lvlInfo ? `${lvlInfo.boardSize}×${lvlInfo.boardSize}` : '';
      window.dispatchEvent(new CustomEvent('rrPatternChange',{detail:pattern}));
    }
    window.__fbPatternReceived = p => { rrApplyPattern(p); setConnected(true); };
    // Redraw preview when pride mode changes
    window.addEventListener('prideModeChange', () => { if (window.rrPattern && window.rrPattern.length) rrApplyPattern(window.rrPattern); });

    // Presence
    let _prevNames = new Set();
    function showDiscreteToast(emoji, msg, dotColor) {
      const el=document.createElement('div'); el.className='toast-discrete';
      el.innerHTML=`<span class="td-dot" style="background:${dotColor}"></span>${emoji} ${msg}`;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),300); },3000);
    }
    window.showDiscreteToast = showDiscreteToast;

    function showSuddenSwapToast(fromName) {
      const el = document.createElement('div');
      el.className = 'toast sudden-swap-toast';
      el.innerHTML = `<div class="toast-row">
        <span class="toast-emoji">⚡</span>
        <div>
          <div class="toast-title">Sudden Swap!</div>
          <div class="toast-msg" style="color:#fff;font-weight:700;">by ${fromName}!!!</div>
        </div>
      </div>`;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),400); }, 3200);
    }
    window.showSuddenSwapToast = showSuddenSwapToast;
    window.__showForegroundNotification = function(title, body) {
      showDiscreteToast('🔔', [title, body].filter(Boolean).join(' — '), '#7c3aed');
    };
    window.__fbPresenceReceived = function(players) {
      const cur=new Set(players.map(p=>p.name));
      cur.forEach(n=>{ if(!_prevNames.has(n)&&_prevNames.size>0) showDiscreteToast('🟢', window.T.connected(n),'#22c55e'); });
      _prevNames.forEach(n=>{ if(!cur.has(n)) showDiscreteToast('⚪', window.T.disconnected(n),'#6b7280'); });
      _prevNames=cur;
      const c=document.getElementById('rr-players');
      c.innerHTML=players.length ? players.map(p=>{
        const dc=p.finished?'finished':p.moving?'moving':'';
        const sl=p.finished?`<div class="rr-chip-time">🏁 ${p.time} · ${p.moves} mov</div>`:p.moving?`<div class="rr-chip-status">${window.T.moving}</div>`:'';
        return `<div class="rr-player-chip"><div class="rr-player-chip-row"><span class="dot ${dc}"></span><span class="rr-chip-name">${p.name}</span></div>${sl}</div>`;
      }).join('') : '';
      window.dispatchEvent(new CustomEvent('rrPresenceChange',{detail:players}));
    };

    window.__fbProgressReceived = function(list) {
      window.dispatchEvent(new CustomEvent('rrProgressChange', { detail: list }));
    };
    window.__fbSabotageReceived = function(item) {
      window.dispatchEvent(new CustomEvent('rrSabotageReceived', { detail: item }));
    };
    window.__fbResetRequestReceived = function(item) {
      window.dispatchEvent(new CustomEvent('rrResetRequest', { detail: item }));
    };
    window.__fbResetResponseReceived = function(item) {
      window.dispatchEvent(new CustomEvent('rrResetResponse', { detail: item }));
    };

    // Reset
    let lastResetTs=0;
    window.__fbResetReceived = ts => { if(ts<=lastResetTs)return; lastResetTs=ts; window.dispatchEvent(new CustomEvent('rrGlobalReset',{detail:ts})); };

    // Confetti — cuadrados de colores que salen disparados del panel de patrón (#rr-widget).
    // Se dispara para TODOS los participantes (se llama desde __fbNotifReceived, que ya
    // recibe el evento de "finish" vía Firebase para cada cliente conectado a la partida).
    window.playConfetti = function(count) {
      const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) return;
      const origin = document.getElementById('rr-widget');
      if (!origin) return;
      const rect = origin.getBoundingClientRect();
      const ox = rect.left + rect.width / 2;
      const oy = rect.top + rect.height / 2;

      const COLORS = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9F45','#00D2D3','#FF6FA5','#B8FF66'];
      const N = count || 54;

      const layer = document.createElement('div');
      layer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9600;overflow:visible;';
      document.body.appendChild(layer);

      const pieces = [];
      for (let i = 0; i < N; i++) {
        const size = 5 + Math.random() * 5;
        const el = document.createElement('div');
        el.style.cssText = `position:absolute;left:${ox}px;top:${oy}px;width:${size}px;height:${size}px;` +
          `margin:${-size/2}px 0 0 ${-size/2}px;background:${COLORS[i % COLORS.length]};` +
          `border-radius:1px;will-change:transform,opacity;`;
        layer.appendChild(el);
        const ang = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 6.5;
        pieces.push({
          el,
          x: 0, y: 0,
          vx: Math.cos(ang) * speed,
          vy: Math.sin(ang) * speed - 4.5, // ligero impulso hacia arriba al salir
          rot: Math.random() * 360,
          vr: (Math.random() - 0.5) * 20,
          life: 0,
          maxLife: 68 + Math.random() * 42,
        });
      }

      const gravity = 0.28, drag = 0.985;
      function tick() {
        let alive = false;
        pieces.forEach(p => {
          if (p.life > p.maxLife) return;
          alive = true;
          p.vy += gravity;
          p.vx *= drag;
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vr;
          p.life++;
          const fadeStart = p.maxLife - 20;
          const opacity = p.life > fadeStart ? Math.max(0, (p.maxLife - p.life) / 20) : 1;
          p.el.style.transform = `translate(${p.x}px,${p.y}px) rotate(${p.rot}deg)`;
          p.el.style.opacity = opacity;
        });
        if (alive) requestAnimationFrame(tick);
        else layer.remove();
      }
      requestAnimationFrame(tick);
    };

    // Finish notif — aparece debajo del patrón de muestra (rr-widget)
    let finishNotifTimer = null;
    window.__fbNotifReceived = item => {
      window.playWhoosh?.();
      window.playConfetti?.();
      const area = document.getElementById('finish-notif-area');
      if (!area) return;
      if (finishNotifTimer) clearTimeout(finishNotifTimer);
      area.innerHTML = `<div class="finish-notif"><span style="font-size:18px">🏁</span><div><div style="font-size:12px;font-weight:800;color:#FFD27A;margin-bottom:2px;">${window.T.finishToast(item.name)}</div><div style="font-size:10px;color:rgba(255,255,255,.45)">${window.T.finishToastSub}</div><div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:2px">⏱ ${item.time} · ${item.moves} mov</div></div></div>`;
      area.style.display = '';
      finishNotifTimer = setTimeout(() => { area.style.display = 'none'; area.innerHTML = ''; }, 5000);
    };

    // Connection state
    window.__fbConnectionState = function(ok) {
      fbConnected=ok; window.__fbConnected=ok;
      const dot=document.getElementById('rr-sync-dot');
      const dotp=document.getElementById('rr-sync-dot-panel');
      const status=document.getElementById('rr-status-text');
      dot.className=ok?'connected':'disconnected';
      dotp.style.background=ok?'#22c55e':'#ef4444';
      dotp.style.boxShadow=ok?'0 0 6px #22c55e':'none';
      status.textContent=ok?window.T.synced:window.T.noConn;
      status.style.color=ok?'rgba(34,197,94,.8)':'rgba(239,68,68,.7)';
      document.getElementById('rr-shuffle').disabled=!ok;
      const badge=document.getElementById('rr-offline-badge');
      if(badge) badge.style.display=ok?'none':'block';
    };
    // También detectar navigator.onLine
    window.addEventListener('offline',()=>{
      const badge=document.getElementById('rr-offline-badge');
      if(badge) badge.style.display='block';
    });

    function rrGenPattern(n) {
      const cap = Math.ceil(n / RR_COLORS.length);
      const r=[],c=new Array(RR_COLORS.length).fill(0);
      for(let i=0;i<n;i++){const a=RR_COLORS.map((_,i)=>i).filter(i=>c[i]<cap);const p=a[Math.floor(Math.random()*a.length)];c[p]++;r.push(p);}
      return r;
    }
    function rrShuffle() {
      const info = window.RR_LEVEL_INFO(window.__rrLevel || 2);
      const n = info.special==='cross' ? window.RR_CROSS_SHAPE.patternIndices.length : info.patternSize*info.patternSize;
      const p = rrGenPattern(n);
      if(window.__fbSetPattern) window.__fbSetPattern(p); else rrApplyPattern(p);
    }
    window.rrShuffle=rrShuffle;

    // ── Mosaico desde imagen ──
    // Paleta fija en el mismo orden que RR_IDS (white,green,yellow,blue,red,orange),
    // usada siempre para la cuantización, sin importar el modo Pride activo.
    const RR_PALETTE_RGB = ['#C8C8D8','#1b5e20','#ffeb3b','#0d47a1','#f44336','#ff9800']
      .map(hex => { const n = parseInt(hex.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; });

    function rrNearestColorIndex(r,g,b) {
      let best=0, bestD=Infinity;
      for (let i=0;i<RR_PALETTE_RGB.length;i++){
        const [pr,pg,pb]=RR_PALETTE_RGB[i];
        const d=(r-pr)**2+(g-pg)**2+(b-pb)**2;
        if(d<bestD){bestD=d;best=i;}
      }
      return best;
    }

    // Convierte una imagen (HTMLImageElement ya cargada) en un patrón size×size,
    // recortando al centro (crop cuadrado) y promediando color por celda.
    function rrImageToPattern(img, size) {
      const w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
      const side = Math.min(w,h);
      const sx = (w-side)/2, sy=(h-side)/2;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
      const { data } = ctx.getImageData(0,0,size,size);
      const pattern = [];
      for (let i=0;i<size*size;i++){
        const o=i*4;
        pattern.push(rrNearestColorIndex(data[o],data[o+1],data[o+2]));
      }
      return pattern;
    }
    window.rrImageToPattern = rrImageToPattern;

    // ── Herramientas del panel: editar patrón manualmente o desde imagen ──
    let rrManualMode = false;

    function rrPatternSize() {
      const info = window.RR_LEVEL_INFO(window.__rrLevel || 2);
      return info.special === 'cross' ? null : info.patternSize;
    }

    // ── Editor de patrón: desbloqueo por victorias multijugador ──
    // Rubiking siempre tiene acceso. Cualquier otro jugador debe ganar 3 partidas
    // multijugador (en cualquier nivel) para desbloquear el editor por esa sesión.
    // Al desconectarse de la partida, el desbloqueo se "consume": hace falta ganar
    // 3 partidas más para volver a verlo y usarlo.
    const RR_EDITOR_WIN_KEY      = 'rr-editor-win-count';
    const RR_EDITOR_CONSUMED_KEY = 'rr-editor-consumed-count';
    let rrEditorUnlocked = false; // válido solo durante la partida/sesión actual

    function rrEditorCurrentName() {
      return (window.__rrCurrentPlayerName || localStorage.getItem('rr-player-name') || '').trim().toLowerCase();
    }
    function rrEditorIsRubiking() { return rrEditorCurrentName() === 'rubiking'; }
    function rrEditorWinCount()  { return parseInt(localStorage.getItem(RR_EDITOR_WIN_KEY)     || '0', 10) || 0; }
    function rrEditorConsumed()  { return parseInt(localStorage.getItem(RR_EDITOR_CONSUMED_KEY) || '0', 10) || 0; }

    function rrEditorHasAccess() { return rrEditorIsRubiking() || rrEditorUnlocked; }
    window.__rrEditorHasAccess = rrEditorHasAccess;

    // Se llama cuando el jugador actual gana una partida multijugador (ver handleTile)
    function rrRegisterMultiWin(name) {
      if ((name || '').trim().toLowerCase() === 'rubiking') return; // ya tiene acceso total
      const wins = rrEditorWinCount() + 1;
      localStorage.setItem(RR_EDITOR_WIN_KEY, String(wins));
      if (!rrEditorUnlocked && (wins - rrEditorConsumed()) >= 3) {
        rrEditorUnlocked = true;
        rrSyncPatternTools();
        rrShowEditorUnlockNotif();
      }
    }
    window.__rrRegisterMultiWin = rrRegisterMultiWin;

    // Se llama al desconectarse de la partida (salir al lobby, level-up, etc.)
    function rrConsumeEditorUnlock() {
      if (rrEditorUnlocked) {
        localStorage.setItem(RR_EDITOR_CONSUMED_KEY, String(rrEditorWinCount()));
        rrEditorUnlocked = false;
      }
      rrSyncPatternTools();
    }
    window.__rrConsumeEditorUnlock = rrConsumeEditorUnlock;

    // Notificación: entra desde la derecha, se queda para leerse, y sale por la
    // izquierda dibujando una flecha hacia el bloque de patrón (#rr-widget).
    function rrShowEditorUnlockNotif() {
      try {
        document.getElementById('rr-editor-unlock-notif')?.remove();
        document.getElementById('rr-editor-unlock-svg')?.remove();

        const widget = document.getElementById('rr-widget');
        const logo   = document.getElementById('mc-title-compact-wrap');
        const vw = window.innerWidth, vh = window.innerHeight;
        const wr = (widget && widget.offsetParent !== null) ? widget.getBoundingClientRect() : null;
        const lr = (logo   && logo.offsetParent   !== null) ? logo.getBoundingClientRect()   : null;
        // Flecha apunta siempre al bloque de patrón (rr-widget)
        const tx = wr ? wr.left + wr.width / 2 : vw - 50;
        const ty = wr ? wr.top  + wr.height / 2 : 60;
        // La tarjeta flota libremente centrada sobre el logo/título, sin anclarse
        // a ningún panel ni empujar el layout (position:fixed + pointer-events:none)
        const cx = lr ? lr.left + lr.width / 2 : vw / 2;
        const cy = lr ? Math.max(64, lr.top - 8) : 90;

        const wrap = document.createElement('div');
        wrap.id = 'rr-editor-unlock-notif';
        wrap.style.cssText = `position:fixed;top:${cy}px;left:${cx}px;transform:translate(-50%,-100%);z-index:9500;pointer-events:none;`;
        wrap.innerHTML = `
          <div id="rr-editor-unlock-card" style="
            display:flex;align-items:center;gap:10px;background:rgba(6,4,20,.96);
            border:1.5px solid rgba(255,215,0,.55);border-radius:16px;padding:12px 16px;
            backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 24px rgba(255,215,0,.25);
            max-width:min(280px,80vw);animation:rrEditorSlideIn .5s cubic-bezier(.34,1.4,.64,1) forwards;">
            <div style="font-size:22px;flex-shrink:0;">✏️</div>
            <div style="font-size:12.5px;font-weight:700;color:#FFE566;line-height:1.35;">
              ¡Ahora puedes editar tu patrón!
            </div>
          </div>`;
        document.body.appendChild(wrap);

        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.id = 'rr-editor-unlock-svg';
        svg.setAttribute('width', vw); svg.setAttribute('height', vh);
        svg.style.cssText = 'position:fixed;inset:0;z-index:9499;pointer-events:none;overflow:visible;opacity:0;transition:opacity .25s ease;';
        svg.innerHTML = '<defs><marker id="rr-eu-ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#FFD700"/></marker></defs>';
        document.body.appendChild(svg);

        setTimeout(() => {
          const card = document.getElementById('rr-editor-unlock-card');
          const cr = card ? card.getBoundingClientRect() : { left: cx - 60, top: cy - 50, width: 120, height: 50 };
          const fx = cr.left, fy = cr.top + cr.height / 2;
          const dPath = `M${fx},${fy} C${(fx + tx) / 2},${fy} ${(fx + tx) / 2},${ty} ${tx},${ty}`;
          const path = document.createElementNS(svgNS, 'path');
          path.setAttribute('d', dPath);
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke', '#FFD700');
          path.setAttribute('stroke-width', '2.5');
          path.setAttribute('stroke-dasharray', '9 6');
          path.setAttribute('marker-end', 'url(#rr-eu-ah)');
          svg.appendChild(path);
          svg.style.opacity = '1';
          if (card) card.style.animation = 'rrEditorSlideOut .6s ease forwards';
        }, 2400);

        setTimeout(() => { wrap.remove(); svg.remove(); }, 3200);
      } catch (e) { console.warn('rrShowEditorUnlockNotif:', e); }

    window.rrShowEditorUnlockNotif = rrShowEditorUnlockNotif;

    function rrSyncPatternTools() {
      const size = rrPatternSize();
      const imgBtn = document.getElementById('rr-image-btn');
      const manBtn = document.getElementById('rr-manual-btn');
      const valBtn = document.getElementById('rr-validate-btn');
      const saveBtn = document.getElementById('rr-save-btn');
      const galBtn  = document.getElementById('rr-gallery-btn');
      const hasAccess = rrEditorHasAccess();
      if (imgBtn) { imgBtn.style.display = hasAccess ? '' : 'none'; imgBtn.disabled = !size; }
      if (manBtn) { manBtn.style.display = hasAccess ? '' : 'none'; manBtn.disabled = !size; }
      if (valBtn) valBtn.disabled = !(window.rrPattern && window.rrPattern.length);
      // Guardar patrones con nombre: solo Rubiking. Ver la galería: cualquiera con acceso al editor.
      if (saveBtn) saveBtn.style.display = rrEditorIsRubiking() ? '' : 'none';
      if (galBtn)  galBtn.style.display  = hasAccess ? '' : 'none';
      if (!rrEditorIsRubiking()) window.rrCloseSaveModal?.();
      if (!hasAccess) window.rrCloseSavedGallery?.();

    window.rrSyncPatternTools = rrSyncPatternTools;

    // Valida el patrón actual (creado a mano o desde imagen) y avisa al tablero de
    // juego para que se regenere garantizando tiles suficientes de cada color que
    // el patrón necesita, de forma que siempre sea posible completarlo.
    function rrValidatePattern() {
      if (!window.rrPattern || !window.rrPattern.length) return;
      window.dispatchEvent(new CustomEvent('rrValidatePattern', { detail: [...window.rrPattern] }));
      const hint = document.getElementById('rr-validate-hint');
      if (hint) {
        hint.style.display = 'block';
        clearTimeout(window.__rrValidateHintTimer);
        window.__rrValidateHintTimer = setTimeout(() => { hint.style.display = 'none'; }, 3000);

      window.showDiscreteToast?.('✅', 'Tablero actualizado con colores suficientes', '#22c55e');
      // Cerramos el panel para dejar el tablero listo y poder invitar a jugar el mismo patrón.
      rrOpen = false;
      document.getElementById('rr-panel')?.classList.add('hidden');
      window.rrToggleManualMode?.(false);
    }
    window.rrValidatePattern = rrValidatePattern;

    function rrToggleManualMode(force) {
      if (!rrEditorHasAccess()) return;
      const size = rrPatternSize();
      if (typeof force !== 'boolean' && !size) return;
      rrManualMode = typeof force === 'boolean' ? force : !rrManualMode;
      const btn = document.getElementById('rr-manual-btn');
      const grid = document.getElementById('rr-grid');
      const hint = document.getElementById('rr-manual-hint');
      if (btn) btn.classList.toggle('active', rrManualMode);
      if (grid) grid.classList.toggle('rr-manual-active', rrManualMode);
      if (hint) { hint.textContent = rrManualMode ? 'Tocá cada celda para cambiar su color' : ''; hint.style.display = rrManualMode ? 'block' : 'none'; }
    }
    window.rrToggleManualMode = rrToggleManualMode;

    function rrCellClick(idx) {
      if (!rrManualMode || !rrEditorHasAccess()) return;
      const size = rrPatternSize();
      if (!size) return;
      const n = size * size;
      const cur = (window.rrPattern && window.rrPattern.length === n) ? [...window.rrPattern] : new Array(n).fill(0);
      cur[idx] = (cur[idx] + 1) % RR_COLORS.length;
      if (window.__fbSetPattern) window.__fbSetPattern(cur); else rrApplyPattern(cur);
    }
    window.rrCellClick = rrCellClick;

    function rrImageButtonClick() {
      if (!rrEditorHasAccess() || !rrPatternSize()) return;
      document.getElementById('rr-image-input')?.click();
    }
    window.rrImageButtonClick = rrImageButtonClick;

    function rrHandleImageFile(file) {
      if (!file) return;
      const size = rrPatternSize();
      if (!size) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const pattern = rrImageToPattern(img, size);
          if (window.__fbSetPattern) window.__fbSetPattern(pattern); else rrApplyPattern(pattern);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
      document.getElementById('rr-image-input').value = '';
    }
    window.rrHandleImageFile = rrHandleImageFile;

    // ── Patrones guardados: galería + guardado con nombre (solo Rubiking) ──
    let rrSavedPatternsCache = [];
    let rrSavedPatternsSubscribed = false;

    function rrRequiredPatternLength() {
      const info = window.RR_LEVEL_INFO(window.__rrLevel || 2);
      return info.special === 'cross'
        ? window.RR_CROSS_SHAPE.patternIndices.length
        : info.patternSize * info.patternSize;
    }

    // Genera una previsualización en miniatura de un patrón guardado, respetando
    // la forma especial de cruz cuando corresponda.
    function rrMiniPreviewHTML(pattern) {
      const n = pattern.length;
      const isCross = n === window.RR_CROSS_SHAPE.patternIndices.length;
      let side, cells;
      if (isCross) {
        side = window.RR_CROSS_SHAPE.N;
        cells = new Array(side * side).fill(null);
        window.RR_CROSS_SHAPE.patternIndices.forEach((absIdx, k) => { cells[absIdx] = pattern[k]; });
      } else {
        side = Math.round(Math.sqrt(n));
        cells = pattern;
      }
      let html = `<div class="rr-mini-grid" style="grid-template-columns:repeat(${side},1fr)">`;
      cells.forEach(v => {
        if (v === null || v === undefined) html += `<span class="rr-mini-cell rr-mini-empty"></span>`;
        else {
          const col = RR_COLORS[v] || RR_COLORS[0];
          html += `<span class="rr-mini-cell" style="background:${col.bg};border-color:${col.border}"></span>`;
        }
      });
      html += `</div>`;
      return html;
    }

    // Solo puede gestionar (borrar) un patrón guardado quien lo creó, o Rubiking.
    function rrCanManagePattern(sp) {
      if (rrEditorIsRubiking()) return true;
      const creator = (sp?.createdBy || '').trim().toLowerCase();
      return !!creator && creator === rrEditorCurrentName();
    }

    function rrRenderSavedList() {
      const list = document.getElementById('rr-saved-list');
      const empty = document.getElementById('rr-saved-empty');
      if (!list) return;
      if (!rrSavedPatternsCache.length) {
        list.innerHTML = '';
        if (empty) empty.style.display = 'block';
        return;
      }
      if (empty) empty.style.display = 'none';
      list.innerHTML = rrSavedPatternsCache.map(sp => `
        <div class="rr-saved-item">
          ${rrMiniPreviewHTML(sp.pattern)}
          <div class="rr-saved-info">
            <div class="rr-saved-name">${String(sp.name || 'Sin nombre').replace(/</g, '&lt;')}</div>
            <div class="rr-saved-size">${sp.size}×${sp.size}</div>
          </div>
          <div class="rr-saved-actions">
            <button class="rr-saved-use-btn" onclick="rrApplySavedPattern('${sp.id}')">Usar</button>
            ${rrCanManagePattern(sp) ? `<button class="rr-saved-del-btn" onclick="rrDeleteSavedPatternClick('${sp.id}')" title="Eliminar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 7h16"/>
                <path d="M9 7V4.6a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1V7"/>
                <path d="M6 7l1 13a2 2 0 0 0 2 1.9h6a2 2 0 0 0 2-1.9L18 7"/>
                <path d="M10 11v6M14 11v6"/>
              </svg>
            </button>` : ''}
          </div>
        </div>
      `).join('');
    }

    function rrEnsureSavedSubscription() {
      if (rrSavedPatternsSubscribed || !window.__fbListenSavedPatterns) return;
      rrSavedPatternsSubscribed = true;
      window.__fbListenSavedPatterns(list => {
        rrSavedPatternsCache = list;
        rrRenderSavedList();
      });
    }

    function rrOpenSavedGallery() {
      if (!rrEditorHasAccess()) return;
      rrEnsureSavedSubscription();
      rrRenderSavedList();
      document.getElementById('rr-saved-overlay')?.classList.remove('hidden');
    }
    window.rrOpenSavedGallery = rrOpenSavedGallery;

    function rrCloseSavedGallery() {
      document.getElementById('rr-saved-overlay')?.classList.add('hidden');
    }
    window.rrCloseSavedGallery = rrCloseSavedGallery;

    function rrApplySavedPattern(id) {
      if (!rrEditorHasAccess()) return;
      const sp = rrSavedPatternsCache.find(s => s.id === id);
      if (!sp) return;
      const need = rrRequiredPatternLength();
      if (sp.pattern.length !== need) {
        window.showDiscreteToast?.('⚠️', 'Este patrón es de otro tamaño de nivel — cambiá de nivel para usarlo', '#f59e0b');
        return;
      }
      if (window.__fbSetPattern) window.__fbSetPattern(sp.pattern); else rrApplyPattern(sp.pattern);
      window.showDiscreteToast?.('🧩', `Patrón "${sp.name}" cargado`, '#7c3aed');
      rrCloseSavedGallery();
      rrOpen = false;
      document.getElementById('rr-panel')?.classList.add('hidden');
    }
    window.rrApplySavedPattern = rrApplySavedPattern;

    function rrDeleteSavedPatternClick(id) {
      const sp = rrSavedPatternsCache.find(s => s.id === id);
      if (!sp) return;
      if (!rrCanManagePattern(sp)) {
        window.showDiscreteToast?.('🔒', 'Solo quien creó este patrón (o Rubiking) puede eliminarlo', '#f59e0b');
        return;
      }
      if (!confirm(`¿Eliminar el patrón "${sp.name}"?`)) return;
      window.__fbDeleteSavedPattern?.(id);
    }
    window.rrDeleteSavedPatternClick = rrDeleteSavedPatternClick;

    function rrOpenSaveModal() {
      if (!rrEditorIsRubiking()) return;
      if (!window.rrPattern || !window.rrPattern.length) {
        window.showDiscreteToast?.('⚠️', 'Primero creá un patrón para guardar', '#f59e0b');
        return;
      }
      const input = document.getElementById('rr-save-name-input');
      if (input) input.value = '';
      document.getElementById('rr-save-overlay')?.classList.remove('hidden');
      setTimeout(() => input?.focus(), 50);
    }
    window.rrOpenSaveModal = rrOpenSaveModal;

    function rrCloseSaveModal() {
      document.getElementById('rr-save-overlay')?.classList.add('hidden');
    }
    window.rrCloseSaveModal = rrCloseSaveModal;

    function rrConfirmSavePattern() {
      if (!rrEditorIsRubiking()) return;
      const input = document.getElementById('rr-save-name-input');
      const name = (input?.value || '').trim().slice(0, 24);
      if (!name) {
        window.showDiscreteToast?.('⚠️', 'Poné un nombre para el patrón', '#f59e0b');
        return;
      }
      if (!window.rrPattern || !window.rrPattern.length) return;
      // Se registra quién lo crea (el nombre actual) para que, una vez guardado, solo
      // ese jugador o Rubiking puedan eliminarlo/gestionarlo más adelante.
      window.__fbSavePattern?.(name, [...window.rrPattern], rrEditorCurrentName());
      window.showDiscreteToast?.('💾', `Patrón "${name}" guardado`, '#22c55e');
      rrCloseSaveModal();
    }
    window.rrConfirmSavePattern = rrConfirmSavePattern;
  </script>

  <!-- ══ React ══ -->
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* ─── Pride mode ─── */
    // Global state persisted in localStorage; all components read window.__prideMode
    window.__prideMode = false; // always start static
    const PRIDE_COLORS = [
      { id:"red",    bg:"#E40303", shine:"#FF5555", shadow:"#9A0000" },
      { id:"orange", bg:"#FF8C00", shine:"#FFB347", shadow:"#B85E00" },
      { id:"yellow", bg:"#FFED00", shine:"#FFF176", shadow:"#B8A800" },
      { id:"green",  bg:"#008026", shine:"#00B33A", shadow:"#004D17" },
      { id:"blue",   bg:"#004CFF", shine:"#4D88FF", shadow:"#0030B0" },
      { id:"white",  bg:"#732982", shine:"#9B3DB0", shadow:"#4A1A55" },
    ];
    // Pride colors for RR_COLORS widget
    const PRIDE_RR_COLORS = [
      { bg:'#732982', border:'#4A1A55', puzzleId:'white'  },
      { bg:'#007C31', border:'#004D1C', puzzleId:'green'  },
      { bg:'#FFED00', border:'#C8B400', puzzleId:'yellow' },
      { bg:'#1565C0', border:'#0D47A1', puzzleId:'blue'   },
      { bg:'#E40303', border:'#990000', puzzleId:'red'    },
      { bg:'#FF8C00', border:'#C46400', puzzleId:'orange' },
    ];

    /* ─── Modo daltónico (rojo/verde → violeta/azul cielo) ─── */
    // Global state persisted in localStorage; all components read window.__colorblindMode
    window.__colorblindMode = localStorage.getItem('mc-colorblind') === '1';
    const CB_SWAP = {
      red:   { bg:"#7C3AED", shine:"#A78BFA", shadow:"#4C1D95" }, // violeta
      green: { bg:"#0EA5E9", shine:"#7DD3FC", shadow:"#075985" }, // azul cielo
    };
    const CB_SWAP_RR = {
      red:   { bg:'#7C3AED', border:'#4C1D95' },
      green: { bg:'#0EA5E9', border:'#075985' },
    };

    // Recalcula window.RR_COLORS a partir del estado actual de pride + daltónico
    function refreshRRColors() {
      const src = window.__prideMode ? PRIDE_RR_COLORS : (window._origRrColors || window.RR_COLORS);
      src.forEach((c, i) => { window.RR_COLORS[i] = { ...c }; });
      if (window.__colorblindMode) {
        window.RR_COLORS.forEach(c => {
          const swap = CB_SWAP_RR[c.puzzleId];
          if (swap) { c.bg = swap.bg; c.border = swap.border; }
        });
      }
    }

    function setPrideMode(on) {
      window.__prideMode = on;
      localStorage.setItem('mc-pride', on ? '1' : '0');
      window._origRrColors = window._origRrColors || [...window.RR_COLORS];
      refreshRRColors();
      // Dispatch event so React components re-render
      window.dispatchEvent(new CustomEvent('prideModeChange', { detail: on }));
    }

    function setColorblindMode(on) {
      window.__colorblindMode = !!on;
      localStorage.setItem('mc-colorblind', window.__colorblindMode ? '1' : '0');
      refreshRRColors();
      window.dispatchEvent(new CustomEvent('colorblindModeChange', { detail: window.__colorblindMode }));
    }
    window.setColorblindMode = setColorblindMode;

    function useColorblindMode() {
      const [cb, setCb] = useState(!!window.__colorblindMode);
      useEffect(() => {
        const handler = (e) => setCb(e.detail);
        window.addEventListener('colorblindModeChange', handler);
        return () => window.removeEventListener('colorblindModeChange', handler);
      }, []);
      return cb;
    }

    // Aplica el estado guardado (por si mc-colorblind ya estaba activo antes de cargar)
    refreshRRColors();

    const COLORS = [
      { id:"blue",   bg:"#0D3B8E", shine:"#1A5FC8", shadow:"#061E50" },
      { id:"green",  bg:"#0A6B2E", shine:"#13A346", shadow:"#053A18" },
      { id:"red",    bg:"#8B0C0C", shine:"#C41A1A", shadow:"#4A0505" },
      { id:"yellow", bg:"#B89200", shine:"#E8B800", shadow:"#6B5500" },
      { id:"orange", bg:"#B84500", shine:"#E86200", shadow:"#6B2600" },
      { id:"white",  bg:"#C8C8D8", shine:"#EEEEF8", shadow:"#8888A0" },
    ];
    const colorMap={}; COLORS.forEach(c=>{colorMap[c.id]=c;});
    const prideColorMap={}; PRIDE_COLORS.forEach(c=>{prideColorMap[c.id]=c;});

    function usePrideMode() {
      const [pride, setPride] = useState(!!window.__prideMode);
      useEffect(() => {
        const handler = (e) => setPride(e.detail);
        window.addEventListener('prideModeChange', handler);
        return () => window.removeEventListener('prideModeChange', handler);
      }, []);
      return pride;
    }

    function applyColorblindToMap(map) {
      const out = { ...map };
      Object.keys(CB_SWAP).forEach(id => {
        if (out[id]) out[id] = { ...out[id], ...CB_SWAP[id] };
      });
      return out;
    }
    function getColorMap(pride, colorblind) {
      const base = pride ? prideColorMap : colorMap;
      return colorblind ? applyColorblindToMap(base) : base;
    }
    const RR_IDS=['white','green','yellow','blue','red','orange'];
    // Probabilidad de que se dispare el power-up de remontada al cumplirse la condición
    const RR_SABOTAGE_CHANCE = 0.5;
    const SESSION_UID=Math.random().toString(36).slice(2);

    const CODE_CHARS='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    function genCode() { return Array.from({length:4},()=>CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)]).join(''); }

    function waitForFb(timeout=8000) {
      return new Promise((resolve, reject) => {
        if (window.__fbReady) { resolve(); return; }
        const timer = setTimeout(() => reject(new Error(window.T.errFirebase)), timeout);
        window.addEventListener('fbReady', () => { clearTimeout(timer); resolve(); }, { once: true });
      });
    }

    // Índices de las casillas centrales (patternSize × patternSize) dentro del tablero boardSize × boardSize
    function computeCenter(boardSize, patternSize) {
      const offset = Math.floor((boardSize - patternSize) / 2);
      const arr = [];
      for (let r=0; r<patternSize; r++) for (let c=0; c<patternSize; c++) arr.push((offset+r)*boardSize + (offset+c));
      return arr;
    }
    function checkMatch(tiles,pat,center){ if(!pat||!center||pat.length<center.length)return false; return center.every((ti,i)=>{const t=tiles[ti];return t&&t.colorId===RR_IDS[pat[i]];}); }

    // Cuenta cuántos tiles de cada color exige un patrón (manual o desde imagen).
    function rrRequiredCounts(pattern) {
      const counts = {};
      (pattern||[]).forEach(p => { const id = RR_IDS[p]; if (id) counts[id] = (counts[id]||0) + 1; });
      return counts;
    }

    // Igual que buildSolved, pero garantiza al menos `requiredCounts[colorId]` tiles
    // de cada color (los necesarios para el patrón actual) antes de repartir el resto
    // de forma equilibrada entre todos los colores. Así el tablero siempre tiene
    // material suficiente para completar el patrón creado a mano o desde imagen.
    function buildSolvedForPattern(boardSize, mask, requiredCounts){
      const validIdxs = mask ? [...mask] : Array.from({length:boardSize*boardSize},(_,i)=>i);
      const total = validIdxs.length - 1; // última celda = hueco
      const counts = {}; COLORS.forEach(c => counts[c.id] = (requiredCounts && requiredCounts[c.id]) || 0);
      let assigned = Object.values(counts).reduce((a,b)=>a+b, 0);
      // Si el patrón pidiera más tiles de los que caben en el tablero (caso extremo),
      // recorta proporcionalmente para que no se rompa el reparto.
      if (assigned > total) {
        const scale = total / assigned;
        let scaled = 0;
        COLORS.forEach(c => { counts[c.id] = Math.floor(counts[c.id]*scale); scaled += counts[c.id]; });
        assigned = scaled;
      }
      let remaining = Math.max(0, total - assigned);
      let ci = 0;
      while (remaining > 0) { counts[COLORS[ci % COLORS.length].id]++; ci++; remaining--; }
      const pool = [];
      COLORS.forEach(c => { for (let i=0;i<counts[c.id];i++) pool.push(c.id); });
      for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
      const t = new Array(boardSize*boardSize);
      const nums = {};
      validIdxs.forEach((idx, i) => {
        if (i < total) { const id = pool[i] || COLORS[0].id; nums[id]=(nums[id]||0)+1; t[idx] = { colorId:id, num:nums[id] }; }
        else t[idx] = null;
      });
      return t;
    }

    // mask (Set opcional): índices válidos del tablero. Si se omite, el tablero es un cuadrado completo boardSize×boardSize.
    function buildSolved(boardSize, mask){
      const validIdxs = mask ? [...mask] : Array.from({length:boardSize*boardSize},(_,i)=>i);
      const total = validIdxs.length-1;
      const t = new Array(boardSize*boardSize); // undefined = casilla inexistente (hueco de la forma)
      const counts={};
      validIdxs.forEach((idx,i)=>{
        if (i<total) { const c=COLORS[i%COLORS.length]; counts[c.id]=(counts[c.id]||0)+1; t[idx]={colorId:c.id,num:counts[c.id]}; }
        else t[idx]=null;
      });
      return t;
    }
    function canMove(ti,ei,boardSize,mask){
      if (mask && (!mask.has(ti) || !mask.has(ei))) return false;
      const tR=Math.floor(ti/boardSize),tC=ti%boardSize,eR=Math.floor(ei/boardSize),eC=ei%boardSize;
      return(tR===eR&&Math.abs(tC-eC)===1)||(tC===eC&&Math.abs(tR-eR)===1);
    }
    function shuffle(tiles,boardSize,n=300,mask){
      let t=[...tiles],e=t.indexOf(null);
      for(let i=0;i<n;i++){
        const cand=[],r=Math.floor(e/boardSize),c=e%boardSize;
        if(r>0)cand.push(e-boardSize); if(r<boardSize-1)cand.push(e+boardSize);
        if(c>0)cand.push(e-1); if(c<boardSize-1)cand.push(e+1);
        const nb = mask ? cand.filter(p=>mask.has(p)) : cand;
        if (!nb.length) continue;
        const p=nb[Math.floor(Math.random()*nb.length)];
        [t[e],t[p]]=[t[p],t[e]]; e=p;
      }
      return t;
    }
    function fmt(s){return`${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;}

    /* ─── Long press utility (module-level timers, no hooks) ─── */
    function makeLongPress(onComplete, ms) {
      let timer = null, prog = null, t0 = 0;
      function start(setH, setP) {
        if (timer) return;
        t0 = Date.now();
        setH(true); setP(0);
        prog  = setInterval(() => setP(Math.min(1,(Date.now()-t0)/ms)), 30);
        timer = setTimeout(() => { stop(setH,setP); onComplete(); }, ms);
      }
      function stop(setH, setP) {
        clearTimeout(timer); clearInterval(prog);
        timer = null; prog = null;
        setH(false); setP(0);
      }
      return { start, stop };
    }

    /* ─── Lobby ─── */
    function Lobby({ onJoin, initialDoneLevels = [], initialName = '' }) {
      const [name,     setName]     = useState(()=>localStorage.getItem('rr-player-name')||'');
      const [joinCode, setJoinCode] = useState('');
      const [showJoin, setShowJoin] = useState(false);
      const [loading,  setLoading]  = useState(false);
      const [error,    setError]    = useState('');
      const [games,    setGames]    = useState([]);
      const [level,    setLevel]    = useState(()=>{
        const saved = parseInt(localStorage.getItem('rr-level'),10);
        return (saved>=1 && saved<=8) ? saved : 2;
      });

      const nameOk = name.trim().length > 0;
      const [rankName, setRankName] = useState('');
      const isRubiking = name.trim().toLowerCase() === 'rubiking';

      // ── Nivel 8 oculto: se desbloquea por nombre 'Rubiking', por introducir un código
      // personal de otro jugador (panel junto al nivel 7), o por haber completado en solo
      // los 7 niveles normales (progreso guardado en Firebase, viaja entre dispositivos) ──
      const [level8Unlocked, setLevel8Unlocked] = useState(false);
      const [myUnlockCode,   setMyUnlockCode]   = useState('');
      const [showCodePanel,  setShowCodePanel]  = useState(false);
      const [codeInput,      setCodeInput]      = useState('');
      const [codeMsg,        setCodeMsg]        = useState('');
      const [codeBusy,       setCodeBusy]       = useState(false);
      const [lockedTip,      setLockedTip]      = useState(null); // { level, x, y }
      const [fbOnline,       setFbOnline]       = useState(null)  ;  // Firebase conectado
      // Niveles 1-7 completados en solo por este jugador (desbloqueo progresivo:
      // el nivel N requiere haber completado el N-1). Rubiking siempre tiene todo.
      const [doneLevels,     setDoneLevels]     = useState(initialDoneLevels);
      // True una vez que la carga de Firebase (o los initialDoneLevels) ha terminado;
      // evita que el selector salte a nivel 1 mientras los datos viajan por la red.
      const [progressLoaded, setProgressLoaded] = useState(initialDoneLevels.length > 0);
      // True cuando el usuario ha tocado el selector manualmente; evita que el auto-select
      // sobreescriba su elección al llegar el progreso de Firebase.
      const [userPickedLevel, setUserPickedLevel] = useState(false);


      // Escuchar estado de conexión Firebase
      useEffect(() => {
        const prev = window.__fbConnectionState;
        window.__fbConnectionState = (ok) => { setFbOnline(ok); prev?.(ok); };
        setFbOnline(window.__fbConnected ?? null);
        return () => { window.__fbConnectionState = prev; };
      }, []);
      const maxUnlockedLevel = useCallback((done) => {
        if (isRubiking) return 8;
        // Los primeros 3 niveles siempre están desbloqueados
        let lvl = Math.max(3, 1);
        while (lvl < 7 && done.includes(lvl)) lvl++;
        // Si nivel 7 completado Y nivel 8 desbloqueado, el máximo es 8
        if (lvl === 7 && done.includes(7) && (localStorage.getItem('rr-level8-code') === '1' || level8Unlocked)) lvl = 8;
        return lvl;
      }, [isRubiking, level8Unlocked]);

      // Cuando App actualiza initialDoneLevels (sync Firebase en background), aplicar el merge
      useEffect(() => {
        if (!initialDoneLevels.length) return;
        setDoneLevels(prev => {
          const merged = [...new Set([...prev, ...initialDoneLevels])];
          // Solo actualizar si hay cambios reales
          if (merged.length === prev.length) return prev;
          return merged;
        });
        setProgressLoaded(true);
      }, [initialDoneLevels]);

      // Carga el progreso del alias desde Firebase y actualiza doneLevels
      const loadProgress = useCallback(async (nameStr) => {
        if (!nameStr) { setDoneLevels([]); setProgressLoaded(true); return []; }
        const done = await window.__fbGetSoloLevelsDone?.(nameStr) ?? [];
        // Combinar con lo que ya tenemos para no perder progreso recién guardado
        let merged = done;
        setDoneLevels(prev => {
          merged = [...new Set([...prev, ...done])];
          return merged;
        });
        setProgressLoaded(true);
        return merged;
      }, []);

      const checkLevel8 = useCallback(async (done) => {
        const doneList = done ?? doneLevels;
        const codeUnlocked = localStorage.getItem('rr-level8-code') === '1';
        const level7Done = doneList.includes(7);
        const unlocked = level7Done || isRubiking || codeUnlocked;
        if (unlocked) {
          setLevel8Unlocked(true);
          if (!localStorage.getItem('rr-level8-seen')) {
            localStorage.setItem('rr-level8-seen','1');
            window.playChime?.();
          }
          if (name.trim()) {
            window.__fbGetOrCreateUnlockCode?.(name.trim()).then(c=>{ if (c) setMyUnlockCode(c); });
          }
        }
      }, [name, isRubiking, doneLevels]);

      // Carga el progreso desde Firebase siempre que el nombre cambie. Rubiking no tiene
      // contraseña, así que su progreso se carga directamente. El resto de jugadores solo
      // ven su progreso si el alias está libre (sin proteger) o tras verificar la contraseña
      // correcta (ver el efecto de aliasClaimed y confirmPassword más abajo); mientras tanto
      // se muestra el estado por defecto (niveles 1-3 desbloqueados, sin marcas de completado).
      useEffect(() => {
        if (!name.trim()) { setDoneLevels([]); setLevel8Unlocked(false); setUserPickedLevel(false); setProgressLoaded(false); return; }
        if (isRubiking) { loadProgress(name.trim()).then(d => checkLevel8(d)); return; }
        if (passSession) return; // sesión de contraseña ya verificada: no ocultar el progreso
        setDoneLevels([]); setLevel8Unlocked(false); setProgressLoaded(false);
      }, [name, isRubiking]);

      // Seleccionar el mayor nivel desbloqueado al cargar el progreso, pero solo si el
      // usuario no ha elegido nivel manualmente. No tocar el nivel 8 (cross) ni si aún
      // no ha terminado la carga de progreso.
      useEffect(() => {
        if (!progressLoaded) return;
        if (userPickedLevel) return;
        const lv = window.RR_LEVEL_INFO(level);
        if (lv?.special === 'cross') return;
        const max = maxUnlockedLevel(doneLevels);
        setLevel(max);
      }, [doneLevels, isRubiking, level8Unlocked, maxUnlockedLevel, progressLoaded, userPickedLevel]);

      const tryRedeemCode = useCallback(async () => {
        if (!codeInput.trim()) return;
        // Código maestro local (Easter egg)
        if (codeInput.trim().toLowerCase() === 'm0541cm45t3r') {
          localStorage.setItem('rr-level8-code','1');
          localStorage.removeItem('rr-level8-seen'); // reset para que suene el chime
          setCodeInput(''); setCodeMsg('');
          setShowCodePanel(false);
          await checkLevel8(doneLevels);
          return;
        }
        setCodeBusy(true); setCodeMsg('');
        const res = await window.__fbRedeemUnlockCode?.(codeInput.trim());
        setCodeBusy(false);
        if (res?.ok) {
          localStorage.setItem('rr-level8-code','1');
          localStorage.removeItem('rr-level8-seen'); // reset para que suene el chime
          setCodeInput(''); setCodeMsg('');
          setShowCodePanel(false);
          await checkLevel8(doneLevels);
        } else if (res?.reason === 'expired') {
          setCodeMsg(window.T.codeExpired);
        } else {
          setCodeMsg(window.T.codeWrong);
        }
      }, [codeInput, checkLevel8]);

      // Comprobar conflicto de nombre (debounced)
      useEffect(() => {
        if (!nameOk) { setRankName(''); return; }
        const t = setTimeout(async () => {
          if (!window.__fbReady) return;
          const count = await window.__fbCheckName?.(name.trim()) ?? 0;
          setRankName(count > 0 ? `${name.trim()} #${count + 1}` : '');
        }, 600);
        return () => clearTimeout(t);
      }, [name, nameOk]);

      // Alias protegido por contraseña (debounced)
      const [aliasClaimed,  setAliasClaimed]  = useState(false);
      const [password,      setPassword]      = useState('');
      const [passwordError, setPasswordError] = useState('');
      // True cuando la sesión de contraseña está activa (no hay que volver a escribirla)
      const [passSession,   setPassSession]   = useState(false);
      // True mientras se verifica la contraseña contra Firebase (evita doble clic)
      const [pwChecking,    setPwChecking]    = useState(false);

      // Al montar: restaurar sesión si existe y no han pasado 30s desde que salió.
      // La sesión solo se guarda tras verificar la contraseña correctamente (ver
      // confirmPassword), así que aquí se puede confiar en ella y cargar el progreso.
      useEffect(() => {
        try {
          const raw = sessionStorage.getItem('rr-pass-session');
          if (!raw) return;
          const { savedName, savedPass, leaveTime } = JSON.parse(raw);
          const elapsed = leaveTime ? (Date.now() - leaveTime) : 0;
          const storedName = localStorage.getItem('rr-player-name') || '';
          if (savedName && savedPass && storedName === savedName && elapsed < 30000) {
            setPassword(savedPass);
            setPassSession(true);
            loadProgress(savedName).then(d => checkLevel8(d));
          } else {
            sessionStorage.removeItem('rr-pass-session');
          }
        } catch(e) {}
      }, []);


      useEffect(() => {
        setPasswordError('');
        if (passSession) return; // no limpiar si hay sesión activa
        setPassword('');
        if (!nameOk) { setAliasClaimed(false); return; }
        const t = setTimeout(async () => {
          if (!window.__fbReady) return;
          const claimed = await window.__fbCheckAlias?.(name.trim()) ?? false;
          setAliasClaimed(claimed);
          if (!claimed && !isRubiking) {
            // Alias libre: no hay contraseña que proteja el progreso, se muestra directamente.
            const done = await loadProgress(name.trim());
            await checkLevel8(done);
          } else if (!isRubiking) {
            // Alias protegido: el progreso permanece oculto hasta introducir la contraseña correcta.
            setProgressLoaded(true);
          }
        }, 600);
        return () => clearTimeout(t);
      }, [name, nameOk, passSession, isRubiking]);

      // Se ejecuta al pulsar "OK" o Enter en el campo de contraseña. Si el alias está
      // protegido, verifica la contraseña contra Firebase ANTES de revelar el progreso
      // y marcar la sesión como activa; si es incorrecta, muestra el error y no revela nada.
      const confirmPassword = useCallback(async () => {
        if (!password.trim() || passSession || pwChecking) return;
        if (aliasClaimed) {
          setPwChecking(true);
          const ok = await window.__fbVerifyAliasPassword?.(name.trim(), password.trim()) ?? false;
          setPwChecking(false);
          if (!ok) { setPasswordError(window.T.wrongPassword); return; }
        }
        setPasswordError('');
        const done = await loadProgress(name.trim());
        await checkLevel8(done);
        sessionStorage.setItem('rr-pass-session', JSON.stringify({ savedName: name.trim(), savedPass: password.trim(), leaveTime: null }));
        setPassSession(true);
      }, [password, passSession, pwChecking, aliasClaimed, name, loadProgress, checkLevel8]);

      // Verifica la contraseña (si el alias está reclamado) o la reclama (si se ha escrito una
      // contraseña para un alias libre). Devuelve si la sesión debe tratarse como efímera
      // (sin contraseña → se borrarán los datos al salir) o null si falló la verificación.
      const resolveAlias = async () => {
        if (aliasClaimed) {
          const ok = await window.__fbVerifyAliasPassword?.(name.trim(), password) ?? false;
          if (!ok) { setPasswordError(window.T.wrongPassword); return null; }
          const done = await loadProgress(name.trim());
          await checkLevel8(done);
          return { ephemeral: false, done };
        }
        if (password.trim()) {
          await window.__fbClaimAlias?.(name.trim(), password.trim());
        }
        // Siempre cargar el progreso existente en Firebase, independientemente
        // de si el alias está reclamado o es una sesión efímera
        const done = await loadProgress(name.trim());
        await checkLevel8(done);
        const ephemeral = !password.trim();
        return { ephemeral, done };
      };

      // Auto-join if URL has ?code=XXXX
      useEffect(() => {
        const params = new URLSearchParams(location.search);
        const code = params.get('code')?.toUpperCase();
        if (code && code.length === 4) {
          setJoinCode(code);
          setShowJoin(true);
        }
      }, []);

      // Listen to active games + periodic cleanup of stale entries
      useEffect(() => {
        const start = () => {
          window.__fbListenGames?.(setGames);
          window.__fbCleanStaleGames?.();
        };
        if (window.__fbReady) start();
        else window.addEventListener('fbReady', start, { once: true });
        const cleanInterval = setInterval(() => window.__fbCleanStaleGames?.(), 30000);
        return () => { window.__fbUnlistenGames?.(); clearInterval(cleanInterval); };
      }, []);

      const handleNew = async () => {
        if (!nameOk) return;
        setLoading(true); setError(''); setPasswordError('');
        try {
          await waitForFb();
          const result = await resolveAlias();
          if (result === null) { setLoading(false); return; }
          const { ephemeral, done } = result;
          // El nivel seleccionado puede no ser accesible aún (estado React desactualizado).
          // Usamos el progreso real recién cargado para elegir el mayor nivel desbloqueado
          // si el seleccionado supera ese límite; de lo contrario respetamos la elección.
          const isCrossSelected = window.RR_LEVEL_INFO(level)?.special === 'cross';
          const level8ok = localStorage.getItem('rr-level8-code') === '1';
          const maxLvl = isRubiking ? 8 : (() => { let l=3; while(l<7 && done.includes(l)) l++; if(l===7&&done.includes(7)&&level8ok) l=8; return l; })();
          const safeLevel = isCrossSelected ? level : Math.min(level, maxLvl);
          const code = genCode();
          localStorage.setItem('rr-player-name', name.trim());
          localStorage.setItem('rr-level', String(safeLevel));
          window.__rrLevel = safeLevel;
          await window.__fbJoinGame(code);
          await window.__fbDeleteLobbyByHost?.(name.trim());
          await window.__fbSetMeta?.(name.trim());
          await window.__fbRegisterLobby?.(code, name.trim(), safeLevel);
          window.rrShuffle?.();
          onJoin(name.trim(), code, safeLevel, ephemeral, false, done);
        } catch(e) {
          console.error('handleNew error:', e);
          setError(e.message || window.T.errCreate);
          setLoading(false);
        }
      };

      const handleJoin = async () => {
        const code = joinCode.trim().toUpperCase();
        if (code.length !== 4) { setError(window.T.errCode4); return; }
        setLoading(true); setError(''); setPasswordError('');
        try {
          await waitForFb();
          const exists = await window.__fbGameExists(code);
          if (!exists) { setError(window.T.errNotFound); setLoading(false); return; }
          const result = await resolveAlias();
          if (result === null) { setLoading(false); return; }
          const { ephemeral, done } = result;
          const joinLevel = await window.__fbGetLobbyLevel?.(code) ?? 2;
          window.__rrLevel = joinLevel;
          localStorage.setItem('rr-player-name', name.trim());
          await window.__fbJoinGame(code);
          onJoin(name.trim(), code, joinLevel, ephemeral, true, done||[]); // true = fromInvite
        } catch(e) {
          console.error('handleJoin error:', e);
          setError(e.message || window.T.errJoin);
          setLoading(false);
        }
      };

      const handleJoinGame = async (code) => {
        if (!nameOk) { setError(window.T.errWriteName); return; }
        setLoading(true); setError(''); setPasswordError('');
        try {
          await waitForFb();
          const result = await resolveAlias();
          if (result === null) { setLoading(false); return; }
          const { ephemeral, done } = result;
          const g = games.find(g=>g.code===code);
          const joinLevel = g?.level || 2;
          window.__rrLevel = joinLevel;
          localStorage.setItem('rr-player-name', name.trim());
          await window.__fbJoinGame(code);
          onJoin(name.trim(), code, joinLevel, ephemeral, true, done||[]); // true = fromInvite
        } catch(e) {
          console.error('handleJoinGame error:', e);
          setError(e.message || window.T.errJoinShort);
          setLoading(false);
        }
      };

      return (
        <div className="lobby-wrap">
          <Stars/>
          <PrideToast onActivate={() => { setPrideMode(!window.__prideMode); window.playChime?.(); }}>
            <MosaicTitle style={{width:'100%',justifyContent:'center'}} interactive={false}/>
          </PrideToast>
          {fbOnline === false && (
            <div style={{
              width:'100%',maxWidth:'420px',marginBottom:'10px',
              padding:'10px 14px',borderRadius:'12px',boxSizing:'border-box',
              background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.35)',
              color:'rgba(255,180,180,.9)',fontSize:'12px',fontWeight:600,
              display:'flex',alignItems:'center',gap:'10px',lineHeight:1.5,
            }}>
              <span style={{fontSize:'18px',flexShrink:0}}>⚠️</span>
              <span>Sin conexión con la base de datos —
                <span style={{fontWeight:400,opacity:.85}}> no se guardarán ni leerán los progresos.</span>
              </span>
            </div>
          )}
          <div className="lobby-card">
            {/* Name */}
            <div>
              <div className="lobby-label">{window.T.yourName}</div>
              <input id="lobby-name-input" className="lobby-input" maxLength={20} placeholder={window.T.namePlaceholder}
                value={name} onChange={e=>setName(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter'&&nameOk&&!showJoin) handleNew(); }}
              />
              {rankName && (
                <div style={{marginTop:'8px',background:'rgba(255,180,0,.07)',
                             border:'1px solid rgba(255,180,0,.2)',borderRadius:'8px',
                             padding:'8px 10px',fontSize:'11px'}}>
                  <div style={{color:'rgba(255,200,80,.9)',marginBottom:'6px'}}>
                    {window.T.nameWarning(name.trim(), rankName)} <b style={{color:'#FFD700'}}>{rankName}</b>
                  </div>
                  <div style={{display:'flex',gap:'6px'}}>
                    <button onClick={()=>{ setName(''); setRankName(''); document.getElementById('lobby-name-input')?.focus(); }}
                            style={{flex:1,padding:'5px 8px',borderRadius:'6px',border:'1px solid rgba(255,200,80,.4)',
                                   background:'rgba(255,180,0,.12)',color:'#FFD700',fontSize:'11px',
                                   fontWeight:700,cursor:'pointer',letterSpacing:'.05em'}}>
                      {window.T.changeName}
                    </button>
                    <button onClick={()=>setRankName('')}
                            style={{padding:'5px 8px',borderRadius:'6px',border:'1px solid rgba(255,255,255,.1)',
                                   background:'rgba(255,255,255,.05)',color:'rgba(255,255,255,.4)',
                                   fontSize:'11px',cursor:'pointer'}}>
                      {window.T.continueAnyway}
                    </button>
                  </div>
                </div>
              )}

              {nameOk && (
                <div style={{marginTop:'10px'}}>
                  <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                    <input type="password" maxLength={17} value={password}
                      disabled={passSession}
                      onChange={e=>{setPassword(e.target.value); setPasswordError(''); setPassSession(false);}}
                      onKeyDown={e=>{ if(e.key==='Enter' && password.trim() && !passSession) confirmPassword(); }}
                      placeholder={aliasClaimed ? window.T.passwordRequired : window.T.passwordOptional}
                      style={{flex:1,boxSizing:'border-box',padding:'9px 12px',borderRadius:'8px',
                              border:`1px solid ${passwordError?'rgba(248,113,113,.5)':passSession?'rgba(100,200,100,.35)':aliasClaimed?'rgba(255,180,0,.35)':'rgba(255,255,255,.12)'}`,
                              background: passSession ? 'rgba(100,200,100,.06)' : 'rgba(255,255,255,.04)',
                              color:'#fff',fontSize:'12.5px',opacity: passSession ? 0.6 : 1}}/>
                    {passSession ? (
                      <button onClick={()=>{

                                background:'rgba(239,68,68,.18)',color:'#fff',fontWeight:700,fontSize:'16px',
                                cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>

                      </button>

                        style={{padding:'9px 13px',borderRadius:'8px',border:'1px solid rgba(156,90,255,.5)',
                                background:'rgba(156,90,255,.18)',color:'#fff',fontWeight:700,fontSize:'13px',
                                cursor: pwChecking ? 'wait' : 'pointer',whiteSpace:'nowrap',flexShrink:0,

                  </div>
                  {aliasClaimed && !passwordError && (
                    <div style={{marginTop:'5px',fontSize:'10.5px',color: passSession ? 'rgba(100,200,100,.8)' : 'rgba(255,200,80,.75)'}}>

                    </div>
                  )}
                  {passwordError && (
                    <div style={{marginTop:'5px',fontSize:'10.5px',color:'#f87171'}}>{passwordError}</div>
                  )}
                </div>
              )}
            </div>

            {/* Nivel de dificultad */}
            <div>
              <div className="lobby-label" style={{marginBottom:'8px'}}>{window.T.chooseLevel}</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'6px'}}>
                {window.RR_LEVELS.filter(lv=>!lv.hidden || level8Unlocked).map(lv=>{
                  const active = level===lv.level;
                  const isSpecial = lv.special==='cross';
                  const locked = !isSpecial && lv.level > maxUnlockedLevel(doneLevels);
                  const completed = !isSpecial && doneLevels.includes(lv.level);
                  return (
                    <button key={lv.level}

                          setLockedTip(null);
                        }
                      }}
                      title={!locked ? (isSpecial ? `${window.T.levelShort(lv.level)} · ${window.T.mosaicCross}` : `${window.T.levelShort(lv.level)} · ${lv.boardSize}×${lv.boardSize}`) : ''}
                      style={{
                        position:'relative',padding:'8px 4px',borderRadius:'9px',
                        cursor:locked?'not-allowed':'pointer',
                        opacity:locked?0.45:1,
                        border:`1px solid ${active?'rgba(156,90,255,.8)':completed?'rgba(74,222,128,.5)':isSpecial?'rgba(255,200,80,.55)':'rgba(255,255,255,.12)'}`,
                        background:active?'rgba(156,90,255,.22)':completed?'rgba(34,197,94,.1)':isSpecial?'rgba(255,200,80,.1)':'rgba(255,255,255,.04)',
                        color:active?'#fff':completed?'#4ade80':isSpecial?'#FFD27A':'rgba(255,255,255,.65)',
                        fontWeight:800,fontSize:'14px',transition:'all .15s',
                        boxShadow:active?'0 0 14px rgba(156,90,255,.4)':completed?'0 0 8px rgba(74,222,128,.25)':isSpecial?'0 0 10px rgba(255,200,80,.35)':'none',
                        animation:isSpecial?'level8In .5s ease':'none',
                      }}>
                      {locked ? '🔒' : completed && !active ? '✓' : isSpecial ? (

                          <span style={{position:'absolute',bottom:'-7px',right:'-12px',fontSize:'8px',
                                        animation:'starTwinkle 1.6s ease-in-out infinite .5s'}}>✨</span>
