  <script>
  /* ── Sonidos — Chrome + Safari/iOS ── */
  (() => {
    let _ctx = null;
    let _masterGain = null;

    // ── Volumen / silencio global (persistido) ──
    window.__soundVolume = (() => {
      const v = parseFloat(localStorage.getItem('mc-sound-volume'));
      return isNaN(v) ? 1 : Math.min(1, Math.max(0, v));
    })();
    window.__soundMuted = localStorage.getItem('mc-sound-muted') === '1';

    const getCtx = () => {
      if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
      return _ctx;
    };

    // Nodo de ganancia maestro: todos los sonidos pasan por aquí antes del destino
    const getMasterGain = (c) => {
      if (!_masterGain) {
        _masterGain = c.createGain();
        _masterGain.gain.value = window.__soundMuted ? 0 : window.__soundVolume;
        _masterGain.connect(c.destination);
      }
      return _masterGain;
    };

    window.setSoundVolume = (v) => {
      window.__soundVolume = Math.min(1, Math.max(0, v));
      localStorage.setItem('mc-sound-volume', String(window.__soundVolume));
      if (_masterGain) _masterGain.gain.value = window.__soundMuted ? 0 : window.__soundVolume;
    };

    window.setSoundMuted = (m) => {
      window.__soundMuted = !!m;
      localStorage.setItem('mc-sound-muted', window.__soundMuted ? '1' : '0');
      if (_masterGain) _masterGain.gain.value = window.__soundMuted ? 0 : window.__soundVolume;
    };

    // Desbloqueo: buffer silencioso (necesario en Safari) + resume
    const unlock = () => {
      try {
        const c = getCtx();
        if (c.state === 'suspended') {
          // Buffer silencioso: desbloquea Safari
          const buf = c.createBuffer(1, 1, 22050);
          const src = c.createBufferSource();
          src.buffer = buf;
          src.connect(c.destination);
          src.start(0);
          c.resume();
        }
      } catch(e) {}
    };

    // Desbloquear en cualquier interacción del usuario
    ['touchstart', 'touchend', 'mousedown', 'click'].forEach(ev =>
      document.addEventListener(ev, unlock, { capture: true, passive: true })
    );

    // Reanudar cuando la pestaña vuelve a primer plano
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') unlock();
    });

    // Reproducir: directo si running (Chrome), resume().then si suspended (Safari)
    const play = (fn) => {
      try {
        const c = getCtx();
        if (c.state === 'running') {
          fn(c);
        } else {
          unlock();
          c.resume().then(() => { try { fn(c); } catch(e) { console.warn('audio:', e); } });
        }
      } catch(e) { console.warn('audio init:', e); }
    };

    window.playClack = () => play(c => {
      const t = c.currentTime;
      const sz = Math.floor(c.sampleRate * 0.014);
      const buf = c.createBuffer(1, sz, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
      const click = c.createBufferSource(); click.buffer = buf;
      const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2800;
      const cg = c.createGain();
      cg.gain.setValueAtTime(1.0, t);
      cg.gain.exponentialRampToValueAtTime(0.001, t + 0.014);
      click.connect(hp); hp.connect(cg); cg.connect(getMasterGain(c));
      click.start(t);
      const osc = c.createOscillator(), og = c.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(180, t);
      osc.frequency.exponentialRampToValueAtTime(70, t + 0.045);
      og.gain.setValueAtTime(0.55, t);
      og.gain.exponentialRampToValueAtTime(0.001, t + 0.055);
      osc.connect(og); og.connect(getMasterGain(c));
      osc.start(t); osc.stop(t + 0.06);
    });

    window.playWood = () => play(c => {
      const t = c.currentTime;
      const sz = Math.floor(c.sampleRate * 0.2);
      const buf = c.createBuffer(1, sz, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource(); src.buffer = buf;
      const bp = c.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 280; bp.Q.value = 4;
      const gn = c.createGain();
      gn.gain.setValueAtTime(0.7, t);
      gn.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      src.connect(bp); bp.connect(gn); gn.connect(getMasterGain(c));
      src.start(t);
      const osc = c.createOscillator(), go = c.createGain();
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(160, t + 0.15);
      go.gain.setValueAtTime(0.25, t);
      go.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      osc.connect(go); go.connect(getMasterGain(c));
      osc.start(t); osc.stop(t + 0.2);
    });

    window.playTickTock = () => play(c => {
      const t = c.currentTime;
      for (let i = 0; i < 4; i++) {
        const when = t + i * 0.38;
        const freq = i % 2 === 0 ? 820 : 560;
        const osc = c.createOscillator(), g = c.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(0.45, when + 0.004);
        g.gain.exponentialRampToValueAtTime(0.001, when + 0.07);
        osc.connect(g); g.connect(getMasterGain(c));
        osc.start(when); osc.stop(when + 0.08);
      }
    });

    window.playChime = () => play(c => {
      const t = c.currentTime;
      [1760, 2349, 2793].forEach((freq, i) => {
        const when = t + i * 0.045;
        const osc = c.createOscillator(), g = c.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(0.22 - i * 0.04, when + 0.008);
        g.gain.exponentialRampToValueAtTime(0.0008, when + 0.32);
        osc.connect(g); g.connect(getMasterGain(c));
        osc.start(when); osc.stop(when + 0.34);
      });
    });

    window.playWhoosh = () => play(c => {
      const t = c.currentTime;
      const osc1 = c.createOscillator(), g1 = c.createGain();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(180, t);
      osc1.frequency.exponentialRampToValueAtTime(1400, t + 0.18);
      g1.gain.setValueAtTime(0.28, t);
      g1.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc1.connect(g1); g1.connect(getMasterGain(c));
      osc1.start(t); osc1.stop(t + 0.22);
      [880, 1320, 1760].forEach((freq, i) => {
        const when = t + 0.15 + i * 0.04;
        const osc = c.createOscillator(), g = c.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(0.3 - i * 0.06, when + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, when + 0.35);
        osc.connect(g); g.connect(getMasterGain(c));
        osc.start(when); osc.stop(when + 0.38);
      });
    });


    // La Marsellesa — primeras 9 notas del MIDI original (Re mayor, 105 BPM)
    // D4 D4 D4 G4 G4 A4 A4 D5 B4  — "Al-lons-en-fants-de-la-Pa-tri-e"
    window.playMarseillaiseHelp = () => play(c => {
      const BPM = 210;
      const q   = 60 / BPM;
      const e   = q * 0.25;   // corchea
      const ed  = q * 0.75;   // corchea con punto
      const qd  = q * 1.5;    // negra con punto
      const notes = [
        {f: 293.66, dur: e  },  // D4  "Al-"
        {f: 293.66, dur: ed },  // D4  "lons"
        {f: 293.66, dur: e  },  // D4  "en-"
        {f: 392.00, dur: q  },  // G4  "fants"
        {f: 392.00, dur: q  },  // G4  "de"
        {f: 440.00, dur: q  },  // A4  "la"
        {f: 440.00, dur: q  },  // A4  "Pa-"
        {f: 587.33, dur: qd },  // D5  "tri-"
        {f: 493.88, dur: q*0.5},// B4  "e"
        {f: 392.00, dur: ed },  // G4  "le"
      ];

      let when = c.currentTime + 0.06;
      notes.forEach(({f, dur}) => {
        const gate = dur * 0.86;
        const osc  = c.createOscillator();
        const osc2 = c.createOscillator();
        const vib  = c.createOscillator();
        const vibG = c.createGain();
        const lp   = c.createBiquadFilter();
        const g    = c.createGain();

        osc.type  = 'sawtooth';
        osc2.type = 'sawtooth';
        osc.frequency.value  = f;
        osc2.frequency.value = f * 1.003;

        vib.type = 'sine';
        vib.frequency.value = 5.5;
        vibG.gain.setValueAtTime(0, when);
        vibG.gain.linearRampToValueAtTime(f * 0.008, when + gate * 0.55);
        vib.connect(vibG);
        vibG.connect(osc.frequency);
        vibG.connect(osc2.frequency);

        lp.type = 'lowpass';
        lp.Q.value = 2.8;
        lp.frequency.setValueAtTime(f * 5.5, when);
        lp.frequency.linearRampToValueAtTime(f * 2.2, when + gate);

        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(0.32, when + 0.045);
        g.gain.linearRampToValueAtTime(0.26, when + 0.12);
        g.gain.setValueAtTime(0.26, when + gate - 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, when + gate);

        osc.connect(lp); osc2.connect(lp); lp.connect(g); g.connect(getMasterGain(c));
        osc.start(when);  osc.stop(when + gate + 0.02);
        osc2.start(when); osc2.stop(when + gate + 0.02);
        vib.start(when);  vib.stop(when + gate + 0.02);
        when += dur;
      });
    });
  })();
  </script>

  <!-- Firebase -->
  <script type="module">
    /*
    ══════════════════════════════════════════════════
    REGLAS FIREBASE CORRECTAS — pegar en Firebase Console
    (Realtime Database → Rules)

    {
      "rules": {
        "rubitrack": {
          "lobby":  { ".read": true, ".write": true },
          "scores": { ".read": true, ".write": true },
          "scoresByLevel": { ".read": true, ".write": true },
          "savedPatterns": { ".read": true, ".write": true },
          "games": {
            "$code": {
              "pattern":      { ".read": true, ".write": true },
              "reset":        { ".read": true, ".write": true },
              "notifications":{ ".read": true, ".write": true },
              "meta":         { ".read": true, ".write": true },
              "presence": {
                ".read": true,
                "$uid": {
                  ".write": true,
                  ".validate": "newData.hasChildren(['name','ts']) && newData.child('name').isString() && newData.child('name').val().length <= 20 && newData.child('ts').isNumber()"
                }
              }
            }
          }
        }
      }
    }
    ══════════════════════════════════════════════════
    */
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, push, get, remove, onValue, onChildAdded, off,
             query, orderByChild, startAfter }
                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { getMessaging, getToken, onMessage, isSupported as isMessagingSupported }
                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

    const app = initializeApp({
      apiKey:            "AIzaSyBPLE08QsDhA4JkRXAiAM5m98hsiHkuBGY",
      authDomain:        "mosaic-champ-db.firebaseapp.com",
      databaseURL:       "https://mosaic-champ-db-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "mosaic-champ-db",
      storageBucket:     "mosaic-champ-db.firebasestorage.app",
      messagingSenderId: "217247862933",
      appId:             "1:217247862933:web:232fb770b3974dd6c20b9c",
    });
    const db = getDatabase(app);

    // ── Push notifications (Firebase Cloud Messaging) ──
    // Clave pública VAPID (Firebase Console → Project Settings → Cloud Messaging → Web Push certificates)
    const FCM_VAPID_KEY = '34pVBmLHqJTablzki_6D3T_777K_XLXLiAQ5meBI7fA';

    window.__fbEnablePush = async (deviceId) => {
      try {
        const supported = await isMessagingSupported();
        if (!supported) return { ok: false, reason: 'unsupported' };
        if (!FCM_VAPID_KEY) return { ok: false, reason: 'no-vapid-key' };

        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return { ok: false, reason: 'denied' };

        const reg = await navigator.serviceWorker.ready;
        const messaging = getMessaging(app);
        const token = await getToken(messaging, { vapidKey: FCM_VAPID_KEY, serviceWorkerRegistration: reg });
        if (!token) return { ok: false, reason: 'no-token' };

        await set(ref(db, `rubitrack/pushTokens/${deviceId}`), { token, ts: Date.now() });

        // Notificaciones en primer plano (la pestaña ya está abierta)
        onMessage(messaging, (payload) => {
          window.__showForegroundNotification?.(payload.notification?.title, payload.notification?.body);
        });

        return { ok: true };
      } catch (e) {
        return { ok: false, reason: 'error', error: e };
      }
    };

    // ── Connection state ──
    onValue(ref(db, '.info/connected'), snap => window.__fbConnectionState?.(!!snap.val()));

    // ── Patrones guardados (galería global, no depende de la partida) ──
    // Solo Rubiking (u otro jugador con acceso al editor) puede crearlos; una vez
    // guardado, solo su creador (createdBy) o Rubiking pueden borrarlo/gestionarlo
    // (comprobado en el cliente antes de llamar a estas funciones). Cualquier jugador
    // con acceso al editor puede leerlos y aplicarlos a la partida actual.
    const savedPatternsRef = ref(db, 'rubitrack/savedPatterns');

    window.__fbSavePattern = (name, pattern, createdBy) =>
      push(savedPatternsRef, {
        name,
        pattern,
        size: Math.round(Math.sqrt(pattern.length)),
        createdBy: (createdBy || '').trim().toLowerCase(),
        ts: Date.now(),
      });

    window.__fbListenSavedPatterns = (callback) =>
      onValue(savedPatternsRef, snap => {
        const list = [];
        snap.forEach(child => {
          const v = child.val();
          if (v && Array.isArray(v.pattern)) list.push({ id: child.key, ...v });
        });
        list.sort((a, b) => (b.ts || 0) - (a.ts || 0));
        callback(list);
      });

    window.__fbDeleteSavedPattern = (id) => remove(ref(db, `rubitrack/savedPatterns/${id}`));

    // ── Per-game listeners ──
    let unsubs = [];
    function detach() { unsubs.forEach(fn => fn()); unsubs = []; }

    window.__fbJoinGame = async function(code) {
      detach();
      const base = `rubitrack/games/${code}`;

      // Pattern
      const patRef = ref(db, `${base}/pattern`);
      unsubs.push(onValue(patRef, snap => {
        const d = snap.val();
        if (d && Array.isArray(d)) window.__fbPatternReceived?.(d);
      }));
      window.__fbSetPattern = p => set(patRef, p);

      // Reset
      const rstRef = ref(db, `${base}/reset`);
      unsubs.push(onValue(rstRef, snap => {
        const v = snap.val();
        if (v?.ts) window.__fbResetReceived?.(v.ts);
      }));
      window.__fbSendReset = () => set(rstRef, { ts: Date.now() });

      // Notifications (only new ones)
      const notifRef   = ref(db, `${base}/notifications`);
      const notifQuery = query(notifRef, orderByChild('ts'), startAfter(Date.now()));
      unsubs.push(onChildAdded(notifQuery, snap => {
        const item = snap.val();
        if (!item) return;
        if (item.type === 'nearWin') window.dispatchEvent(new CustomEvent('rrNearWin', { detail: item }));
        else                         window.__fbNotifReceived?.(item);
      }));
      window.__fbSendFinish = (name, time, moves) =>
        push(notifRef, { name, time, moves, ts: Date.now() });
      window.__fbSendNearWin = (playerName) =>
        push(notifRef, { type: 'nearWin', player: playerName, ts: Date.now() });

      // Presence
      const presRef = ref(db, `${base}/presence`);
      unsubs.push(onValue(presRef, snap => {
        const now = Date.now(), players = [];
        snap.forEach(child => {
          const v = child.val();
          if (v?.name && (now - v.ts) < 15000)
            players.push({ name:v.name, moving:v.moving&&(now-(v.lastMove||0))<4000,
                           finished:!!v.finished, time:v.finishTime||null, moves:v.finishMoves||null });
        });
        window.__fbPresenceReceived?.(players);
      }));
      window.__fbUpdatePresence = (uid, name, moving=false) => {
        const d = { name, ts: Date.now(), moving };
        if (moving) d.lastMove = Date.now();
        return set(ref(db, `${base}/presence/${uid}`), d);
      };
      window.__fbUpdateFinishPresence = (uid, name, finishTime, finishMoves) =>
        set(ref(db, `${base}/presence/${uid}`), { name, ts:Date.now(), moving:false,
                                                   finished:true, finishTime, finishMoves });

      // Progreso (nº de fichas centrales bien colocadas) — usado por el power-up de remontada
      const progRef = ref(db, `${base}/progress`);
      unsubs.push(onValue(progRef, snap => {
        const now = Date.now(), list = [];
        snap.forEach(child => {
          const v = child.val();
          if (v?.name && (now - v.ts) < 20000) list.push({ name: v.name, correct: v.correct || 0 });
        });
        window.__fbProgressReceived?.(list);
      }));
      window.__fbUpdateProgress = (uid, name, correct) =>
        set(ref(db, `${base}/progress/${uid}`), { name, correct, ts: Date.now() });

      // Sabotaje: remontada — quien va último puede descolocar una ficha del que va ganando
      const saboRef   = ref(db, `${base}/sabotage`);
      const saboQuery = query(saboRef, orderByChild('ts'), startAfter(Date.now()));
      unsubs.push(onChildAdded(saboQuery, snap => {
        const item = snap.val();
        if (item?.target) window.__fbSabotageReceived?.(item);
      }));
      window.__fbSendSabotage = (targetName, fromName) =>
        push(saboRef, { target: targetName, from: fromName, ts: Date.now() });

      // Consenso para "nuevo juego" / "reiniciar": los demás jugadores tienen 5s
      // para rechazarlo; si nadie rechaza (o aceptan) se procede como antes.
      const resetReqRef   = ref(db, `${base}/resetRequest`);
      const resetReqQuery = query(resetReqRef, orderByChild('ts'), startAfter(Date.now()));
      unsubs.push(onChildAdded(resetReqQuery, snap => {
        const item = snap.val();
        if (item) window.__fbResetRequestReceived?.(item);
      }));
      window.__fbSendResetRequest = (from, action, requestId) =>
        push(resetReqRef, { from, action, requestId, ts: Date.now() });

      const resetResRef   = ref(db, `${base}/resetResponse`);
      const resetResQuery = query(resetResRef, orderByChild('ts'), startAfter(Date.now()));
      unsubs.push(onChildAdded(resetResQuery, snap => {
        const item = snap.val();
        if (item) window.__fbResetResponseReceived?.(item);
      }));
      window.__fbSendResetResponse = (requestId, from, accept) =>
        push(resetResRef, { requestId, from, accept, ts: Date.now() });

      // Meta (host info for lobby list)
      window.__fbSetMeta = (hostName) =>
        set(ref(db, `${base}/meta`), { host: hostName, ts: Date.now() });

      // Return true if game already had a pattern (existing game)
      const snap = await get(patRef);
      return snap.exists();
    };

    window.__fbLeaveGame = () => detach();

    // Check game exists (for join validation)
    window.__fbGameExists = async (code) => {
      const snap = await get(ref(db, `rubitrack/games/${code}/pattern`));
      return snap.exists();
    };

    // ── Scores (all-time) ──
    const safeKey = n => n.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,20);

    // ID único por dispositivo — permite mismos nombres en distintos dispositivos
    const getDeviceId = () => {
      let id = localStorage.getItem('rr-device-id');
      if (!id) { id = Date.now().toString(36) + Math.random().toString(36).slice(2,8); localStorage.setItem('rr-device-id', id); }
      return id;
    };

    window.__fbHasPlayed = async (name) => {
      try {
        const snap = await get(ref(db, 'rubitrack/scores'));
        let found = false;
        snap.forEach(c => { if ((c.val()?.name||'').toLowerCase() === name.toLowerCase()) found = true; });
        return found;
      } catch(e) { return true; } // on error, assume played (no hint)
    };

    window.__fbUpdateScore = async (name, timeSec, moves, multiplayer, level) => {
      if (name.trim().toLowerCase() === 'rubiking') return;
      const deviceId = getDeviceId();
      const mode = multiplayer ? 'Multi' : 'Solo';

      // ── Score global (existente) ──
      const sRef = ref(db, `rubitrack/scores/${deviceId}`);
      const snap = await get(sRef);
      const prev = snap.val() || {};
      const prevWins = prev[`wins${mode}`] || 0;
      const prevSec  = prev[`bestSec${mode}`];
      const prevMov  = prev[`bestMoves${mode}`];
      await set(sRef, {
        ...prev,
        name,
        [`wins${mode}`]:      prevWins + 1,
        [`bestSec${mode}`]:   prevSec  != null ? Math.min(prevSec,  timeSec) : timeSec,
        [`bestMoves${mode}`]: prevMov  != null ? Math.min(prevMov,  moves)   : moves,
      });

      // ── Score por nivel (nuevo) ──
      if (level >= 1 && level <= 8) {
        const lRef = ref(db, `rubitrack/scoresByLevel/L${level}/${deviceId}`);
        const lSnap = await get(lRef);
        const lPrev = lSnap.val() || {};
        const lPrevWins = lPrev[`wins${mode}`] || 0;
        const lPrevSec  = lPrev[`bestSec${mode}`];
        const lPrevMov  = lPrev[`bestMoves${mode}`];
        await set(lRef, {
          ...lPrev,
          name,
          [`wins${mode}`]:      lPrevWins + 1,
          [`bestSec${mode}`]:   lPrevSec  != null ? Math.min(lPrevSec,  timeSec) : timeSec,
          [`bestMoves${mode}`]: lPrevMov  != null ? Math.min(lPrevMov,  moves)   : moves,
        });
      }
    };

    // Comprueba cuántos jugadores distintos usan el mismo nombre → devuelve el sufijo (#N)
    window.__fbCheckName = async (name) => {
      try {
        const deviceId = getDeviceId();
        const snap = await get(ref(db, 'rubitrack/scores'));
        let count = 0;
        snap.forEach(child => {
          const v = child.val();
          if (v?.name?.toLowerCase() === name.trim().toLowerCase() && child.key !== deviceId) count++;
        });
        return count; // 0 = sin conflicto, 1 = aparecerá como #2, etc.
      } catch(e) { return 0; }
    };

    // Progreso de niveles completados en modo solo — guardado por nombre, no por dispositivo,
    // así viaja entre dispositivos (móvil, tablet, otro navegador…)
    window.__fbMarkLevelDone = async (name, level) => {
      try {
        const key = safeKey(name);
        const pRef = ref(db, `rubitrack/soloProgress/${key}`);
        const snap = await get(pRef);
        const raw = snap.val() || { name, levels: [] };
        // Normalizar por si Firebase devolvió el array como objeto
        const prevLevels = Array.isArray(raw.levels)
          ? raw.levels.filter(Boolean)
          : Object.values(raw.levels || {}).filter(v => typeof v === 'number');
        if (!prevLevels.includes(level)) {
          prevLevels.push(level);
          await set(pRef, { name, levels: prevLevels });
        }
      } catch(e) { console.error('markLevelDone error:', e); }
    };
    window.__fbGetSoloLevelsDone = async (name) => {
      try {
        const key = safeKey(name);
        const snap = await get(ref(db, `rubitrack/soloProgress/${key}/levels`));
        const val = snap.val();
        if (!val) return [];
        // Firebase a veces devuelve arrays como objetos {0:1,1:2,...}; normalizamos
        if (Array.isArray(val)) return val.filter(Boolean);
        return Object.values(val).filter(v => typeof v === 'number');
      } catch(e) { return []; }
    };

    // ── Códigos personales de desbloqueo del nivel 8 ──
    // Cada jugador que cumple las condiciones recibe un código propio (su nombre + dígitos),
    // válido 1 mes; al caducar se elimina de la base la próxima vez que se intenta usar.
    const MONTH_MS = 30*24*60*60*1000;
    function genUnlockCode(name) {
      const letters = (name||'').toUpperCase().replace(/[^A-Z0-9]/g,'').padEnd(4,'X').slice(0,6);
      const digits = Array.from({length:4},()=>Math.floor(Math.random()*10)).join('');
      return letters + digits;
    }
    window.__fbGetOrCreateUnlockCode = async (name) => {
      try {
        const key = safeKey(name);
        const idxRef = ref(db, `rubitrack/unlockCodeByName/${key}`);
        const now = Date.now();
        const idxSnap = await get(idxRef);
        const existing = idxSnap.val();
        if (existing && existing.expiresAt > now) return existing.code;
        if (existing) await remove(ref(db, `rubitrack/unlockCodes/${existing.code}`)); // caducado: limpiar el viejo

        let code;
        for (let i=0; i<6; i++) {
          code = genUnlockCode(name);
          const snap = await get(ref(db, `rubitrack/unlockCodes/${code}`));
          if (!snap.exists()) break;
        }
        const expiresAt = now + MONTH_MS;
        await set(ref(db, `rubitrack/unlockCodes/${code}`), { owner: name, expiresAt });
        await set(idxRef, { code, expiresAt });
        return code;
      } catch(e) { console.error('getOrCreateUnlockCode error:', e); return null; }
    };
    window.__fbRedeemUnlockCode = async (codeRaw) => {
      try {
        const code = codeRaw.trim().toUpperCase();
        const cRef = ref(db, `rubitrack/unlockCodes/${code}`);
        const snap = await get(cRef);
        if (!snap.exists()) return { ok:false, reason:'notfound' };
        const data = snap.val();
        if (!data.expiresAt || data.expiresAt < Date.now()) {
          await remove(cRef); // caducado: se borra de la base
          return { ok:false, reason:'expired' };
        }
        return { ok:true, owner:data.owner };
      } catch(e) { return { ok:false, reason:'error' }; }
    };

    // ── Alias protegido por contraseña (opcional) ──
    // Si el jugador pone contraseña al usar un nombre por primera vez, ese alias queda
    // "reservado": la próxima vez que alguien (en cualquier dispositivo) quiera usar ese
    // mismo nombre, deberá introducir la contraseña. Si nunca se puso contraseña, el
    // nombre es libre y sus datos (puntuación/progreso) se borran al dejar de jugar.
    async function sha256Hex(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    }
    window.__fbCheckAlias = async (name) => {
      try {
        const snap = await get(ref(db, `rubitrack/aliases/${safeKey(name)}`));
        return snap.exists();
      } catch(e) { return false; }
    };
    window.__fbVerifyAliasPassword = async (name, password) => {
      try {
        const snap = await get(ref(db, `rubitrack/aliases/${safeKey(name)}`));
        if (!snap.exists()) return true; // no reclamado: nadie lo protege
        const hash = await sha256Hex(password||'');
        return snap.val().passwordHash === hash;
      } catch(e) { return false; }
    };
    window.__fbClaimAlias = async (name, password) => {
      try {
        const passwordHash = await sha256Hex(password);
        await set(ref(db, `rubitrack/aliases/${safeKey(name)}`), { name, passwordHash, claimedAt: Date.now() });
        return true;
      } catch(e) { return false; }
    };
    // Borra los datos (puntuación/progreso) de una sesión efímera (sin contraseña) al dejar de jugar
    window.__fbDeleteEphemeralData = async (name) => {
      try {
        const deviceId = getDeviceId();
        await remove(ref(db, `rubitrack/scores/${deviceId}`));
        await remove(ref(db, `rubitrack/soloProgress/${safeKey(name)}`));
      } catch(e) { console.error('deleteEphemeralData error:', e); }
    };

    let scoresUnsub = null;
    window.__fbListenScores = (cb) => {
      if (scoresUnsub) { scoresUnsub(); scoresUnsub = null; }
      scoresUnsub = onValue(ref(db, 'rubitrack/scores'), snap => {
        const raw = [];
        snap.forEach(c => { const v=c.val(); if(v?.name && v.name.toLowerCase()!=='rubiking') raw.push(v); });
        const byName = {};
        raw.forEach(s => {
          const k = s.name.toLowerCase();
          if (!byName[k]) { byName[k]={...s}; return; }
          const b = byName[k];
          const merge = (fW,fS,fM) => {
            b[fW] = Math.max(b[fW]||0, s[fW]||0);
            if (s[fS]!=null && (b[fS]==null||s[fS]<b[fS])) b[fS]=s[fS];
            if (s[fM]!=null && (b[fM]==null||s[fM]<b[fM])) b[fM]=s[fM];
          };
          merge('winsSolo','bestSecSolo','bestMovesSolo');
          merge('winsMulti','bestSecMulti','bestMovesMulti');
        });
        const all = Object.values(byName);
        const srt = (w,t) => [...all].filter(s=>(s[w]||0)>0).sort((a,b)=>(b[w]||0)-(a[w]||0)||((a[t]??1e9)-(b[t]??1e9)));
        const combined = [...all].filter(s=>((s.winsSolo||0)+(s.winsMulti||0))>0).map(s=>({
          ...s,
          winsTotal: (s.winsSolo||0)+(s.winsMulti||0),
          bestSecTotal: [s.bestSecSolo,s.bestSecMulti].filter(x=>x!=null).reduce((a,b)=>Math.min(a,b), Infinity),
        })).sort((a,b)=>b.winsTotal-a.winsTotal||(a.bestSecTotal-b.bestSecTotal));
        cb({ combined, multi: srt('winsMulti','bestSecMulti'), solo: srt('winsSolo','bestSecSolo') });
      });
    };
    window.__fbUnlistenScores = () => { if(scoresUnsub){scoresUnsub();scoresUnsub=null;} };

    // Scores por nivel específico
    let levelScoresUnsub = null;
    window.__fbListenLevelScores = (level, cb) => {
      if (levelScoresUnsub) { levelScoresUnsub(); levelScoresUnsub = null; }
      levelScoresUnsub = onValue(ref(db, `rubitrack/scoresByLevel/L${level}`), snap => {
        const raw = [];
        snap.forEach(c => { const v=c.val(); if(v?.name && v.name.toLowerCase()!=='rubiking') raw.push(v); });
        const byName = {};
        raw.forEach(s => {
          const k = s.name.toLowerCase();
          if (!byName[k]) { byName[k]={...s}; return; }
          const b = byName[k];
          ['Solo','Multi'].forEach(m => {
            const wk=`wins${m}`, sk=`bestSec${m}`, mk=`bestMoves${m}`;
            b[wk] = Math.max(b[wk]||0, s[wk]||0);
            if (s[sk]!=null && (b[sk]==null||s[sk]<b[sk])) b[sk]=s[sk];
            if (s[mk]!=null && (b[mk]==null||s[mk]<b[mk])) b[mk]=s[mk];
          });
        });
        const all = Object.values(byName);
        const srt = (w,t) => [...all].filter(s=>(s[w]||0)>0).sort((a,b)=>(b[w]||0)-(a[w]||0)||((a[t]??1e9)-(b[t]??1e9)));
        cb({ multi: srt('winsMulti','bestSecMulti'), solo: srt('winsSolo','bestSecSolo') });
      });
    };
    window.__fbUnlistenLevelScores = () => { if(levelScoresUnsub){levelScoresUnsub();levelScoresUnsub=null;} };

    window.__fbRegisterLobby = (code, host, level) =>
      set(ref(db, `rubitrack/lobby/${code}`), { host, ts: Date.now(), lastMove: Date.now(), level: level||2 });

    // Lee el nivel de una partida ya registrada (para unirse por código)
    window.__fbGetLobbyLevel = async (code) => {
      try {
        const snap = await get(ref(db, `rubitrack/lobby/${code}/level`));
        return snap.val() || 2;
      } catch(e) { return 2; }
    };

    // Update lastMove timestamp on each move
    window.__fbUpdateLobbyActivity = (code) =>
      set(ref(db, `rubitrack/lobby/${code}/lastMove`), Date.now()).catch(()=>{});

    // Delete lobby entries inactive for 2+ minutes
    window.__fbCleanStaleGames = async () => {
      const now = Date.now();
      try {
        const snap = await get(ref(db, 'rubitrack/lobby'));
        snap.forEach(child => {
          const d = child.val();
          const last = d?.lastMove || d?.ts || 0;
          if (now - last > 120000)
            remove(ref(db, `rubitrack/lobby/${child.key}`)).catch(()=>{});
        });
      } catch(e) {}
    };

    const DB_REST = 'https://mosaic-champ-db-default-rtdb.europe-west1.firebasedatabase.app';

    // Schedule lobby entry deletion after delay (default 2 min)
    window.__fbScheduleLobbyDelete = (code, delayMs=120000) => {
      setTimeout(() => {
        set(ref(db, `rubitrack/lobby/${code}/expiresAt`), Date.now());
      }, delayMs);
    };

    // ── Background Sync: cola IndexedDB para reintentar peticiones fallidas ──
    const MC_SYNC_DB = 'mc-sync-queue';
    const MC_SYNC_STORE = 'requests';
    const MC_SYNC_TAG = 'mc-lobby-cleanup';

    function mcOpenQueueDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(MC_SYNC_DB, 1);
        req.onupgradeneeded = () => {
          req.result.createObjectStore(MC_SYNC_STORE, { keyPath: 'id', autoIncrement: true });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function mcQueueSync(url, method) {
      try {
        const db = await mcOpenQueueDB();
        const tx = db.transaction(MC_SYNC_STORE, 'readwrite');
        tx.objectStore(MC_SYNC_STORE).add({ url, method });
        if ('serviceWorker' in navigator && 'SyncManager' in window) {
          const reg = await navigator.serviceWorker.ready;
          await reg.sync.register(MC_SYNC_TAG);
        }
      } catch (e) { /* sin soporte de Background Sync: el dato se pierde, igual que antes */ }
    }

    // Immediate delete via keepalive fetch (works in beforeunload)
    window.__fbLobbyDeleteNow = (code) => {
      const url = `${DB_REST}/rubitrack/lobby/${code}.json`;
      fetch(url, { method:'DELETE', keepalive:true })
        .catch(() => { mcQueueSync(url, 'DELETE'); });
    };

    // Borra todas las entradas del lobby donde host === name (para level up)
    window.__fbDeleteLobbyByHost = async (name) => {
      try {
        const snap = await get(ref(db, 'rubitrack/lobby'));
        snap.forEach(child => {
          if (child.val()?.host === name)
            remove(ref(db, `rubitrack/lobby/${child.key}`)).catch(()=>{});
        });
      } catch(e) {}
    };

    let gamesUnsub = null;
    window.__fbListenGames = (cb) => {
      const lobbyRef = ref(db, 'rubitrack/lobby');
      gamesUnsub = onValue(lobbyRef, snap => {
        const now = Date.now(), list = [];
        snap.forEach(child => {
          const d = child.val();
          if (!d?.host || !d?.ts) return;
          if (d.host.trim().toLowerCase() === 'rubiking') return; // cuenta de test
          if (d.expiresAt && d.expiresAt <= now) return;
          const last = d.lastMove || d.ts;
          if (now - last > 120000) return;           // 2 min inactivity
          if (now - d.ts > 7200000) return;
          list.push({ code: child.key, host: d.host, ts: d.ts, level: d.level || 2 });
        });
        list.sort((a,b) => b.ts - a.ts);
        cb(list.slice(0, 8));
      });
    };
    window.__fbUnlistenGames = () => { if (gamesUnsub) { gamesUnsub(); gamesUnsub = null; } };

    window.__fbReady = true;
    window.dispatchEvent(new Event('fbReady'));
  </script>

    function detectLang() {
      const nav = navigator.language || navigator.userLanguage || 'en';
      const code = nav.toLowerCase().split('-')[0];
      if (LANGS[code]) return code;
      // Regional fallbacks
      if (code === 'gl') return 'pt'; // galician → portuguese
      if (code === 'eu') return 'es'; // basque → spanish
      return 'en';
    }

    window.T = LANGS[detectLang()];
    window.RR_LANG = detectLang();
  })();

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0;
        -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
    html, body { height:100%; background:#0a0818; overflow:hidden; overscroll-behavior:none; }
    body { position:fixed; inset:0; overflow:hidden; overscroll-behavior:none; }

    :root { --tile:clamp(50px,calc((100vw - 64px)/5),62px); }

    @keyframes pulse      { 0%,100%{opacity:.2} 50%{opacity:.8} }

    @keyframes frameIn    { from{opacity:0} to{opacity:1} }
    @keyframes glowPulse  { 0%,100%{filter:drop-shadow(0 0 8px rgba(255,200,80,.4))} 50%{filter:drop-shadow(0 0 20px rgba(255,200,80,.9))} }

    @keyframes hintPulse { 0%,100%{background:rgba(0,180,255,.10);border-color:rgba(0,200,255,.4)} 50%{background:rgba(0,200,255,.25);border-color:rgba(0,230,255,.9)} }
    @keyframes hintTilePulse { 0%,100%{filter:brightness(1.1)} 50%{filter:brightness(1.5) drop-shadow(0 0 8px rgba(0,220,255,.8))} }
    @keyframes prideIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
    /* Pride SVG title: static rainbow, no animation */
    .mc-tiles-pride { animation: none !important; filter: none !important; }

    .tile-btn  { touch-action:manipulation; -webkit-tap-highlight-color:transparent;
                 -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
                 outline:none;
                 -webkit-backface-visibility:hidden; backface-visibility:hidden;
                 -webkit-transform:translateZ(0); transform:translateZ(0);
                 isolation:isolate; will-change:transform; }
    .tile-btn:hover  { transform:scale(1.06) !important; filter:brightness(1.25) !important; }
    .tile-btn:active { transform:scale(0.95) !important; }

    /* ══ Stars bg ══ */
    .star { position:absolute; border-radius:50%; background:rgba(255,255,255,.4); }

    /* ══ Lobby ══ */
    .lobby-wrap {
      min-height:100vh;
      background:radial-gradient(ellipse at 30% 20%,#1a1035 0%,#0a0818 60%,#000508 100%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:24px; gap:0; position:relative; overflow:hidden;
      font-family:'Trebuchet MS','Segoe UI',sans-serif;
    }
    .lobby-title {
      font-size:clamp(36px,9.5vw,58px); font-weight:900; letter-spacing:.06em;
      text-transform:uppercase; margin-bottom:32px;
      background:linear-gradient(90deg,#7BAEF5,#E8B800,#FFA85C,#5FD98A);
      background-size:300% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      -webkit-text-stroke:1.5px #FFD700;
      filter:drop-shadow(0 2px 10px rgba(255,215,0,.4));
      animation:shimmer 4s linear infinite;
    }
    .lobby-card {
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09);
      border-radius:20px; padding:28px 28px 24px; width:100%; max-width:360px;
      backdrop-filter:blur(10px);
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      animation:fadeUp .5s cubic-bezier(.34,1.2,.64,1);
      display:flex; flex-direction:column; gap:16px;
    }
    .lobby-label { font-size:11px; color:rgba(255,255,255,.35); letter-spacing:.12em; text-transform:uppercase; margin-bottom:2px; }
    .lobby-input {
      width:100%; padding:12px 16px; border-radius:12px;
      border:1.5px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06);
      color:#fff; font-size:16px; font-weight:600; outline:none;
      font-family:'Trebuchet MS','Segoe UI',sans-serif; transition:border-color .2s;
    }
    .lobby-input:focus { border-color:rgba(156,90,255,.6); }
    .lobby-input::placeholder { color:rgba(255,255,255,.2); }
    .lobby-divider { height:1px; background:rgba(255,255,255,.08); margin:4px 0; }
    .lobby-btn {
      width:100%; padding:8px; border-radius:9px; border:none; cursor:pointer;
      font-size:12px; font-weight:700; letter-spacing:.06em;
      transition:filter .2s, transform .1s; display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .lobby-btn:active { transform:scale(0.97); }
    .lobby-btn.primary { background:linear-gradient(135deg,#7c3aed,#4f1fbf); color:#fff; }
    .lobby-btn.primary:hover { filter:brightness(1.15); }
    .lobby-btn.secondary { background:rgba(255,255,255,.07); color:rgba(255,255,255,.7); border:1.5px solid rgba(255,255,255,.12); }
    .lobby-btn.secondary:hover { background:rgba(255,255,255,.12); }
    .lobby-btn:disabled { opacity:.4; cursor:not-allowed; }
    .lobby-error { font-size:12px; color:#f87171; text-align:center; animation:fadeUp .3s ease; }

    .join-row { display:flex; gap:8px; }
    .code-input {
      flex:1; padding:12px 16px; border-radius:12px;
      border:1.5px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06);
      color:#fff; font-size:18px; font-weight:800; text-transform:uppercase;
      letter-spacing:.2em; text-align:center; outline:none;
      font-family:'Trebuchet MS','Segoe UI',sans-serif; transition:border-color .2s;
    }
    .code-input:focus { border-color:rgba(156,90,255,.6); }

    /* ══ Game code badge ══ */
    .game-code-badge {
      display:flex; align-items:center; gap:4px;
      background:rgba(255,255,255,.06); border:1px solid rgba(156,90,255,.25);
      border-radius:7px; padding:4px 8px; cursor:pointer;
      transition:background .2s; animation:codePop .4s cubic-bezier(.34,1.4,.64,1);
      align-self:flex-start;
    }
    .game-code-badge:hover { background:rgba(156,90,255,.15); }
    .game-code-badge .code-label { font-size:7px; color:rgba(255,255,255,.35); letter-spacing:.12em; text-transform:uppercase; }
    .game-code-badge .code-value { font-size:11px; font-weight:900; color:#c89fff; letter-spacing:.15em; }
    .game-code-badge .copy-icon  { font-size:9px; opacity:.5; }
    .copied-hint { font-size:10px; color:#22c55e; animation:fadeUp .2s ease; }

    /* ══ Pattern widget ══ */
    #rr-widget {
      position:relative; z-index:300;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      animation:widgetIn .5s cubic-bezier(.34,1.4,.64,1);
    }
    #rr-toggle {
      display:flex; flex-direction:column; align-items:center; gap:5px;
      background:rgba(10,8,24,.9); border:1.5px solid rgba(156,90,255,.45); border-radius:12px;
      padding:6px 9px; cursor:pointer; color:#c89fff;
      font-size:9px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
      backdrop-filter:blur(14px); transition:background .2s,border-color .2s;
      user-select:none; position:relative; box-shadow:0 4px 20px rgba(0,0,0,.4);
    }
    #rr-toggle:hover { background:rgba(124,58,237,.3); border-color:rgba(156,90,255,.8); }
    .rr-preview { display:grid; }
    .rr-preview span { display:block; border-radius:2px; border:1.5px solid #444; transition:background .4s,border-color .4s; }
    #rr-sync-dot { width:7px; height:7px; border-radius:50%; background:#444; position:absolute; top:8px; right:8px; transition:background .4s; }
    #rr-sync-dot.connected    { background:#22c55e; animation:syncPulse 2s ease-in-out infinite; }
    #rr-sync-dot.disconnected { background:#ef4444; }
    #rr-sync-dot.connecting   { background:#f59e0b; animation:syncPulse .8s ease-in-out infinite; }
    #rr-panel {
      position:absolute; top:calc(100% + 50px); right:0;
      width:auto; min-width:260px; max-width:92vw; background:rgba(6,4,20,.97);
      border:1.5px solid rgba(156,90,255,.35); border-radius:18px;
      padding:20px 20px 16px; backdrop-filter:blur(18px);
      box-shadow:0 24px 60px rgba(0,0,0,.7); transform-origin:top right;
      animation:panelIn .32s cubic-bezier(.34,1.15,.64,1);
    }
    #rr-panel.hidden { display:none; }
    #rr-panel-header { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:2px; }
    #rr-panel h3 { color:#fff; font-size:16px; font-weight:700; }
    .rr-tm { color:#9b59b6; font-size:9px; letter-spacing:4px; text-transform:uppercase; text-align:center; margin-bottom:10px; }
    #rr-status-text { text-align:center; font-size:10px; color:rgba(255,255,255,.3); margin-bottom:10px; min-height:14px; }
    #rr-players { margin-bottom:10px; display:flex; flex-wrap:wrap; gap:5px; justify-content:center; min-height:16px; }
    .rr-player-chip {
      display:flex; flex-direction:column; align-items:flex-start;
      background:rgba(255,255,255,.07); border:1px solid rgba(156,90,255,.25);
      border-radius:20px; padding:4px 10px; font-size:10px; color:#c89fff; font-weight:600;
      animation:playerIn .3s ease; min-width:80px;
    }
    .rr-player-chip-row { display:flex; align-items:center; gap:5px; width:100%; }
    .rr-player-chip .dot { width:5px; height:5px; border-radius:50%; background:#22c55e; flex-shrink:0; }
    .rr-player-chip .dot.moving   { background:#60a5fa; animation:movingPulse .8s ease-in-out infinite; }
    .rr-player-chip .dot.finished { background:#FFE566; }
    .rr-chip-name   { flex:1; }
    .rr-chip-status { font-size:9px; color:rgba(255,255,255,.35); padding-left:10px; }
    .rr-chip-time   { font-size:9px; color:#FFE566; font-weight:700; padding-left:10px; }
    #rr-grid { display:grid; grid-template-columns:repeat(3,var(--tile)); gap:5px; margin-bottom:13px; justify-content:center; }
    .rrcell { width:var(--tile); height:var(--tile); border-radius:8px; border:2px solid #333; transition:background .4s,border-color .4s; position:relative; overflow:hidden; }
    .rrcell::after { content:''; position:absolute; top:0; left:0; right:0; height:40%; background:linear-gradient(to bottom,rgba(255,255,255,.18),transparent); border-radius:8px 8px 50% 50%; pointer-events:none; }
    #rr-shuffle { width:100%; padding:10px; background:#7c3aed; color:#fff; border:none; border-radius:9px; font-size:12px; font-weight:700; cursor:pointer; transition:background .2s,opacity .2s; }
    #rr-pattern-tools { display:flex; gap:8px; margin-top:10px; justify-content:center; }
    .rr-tool-btn {
      width:38px; height:38px; border-radius:50%; flex-shrink:0;
      border:1.5px solid rgba(255,255,255,.18); background:rgba(255,255,255,.06); color:#fff;
      font-size:19px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background .2s,border-color .2s;
    }
    .rr-tool-btn:disabled { opacity:.35; cursor:not-allowed; }
    .rr-tool-btn.active { border-color:rgba(156,90,255,.8); background:rgba(156,90,255,.25); }

    /* ── Saved patterns modals ── */
    .rr-modal-overlay {
      position:fixed; inset:0; background:rgba(4,2,12,.72); backdrop-filter:blur(4px);
      display:flex; align-items:center; justify-content:center; z-index:10000; padding:20px;
      animation:rrModalFade .2s ease;
    }
    .rr-modal-overlay.hidden { display:none; }
    @keyframes rrModalFade { from{opacity:0;} to{opacity:1;} }
    .rr-modal-box {
      background:rgba(6,4,20,.98); border:1.5px solid rgba(156,90,255,.4); border-radius:18px;
      padding:18px 20px 20px; width:100%; max-width:340px; max-height:80vh; display:flex; flex-direction:column;
      box-shadow:0 24px 60px rgba(0,0,0,.7); animation:panelIn .28s cubic-bezier(.34,1.15,.64,1);
    }
    .rr-modal-box-sm { max-width:280px; }
    .rr-modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .rr-modal-header h3 { color:#fff; font-size:15px; font-weight:700; }
    .rr-modal-close {
      background:rgba(255,255,255,.08); border:none; color:#c89fff; width:26px; height:26px; border-radius:50%;
      cursor:pointer; font-size:13px; line-height:1; flex-shrink:0;
    }
    .rr-modal-close:hover { background:rgba(255,255,255,.18); }
    .rr-save-input {
      width:100%; box-sizing:border-box; background:rgba(255,255,255,.07); border:1.5px solid rgba(156,90,255,.35);
      border-radius:10px; padding:10px 12px; color:#fff; font-size:13px; margin-bottom:12px; outline:none;
    }
    .rr-save-input:focus { border-color:rgba(156,90,255,.8); }
    .rr-save-confirm-btn {
      width:100%; padding:10px; background:#7c3aed; color:#fff; border:none; border-radius:9px;
      font-size:13px; font-weight:700; cursor:pointer; transition:background .2s;
    }
    .rr-save-confirm-btn:hover { background:#6d28d9; }
    .rr-saved-list { overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
    .rr-saved-empty { text-align:center; font-size:12px; color:rgba(255,255,255,.4); padding:14px 0; }
    .rr-saved-item {
      display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.05);
      border:1px solid rgba(156,90,255,.2); border-radius:12px; padding:8px 10px;
    }
    .rr-mini-grid { display:grid; gap:1px; width:36px; height:36px; flex-shrink:0; }
    .rr-mini-cell { display:block; border-radius:1px; border:.5px solid rgba(0,0,0,.4); }
    .rr-mini-empty { background:transparent; border-color:transparent; }
    .rr-saved-info { flex:1; min-width:0; }
    .rr-saved-name { color:#fff; font-size:12.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rr-saved-size { color:rgba(255,255,255,.4); font-size:10.5px; margin-top:1px; }
    .rr-saved-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .rr-saved-use-btn {
      background:rgba(124,58,237,.25); border:1px solid rgba(156,90,255,.6); color:#e9d9ff;
      font-size:11px; font-weight:700; padding:6px 10px; border-radius:8px; cursor:pointer;
    }
    .rr-saved-use-btn:hover { background:rgba(124,58,237,.45); }
    .rr-saved-del-btn {
      background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.4); color:#ffb3b3;
      width:28px; height:28px; border-radius:8px; cursor:pointer; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
    }
    .rr-saved-del-btn:hover { background:rgba(239,68,68,.3); }
    #rr-manual-hint { text-align:center; font-size:10px; color:rgba(255,255,255,.4); margin-top:6px; display:none; }
    #rr-grid.rr-manual-active .rrcell { cursor:pointer; }
    #rr-shuffle:hover    { background:#6d28d9; }
    #rr-shuffle:disabled { opacity:.4; cursor:not-allowed; }

    /* ══ Finished overlay ══ */
    .finished-frame {
      position:absolute; inset:0; border-radius:16px;
      box-shadow:inset 0 0 0 calc(12px + var(--tile) + 5px) rgba(0,0,0,.91);
      display:flex; align-items:center; justify-content:center; flex-direction:column;
      pointer-events:none; z-index:20; animation:frameIn .3s ease;
    }
    .finished-text {
      font-family:'Pacifico',cursive; font-size:clamp(28px,7vw,44px);
      background:linear-gradient(135deg,#FFE566,#FFA85C,#F57A7A);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:finishPop .65s cubic-bezier(.34,1.56,.64,1), glowPulse 2s ease-in-out 1s infinite;
      text-align:center; line-height:1.1; padding:8px 16px;
    }

    /* ══ Toasts ══ */
    #toast-container { position:fixed; bottom:24px; right:16px; display:flex; flex-direction:column; gap:8px; z-index:500; pointer-events:none; max-width:min(320px,90vw); }
    .toast { background:rgba(6,4,20,.96); border:1.5px solid rgba(34,197,94,.4); border-radius:16px; padding:14px 18px; backdrop-filter:blur(16px); box-shadow:0 8px 32px rgba(0,0,0,.6); animation:toastIn .4s cubic-bezier(.34,1.4,.64,1); pointer-events:auto; }
    .toast.out { animation:toastOut .4s ease forwards; }
    .toast-row { display:flex; align-items:flex-start; gap:12px; }
    .toast-emoji { font-size:20px; flex-shrink:0; }
    .toast-title { font-family:'Pacifico',cursive; font-size:13px; background:linear-gradient(90deg,#FFE566,#FFA85C); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:2px; }
    .toast-msg  { font-size:11px; color:rgba(255,255,255,.5); }
    .toast-meta { font-size:10px; color:rgba(255,255,255,.3); margin-top:3px; }
    .toast-discrete { background:rgba(6,4,20,.88); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:7px 13px; font-size:11px; color:rgba(255,255,255,.5); display:flex; align-items:center; gap:7px; animation:toastIn .3s cubic-bezier(.34,1.4,.64,1); }
    .toast-discrete.out { animation:toastOut .3s ease forwards; }
    .td-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

    /* ══ Confirm modal ══ */
    .confirm-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:400; backdrop-filter:blur(6px); animation:frameIn .2s ease; }
    .confirm-box { background:linear-gradient(145deg,#12103a,#0a0818); border:1.5px solid rgba(156,90,255,.35); border-radius:20px; padding:28px 28px 22px; text-align:center; box-shadow:0 24px 60px rgba(0,0,0,.7); animation:modalIn .35s cubic-bezier(.34,1.4,.64,1); max-width:300px; width:90%; }
    .confirm-box .icon { font-size:36px; margin-bottom:10px; }
    .confirm-box h4 { color:#fff; font-size:16px; font-weight:800; margin-bottom:6px; }
    .confirm-box p  { color:rgba(255,255,255,.45); font-size:12px; line-height:1.5; margin-bottom:20px; }
    .confirm-btns   { display:flex; gap:10px; justify-content:center; }
    .confirm-btn-yes { flex:1; padding:10px; border-radius:10px; border:none; background:linear-gradient(135deg,#7c3aed,#4f1fbf); color:#fff; font-size:13px; font-weight:700; cursor:pointer; transition:filter .2s; }
    .confirm-btn-yes:hover { filter:brightness(1.2); }
    .confirm-btn-no  { flex:1; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.07); color:rgba(255,255,255,.6); font-size:13px; font-weight:600; cursor:pointer; }
    .confirm-btn-no:hover { background:rgba(255,255,255,.13); }

    /* ══ Name input ══ */
    .name-input-wrap { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.05); border-radius:12px; padding:10px 16px; border:1px solid rgba(255,255,255,.1); width:100%; max-width:340px; }
    .name-input-wrap label { font-size:11px; color:rgba(255,255,255,.4); letter-spacing:.1em; text-transform:uppercase; white-space:nowrap; }
    .name-input-wrap input { flex:1; background:transparent; border:none; outline:none; color:#fff; font-size:15px; font-weight:600; font-family:'Trebuchet MS','Segoe UI',sans-serif; }
    .name-input-wrap input::placeholder { color:rgba(255,255,255,.2); }

    /* ══ Leave button ══ */
    .leave-btn { background:rgba(34,197,94,.12); border:1px solid rgba(74,222,128,.5); border-radius:8px; color:#4ade80; font-size:11px; font-weight:700; padding:5px 12px; cursor:pointer; transition:all .2s; letter-spacing:.08em; box-shadow:0 0 10px rgba(74,222,128,.25); }
    .leave-btn:hover { background:rgba(34,197,94,.22); border-color:rgba(74,222,128,.8); color:#86efac; box-shadow:0 0 16px rgba(74,222,128,.4); }
    .help-btn.green-exit { border-color:rgba(74,222,128,.5); color:#4ade80; box-shadow:0 0 10px rgba(74,222,128,.25),0 4px 20px rgba(0,0,0,.4); }
    .help-btn.green-exit:hover { background:rgba(34,197,94,.22); border-color:rgba(74,222,128,.8); color:#86efac; box-shadow:0 0 16px rgba(74,222,128,.4); }
    @keyframes finishNotifIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .finish-notif { animation:finishNotifIn .35s cubic-bezier(.34,1.4,.64,1); background:rgba(6,4,20,.92); border:1.5px solid rgba(34,197,94,.35); border-radius:12px; padding:10px 16px; display:flex; align-items:center; gap:10px; backdrop-filter:blur(12px); box-shadow:0 4px 20px rgba(0,0,0,.5); }
    #finish-notif-area { min-width:0; width:100%; }

    /* ══ Tutorial overlay ══ */
    @keyframes tutDraw   { to { stroke-dashoffset: 0; } }
    @keyframes tutFadeUp { from{opacity:0;transform:translate(-50%,10px)} to{opacity:1;transform:translate(-50%,0)} }
    @keyframes tutArrow  { from{opacity:0} to{opacity:1} }
    @keyframes countPulse { 0%{transform:scale(1.4);opacity:.5} 100%{transform:scale(1);opacity:1} }
    @keyframes voicePulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
    @keyframes tutHintIn  { from { opacity:0; transform:translateX(-8px) scale(.85); } to { opacity:1; transform:none; } }
    @keyframes tutHintOut { from { opacity:1; } to { opacity:0; transform:translateX(8px) scale(.85); } }

    /* ══ Editor de patrón: notificación de desbloqueo ══ */
    @keyframes rrEditorSlideIn  { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes rrEditorSlideOut { from{transform:translateX(0);opacity:1} to{transform:translateX(-140vw);opacity:0} }

    /* ══ Ficha saboteada: flash morado breve ══ */
    @keyframes rrSabotageFlash {
      0%   { box-shadow:0 0 0 4px rgba(168,85,247,1),0 0 34px 10px rgba(168,85,247,.9); filter:brightness(1.7); }
      55%  { box-shadow:0 0 0 4px rgba(168,85,247,.8),0 0 24px 6px rgba(168,85,247,.65); filter:brightness(1.35); }
      100% { box-shadow:0 0 0 0 rgba(168,85,247,0); filter:brightness(1); }
    }

    /* ══ Rayas de escaneo diagonales sobre la ficha saboteada ══ */
    @keyframes rrScanSweep {
      0%   { transform:translate(-55%,-55%); opacity:0; }
      15%  { opacity:1; }
      82%  { opacity:1; }
      100% { transform:translate(55%,55%); opacity:0; }
    }

    /* ══ Toast vistoso de "Sudden Swap" (estilo del toast de finished!) ══ */
    @keyframes suddenSwapPulse {
      0%,100% { box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 30px rgba(168,85,247,.5); }
      50%     { box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 48px rgba(168,85,247,.9); }
    }
    .sudden-swap-toast {

    @keyframes rrPromptGrow {
